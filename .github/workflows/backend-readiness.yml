name: Core Backend Readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/backend-readiness.yml"
      - ".github/workflows/prod-image-sign.yml"
      - ".gitignore"
      - "pom.xml"
      - "apps/api-gateway/**"
      - "apps/security-service/**"
      - "apps/user-profile/**"
      - "apps/nlp-service/**"
      - "apps/orchestrator/**"
      - "apps/voice-gateway/**"
      - "apps/smart-home-service/**"
      - "apps/life-tracker/**"
      - "apps/analytics-service/**"
      - "apps/planner-service/**"
      - "apps/pc-control/**"
      - "apps/jarvis-common/**"
      - "scripts/**"
      - "docker/postgres-init/**"
      - "docker/mosquitto/**"
      - "k8s/**"
      - "k8s/overlays/prod-release/**"
      - "README.md"
      - "DEPLOYMENT_INSTRUCTIONS.md"
      - "k8s/README.md"
      - "ARCHITECTURE.md"
      - "docs/architecture.md"
      - "docs/architecture/**"
      - "docs/services/**"
      - "RUNBOOK_LLM.md"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/backend-readiness.yml"
      - ".github/workflows/prod-image-sign.yml"
      - ".gitignore"
      - "pom.xml"
      - "apps/api-gateway/**"
      - "apps/security-service/**"
      - "apps/user-profile/**"
      - "apps/nlp-service/**"
      - "apps/orchestrator/**"
      - "apps/voice-gateway/**"
      - "apps/smart-home-service/**"
      - "apps/life-tracker/**"
      - "apps/analytics-service/**"
      - "apps/planner-service/**"
      - "apps/pc-control/**"
      - "apps/jarvis-common/**"
      - "scripts/**"
      - "docker/postgres-init/**"
      - "docker/mosquitto/**"
      - "k8s/**"
      - "k8s/overlays/prod-release/**"
      - "README.md"
      - "DEPLOYMENT_INSTRUCTIONS.md"
      - "k8s/README.md"
      - "ARCHITECTURE.md"
      - "docs/architecture.md"
      - "docs/architecture/**"
      - "docs/services/**"
      - "RUNBOOK_LLM.md"

permissions:
  contents: read

# NOTE: JARVIS_HOME is intentionally NOT set at the workflow top-level env: the
# `runner` context (runner.temp) is only available inside a job/step, so a
# top-level `${{ runner.temp }}` makes GitHub reject the whole workflow at parse
# time (0s "workflow file issue"). It is set per-job below instead.

jobs:
  release-wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend release wiring
        run: ./scripts/ci/check-backend-release-wiring.sh

  runtime-core-smoke:
    needs: release-wiring
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      JARVIS_LOCAL_POSTGRES_CONTAINER: jarvis-ci-postgres-core-${{ github.run_id }}-${{ github.run_attempt }}
      JARVIS_RUNTIME_SMOKE_SKIP_LLM: "true"
      JARVIS_RUNTIME_SMOKE_STOP_ON_EXIT: "true"
      JARVIS_HOME: ${{ runner.temp }}/jarvis-home
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Core backend runtime smoke
        run: ./scripts/runtime-smoke.sh

  runtime-analytics-smoke:
    needs: release-wiring
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      JARVIS_LOCAL_POSTGRES_CONTAINER: jarvis-ci-postgres-analytics-${{ github.run_id }}-${{ github.run_attempt }}
      JARVIS_RUNTIME_SMOKE_STOP_ON_EXIT: "true"
      JARVIS_SKIP_BUILD: "true"
      JARVIS_HOME: ${{ runner.temp }}/jarvis-home
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Core analytics smoke
        run: |
          set -euo pipefail
          cleanup() {
            ./scripts/runtime-down.sh >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          ./scripts/runtime-up.sh
          ./scripts/analytics-smoke.sh
