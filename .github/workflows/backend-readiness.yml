name: Core Backend Readiness

on:
  # Manual-only. This is a heavyweight acceptance suite: two ~35-minute
  # runtime-smoke jobs that stand up the full stack, plus host-oriented wiring
  # guards ("no active Docker runtime path"). It targets a self-hosted,
  # Docker-free k8s runner and cannot go green on GitHub-hosted runners, so it
  # is dispatch-only to avoid perma-red on every push. Trigger it by hand once a
  # suitable runner exists. (The lightweight gates — reactor-tests, quality,
  # security-and-build, k8s-tree-drift, desktop-entry-guard — are the required
  # branch-protection checks.)
  workflow_dispatch:

permissions:
  contents: read

# NOTE: no workflow-level JARVIS_HOME env. The `runner` context (runner.temp) is
# only available at STEP scope — not in a top-level OR job-level env: — so a
# `${{ runner.temp }}` there makes GitHub reject the whole workflow at parse time
# (0s "workflow file issue"). The smoke scripts already default JARVIS_HOME to
# ${HOME}/.jarvis, so it is simply left unset here.

jobs:
  release-wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend release wiring
        run: ./scripts/ci/check-backend-release-wiring.sh

  runtime-core-smoke:
    needs: release-wiring
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      JARVIS_LOCAL_POSTGRES_CONTAINER: jarvis-ci-postgres-core-${{ github.run_id }}-${{ github.run_attempt }}
      JARVIS_RUNTIME_SMOKE_SKIP_LLM: "true"
      JARVIS_RUNTIME_SMOKE_STOP_ON_EXIT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Core backend runtime smoke
        run: ./scripts/runtime-smoke.sh

  runtime-analytics-smoke:
    needs: release-wiring
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      JARVIS_LOCAL_POSTGRES_CONTAINER: jarvis-ci-postgres-analytics-${{ github.run_id }}-${{ github.run_attempt }}
      JARVIS_RUNTIME_SMOKE_STOP_ON_EXIT: "true"
      JARVIS_SKIP_BUILD: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Core analytics smoke
        run: |
          set -euo pipefail
          cleanup() {
            ./scripts/runtime-down.sh >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          ./scripts/runtime-up.sh
          ./scripts/analytics-smoke.sh
