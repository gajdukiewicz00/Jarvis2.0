name: Desktop Entry Guard

on:
  pull_request:
    # No path filter: REQUIRED branch-protection check must report on every PR
    # to main (a path-skipped required check blocks merge forever).
    branches:
      - main
  push:
    paths:
      - "scripts/**"
      - "apps/**"
      - "src/**"
      - ".github/workflows/**"

jobs:
  desktop-entry-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Desktop entry guard
        run: scripts/ci/check-desktop-entry.sh
