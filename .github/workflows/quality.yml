name: Quality Gate

# Static-analysis quality gate for the Maven reactor: checkstyle, PMD, SpotBugs,
# and a dependency vulnerability scan, run as independent jobs so each shows up
# as its own PR status check and reports are downloadable as build artifacts.
#
# This is deliberately separate from reactor-tests.yml (unit tests) and from
# security-and-build.yml (secret scan / kustomize validate / compile gate /
# shellcheck). Those two already run a plain `mvn ... package` / `mvn test`
# with the quality plugins explicitly skipped
# (`-Dcheckstyle.skip -Dpmd.skip -Dspotbugs.skip`) — see the comment at the
# top of reactor-tests.yml. This workflow is what actually activates them.
#
# All three static-analysis plugins (checkstyle/pmd/spotbugs) are configured
# in the root pom.xml but are NOT bound to any phase by default — they only
# run when the opt-in `ci-quality` Maven profile is active (root pom.xml
# <profiles><profile id="ci-quality">), which every job below activates with
# `-Pci-quality`.
#
# Gate strength differs per tool, by the root pom's own design, not by choice
# of this workflow:
#   - checkstyle (config/quality/checkstyle-ci.xml) has
#     <failOnViolation>false</failOnViolation> — it always reports but never
#     fails the build. Treat its job result as advisory; read the uploaded
#     checkstyle-result.xml reports for findings.
#   - pmd (config/quality/pmd-ci.xml) also has
#     <failOnViolation>false</failOnViolation> for the same reason — advisory.
#   - spotbugs (config/quality/spotbugs-include-runtime.xml +
#     spotbugs-exclude-baseline.xml) has no such override, so `spotbugs:check`
#     genuinely fails the build once findings exceed the configured
#     High threshold, after excluding the checked-in baseline. This is the
#     one real hard gate among the three.
# The dependency-scan job mirrors the existing Trivy fs job in
# security-and-build.yml (exit-code 0 / report-only) so this workflow adds a
# downloadable, Maven-reactor-scoped report artifact without duplicating that
# job's SARIF-to-Security-tab upload or its severity gating decision.

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "pom.xml"
      - "apps/**"
      - "libs/**"
      - "config/quality/**"
      - ".github/workflows/quality.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "pom.xml"
      - "apps/**"
      - "libs/**"
      - "config/quality/**"
      - ".github/workflows/quality.yml"

permissions:
  contents: read

jobs:
  checkstyle:
    name: Checkstyle (mvn -fae checkstyle:check)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run checkstyle across the reactor
        # Advisory: config/quality/checkstyle-ci.xml sets Checker severity=warning,
        # so checkstyle:check surfaces findings (uploaded below) without failing.
        run: mvn -B -ntp -fae -Pci-quality checkstyle:check

      - name: Upload checkstyle reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "**/target/checkstyle-result.xml"
          if-no-files-found: warn
          retention-days: 14

  pmd:
    name: PMD (mvn -fae pmd:pmd)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run PMD across the reactor
        # Advisory report-only: pmd:pmd generates target/pmd.xml (uploaded below)
        # without failing. pmd:check is the enforcing goal and is intentionally
        # NOT run here — SpotBugs is the single hard quality gate (see the
        # quality-gate summary job), keeping this a report as designed.
        run: mvn -B -ntp -fae -Pci-quality pmd:pmd

      - name: Upload PMD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports
          path: "**/target/pmd.xml"
          if-no-files-found: warn
          retention-days: 14

  spotbugs:
    name: SpotBugs (mvn -fae spotbugs:check)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile and run SpotBugs across the reactor
        # SpotBugs analyzes bytecode, so main classes must be compiled first
        # (test-compile is not needed: spotbugs-include-runtime.xml only
        # targets org.jarvis.* runtime classes). Unlike checkstyle/pmd above,
        # this is a real gate: config/quality/spotbugs-*.xml has no
        # failOnViolation override, so `spotbugs:check` fails the build once
        # findings above the configured High threshold survive the checked-in
        # baseline exclude filter.
        run: mvn -B -ntp -fae -Pci-quality -DskipTests compile spotbugs:check

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: "**/target/spotbugsXml.xml"
          if-no-files-found: warn
          retention-days: 14

  dependency-scan:
    name: Dependency vulnerability scan (trivy fs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install trivy
        # Direct binary install; trivy-action's transitive setup-trivy@v0.2.2 pin
        # no longer resolves (job-setup failure). See security-and-build.yml.
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
      - name: Run trivy filesystem scan (Maven dependencies)
        # Report-only (advisory): --exit-code 0 (findings never fail) + continue-
        # on-error (a transient DB-download hiccup can't red the build). The SARIF
        # upload / repo-wide gating lives in security-and-build.yml; this job just
        # produces a downloadable, human-readable report over Maven deps.
        continue-on-error: true
        run: >-
          trivy fs --scanners vuln --pkg-types library --severity HIGH,CRITICAL
          --ignore-unfixed --exit-code 0 --format table
          --output trivy-dependency-report.txt .

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: trivy-dependency-report.txt
          if-no-files-found: warn
          retention-days: 14

  quality-gate:
    name: Quality gate summary
    needs: [checkstyle, pmd, spotbugs, dependency-scan]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        # SpotBugs is the one job among the four that reflects a real
        # pass/fail gate (see comments above); checkstyle/pmd/dependency-scan
        # are advisory/report-only by the root pom's and repo's own design.
        # This single job gives branch protection one status check to mark
        # required instead of four.
        run: |
          if [ "${{ needs.spotbugs.result }}" != "success" ]; then
            echo "SpotBugs quality gate failed (result: ${{ needs.spotbugs.result }})."
            exit 1
          fi
          echo "Quality gate passed."
