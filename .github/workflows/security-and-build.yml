name: Security and Build Validation

# Lightweight static checks: secret scan, dependency CVE scan, kustomize validation,
# and a quick reactor compile gate. Runs in parallel with the heavier
# backend-readiness workflow. See docs/audit/JARVIS_AUDIT_REPORT.md P1-014.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.java"
      - "**/*.kt"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.xml"
      - "**/*.sh"
      - "**/*.py"
      - "k8s/**"
      - "infra/k8s/**"
      - ".github/workflows/security-and-build.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.java"
      - "**/*.kt"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.xml"
      - "**/*.sh"
      - "**/*.py"
      - "k8s/**"
      - "infra/k8s/**"
      - ".github/workflows/security-and-build.yml"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: ${{ github.workspace }}/.gitleaks.toml

  dependency-cve-scan:
    name: Dependency CVE scan (trivy fs)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install trivy
        # trivy-action's wrapper pins a transitive aquasecurity/setup-trivy@v0.2.2
        # that no longer resolves (job-setup failure). setup-trivy is the leaf
        # installer and is self-contained; install the binary and run the CLI so
        # this stops depending on the broken wrapper.
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
      - name: Run trivy filesystem scan
        # Advisory: --exit-code 0 (findings never fail) + continue-on-error so a
        # transient DB-download hiccup can't red the build. SARIF still uploads below.
        continue-on-error: true
        run: >-
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed
          --exit-code 0 --format sarif --output trivy-fs.sarif .
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  kustomize-validate:
    name: Kustomize manifests validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          # kustomize bundled with kubectl >= v1.31 supports a single
          # `patches: - path:` entry pointing at a MULTI-document strategic-merge
          # file (e.g. k8s/base/observability/observability-env.patch.yaml, which
          # patches ~10 Deployments in one file). v1.30's kustomize (~v5.0)
          # rejects it. Pinned to match the local toolchain (kustomize v5.7.1).
          version: 'v1.35.2'
      - name: Validate k8s/base
        run: kubectl kustomize k8s/base > /dev/null
      - name: Validate k8s/overlays/prod
        run: kubectl kustomize k8s/overlays/prod > /dev/null
      - name: Validate k8s/overlays/prod-release
        run: kubectl kustomize k8s/overlays/prod-release > /dev/null
      - name: Validate infra/k8s/base
        run: kubectl kustomize infra/k8s/base > /dev/null
      - name: Validate infra/k8s/overlays/prod
        run: kubectl kustomize infra/k8s/overlays/prod > /dev/null

  reactor-compile-gate:
    name: Reactor compile gate (no tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile reactor (skip tests)
        run: mvn -B -ntp -q -DskipTests package
      - name: Verify libs compiled
        run: |
          test -f libs/command-schema/target/*.jar
          test -f libs/event-schema/target/*.jar
          test -f libs/sync-protocol/target/*.jar

  shellcheck:
    name: Shellcheck on scripts/
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on canonical scripts
        # Soft fail (continue-on-error) — surfaces issues without blocking PRs
        # while we baseline the existing 70+ shell scripts.
        continue-on-error: true
        run: |
          shopt -s nullglob
          for f in \
            scripts/runtime-up.sh \
            scripts/runtime-down.sh \
            scripts/runtime-status.sh \
            scripts/runtime-smoke.sh \
            scripts/check-local-env.sh \
            scripts/setup-local.sh \
            scripts/setup-ai-local.sh \
            scripts/ai-up.sh \
            scripts/ai-down.sh \
            scripts/verify-ai.sh \
            scripts/verify-observability.sh \
            scripts/verify-prod.sh \
            scripts/runtime/common.sh \
            scripts/ci/jacoco-coverage-summary.sh \
            scripts/ci/test-jacoco-coverage-summary.sh; do
            echo "::group::$f"
            shellcheck -x "$f" || echo "(shellcheck issues above are advisory)"
            echo "::endgroup::"
          done
