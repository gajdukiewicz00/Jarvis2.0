spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: agent-service
  # Only consulted when jarvis.agent.task-store=postgres re-imports DataSource/JPA/Flyway
  # auto-configuration (see AgentServiceApplication + PostgresTaskStoreAutoConfiguration).
  # Inert otherwise — the default in-memory store never touches a datasource.
  datasource:
    url: ${SWARM_DB_URL:}
    username: ${SWARM_DB_USERNAME:}
    password: ${SWARM_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    clean-disabled: true

server:
  port: ${JARVIS_AGENT_PORT:8090}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_AGENT_SSL_ENABLED:false}
    key-store: ${JARVIS_AGENT_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_AGENT_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_AGENT_KEYSTORE_TYPE:PKCS12}

# jarvis.agent.task-store selects the AgentTaskStore implementation: "memory" (default,
# ephemeral), "file" (JSON-per-task, survives a pod restart, no database), or "postgres"
# (JPA + Flyway; also survives a pod restart and requires spring.datasource.* above).
# Role-based agent swarm (House Party Protocol) — feature-flagged, safe-by-default.
swarm:
  enabled: ${SWARM_ENABLED:true}
  workspace:
    # Per-task sandbox root. Pod runs readOnlyRootFilesystem=true, only /tmp is writable.
    dir: ${SWARM_SANDBOX_DIR:/tmp/jarvis-agents}
  queue:
    capacity: ${SWARM_QUEUE_CAPACITY:64}
    worker-pool-size: ${SWARM_WORKER_POOL_SIZE:3}
  task:
    default-timeout-seconds: ${SWARM_TASK_TIMEOUT:120}
    default-max-retries: ${SWARM_TASK_MAX_RETRIES:1}
  swarm-run:
    # Max seconds the coordinator waits for all child tasks before reporting partial results.
    wait-timeout-seconds: ${SWARM_RUN_WAIT_TIMEOUT:60}
    max-roles: ${SWARM_MAX_ROLES:7}
  retention:
    # Periodic sweep of finished (COMPLETED/FAILED/CANCELLED) task records — never touches
    # an active task regardless of age. The newest keep-per-user tasks are always kept.
    enabled: ${SWARM_RETENTION_ENABLED:true}
    max-age-days: ${SWARM_RETENTION_MAX_AGE_DAYS:30}
    keep-per-user: ${SWARM_RETENTION_KEEP_PER_USER:50}
    sweep-interval-ms: ${SWARM_RETENTION_SWEEP_INTERVAL_MS:3600000}

# Reuse the shared safety policy. Conservative defaults: dangerous perms NOT granted.
jarvis:
  tools:
    granted-permissions: ${JARVIS_TOOLS_GRANTED_PERMISSIONS:PLANNER_ACCESS,CALENDAR_ACCESS,MEMORY_ACCESS,SMART_HOME_ACCESS,PC_CONTROL,NOTIFICATION_ACCESS,READ_FILES,NETWORK_ACCESS}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.swarm: DEBUG
    org.springframework.web: INFO
