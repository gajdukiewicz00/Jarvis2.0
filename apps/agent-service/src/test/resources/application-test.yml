# Test profile for agent-service. Disables the hard service-JWT-secret requirement so
# the context starts without cluster secrets; the security filter chain stays ACTIVE
# (SecurityConfig is @Profile("!dev")), so auth is still enforced in tests.
service:
  jwt:
    required: false

swarm:
  enabled: true
  workspace:
    dir: ${java.io.tmpdir}/jarvis-agents-test

# The production default is the durable file-backed store (see application.yml); the
# broad @SpringBootTest suite pins the ephemeral in-memory store explicitly instead, so
# tests stay fast/isolated and never write real JSON files to a shared temp path.
# Persistence itself (task + pending-patch survival across a restart) is covered directly
# by FileBackedAgentTaskStoreTest / PendingPatchStoreTest / AgentTaskServiceTest, which
# construct those stores against a fresh @TempDir per test.
jarvis:
  agent:
    task-store: memory

# Only used by @DataJpaTest slices exercising the Postgres-backed AgentTaskStore
# (org.jarvis.swarm.task.jpa) — an H2 database in PostgreSQL compatibility mode, schema
# generated from the @Entity mapping (Flyway's Postgres-only SQL isn't H2-compatible).
# AgentServiceApplication excludes JPA/DataSource auto-configuration unconditionally, so
# this is inert for every other test (e.g. AgentServiceIntegrationTest).
spring:
  datasource:
    url: jdbc:h2:mem:agent-service-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

logging:
  level:
    org.jarvis.swarm: INFO
