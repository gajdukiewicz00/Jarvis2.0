# Docker profile for analytics-service
# Activate with: SPRING_PROFILES_ACTIVE=docker

jarvis:
  life-tracker:
    url: http://life-tracker:8085

spring:
  cloud:
    openfeign:
      client:
        config:
          life-tracker:
            connectTimeout: 5000
            readTimeout: 30000
            loggerLevel: BASIC

logging:
  level:
    org.jarvis.analytics: INFO
    feign: WARN
