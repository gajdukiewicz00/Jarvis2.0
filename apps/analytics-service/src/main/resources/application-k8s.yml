# =============================================================================
# Jarvis 2.0 - Analytics Service - Kubernetes Profile
# =============================================================================

# Life-tracker URL (для Feign, пока feature flag выключен)
jarvis:
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  features:
    kafka-analytics: ${FEATURE_KAFKA_ANALYTICS:false}
  kafka:
    topics:
      expenses: ${KAFKA_TOPIC_EXPENSES:jarvis.events.expenses}
      time-tracking: ${KAFKA_TOPIC_TIME_TRACKING:jarvis.events.time-tracking}
      calendar: ${KAFKA_TOPIC_CALENDAR:jarvis.events.calendar}

spring:
  # Kafka consumer (когда feature flag включен)
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.jarvis.*"
        isolation.level: read_committed

  cloud:
    openfeign:
      client:
        config:
          life-tracker:
            connectTimeout: 5000
            readTimeout: 30000
            loggerLevel: BASIC
      circuitbreaker:
        enabled: true

# Resilience4j для Feign
resilience4j:
  circuitbreaker:
    instances:
      life-tracker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15000
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      life-tracker:
        maxAttempts: 3
        waitDuration: 2000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    kafka:
      enabled: true
    circuitbreakers:
      enabled: true

logging:
  level:
    org.jarvis.analytics: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"

