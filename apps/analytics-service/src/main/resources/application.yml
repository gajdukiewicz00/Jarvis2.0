server:
  port: ${JARVIS_ANALYTICS_PORT:8087}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_ANALYTICS_SSL_ENABLED:false}
    key-store: ${JARVIS_ANALYTICS_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_ANALYTICS_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_ANALYTICS_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: analytics-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 30000
            loggerLevel: BASIC
          life-tracker:
            connectTimeout: 5000
            readTimeout: 30000    # 30s for data fetching
            loggerLevel: BASIC
      circuitbreaker:
        enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

# Service-to-service JWT (validated by ServiceJwtFilter from jarvis-common)
service:
  jwt:
    secret: ${SERVICE_JWT_SECRET:${JWT_SECRET:}}
jwt:
  secret: ${JWT_SECRET:}

# Life-tracker URL
jarvis:
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  llm-service:
    url: ${LLM_SERVICE_URL:http://llm-service:8091}

# Guarded NL-analytics endpoint (/api/v1/analytics/insights/ask). Disabled by
# default — routing to llm-service needs the host GPU Qwen3-14B brain, which
# isn't assumed to be present/reachable in every environment. When disabled,
# the endpoint still responds with a rule-based fallback summary.
analytics:
  nl:
    llm:
      enabled: ${ANALYTICS_NL_LLM_ENABLED:false}
  llm:
    provider:
      # Privacy guard (LlmPrivacyGuard): analytics-service cannot see which concrete
      # backend answers behind llm-service's HTTP API, so it defaults to treating it
      # as NOT local/NOT cleared for sensitive data — only aggregates are ever sent.
      # Only flip these if the llm-service deployment is verified on-device/trusted.
      local: ${ANALYTICS_LLM_PROVIDER_LOCAL:false}
      allow-sensitive-data: ${ANALYTICS_LLM_PROVIDER_ALLOW_SENSITIVE_DATA:false}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.analytics: INFO
    feign: INFO
    org.springframework.cloud.openfeign: INFO
