server:
  port: ${JARVIS_API_GATEWAY_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  ssl:
    enabled: ${JARVIS_GATEWAY_SSL_ENABLED:false}
    key-store: ${JARVIS_GATEWAY_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_GATEWAY_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_GATEWAY_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: api-gateway
  # Phase 8: Kafka audit publisher (KillSwitch + AgentRegistry → jarvis.audit.events).
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 1
    admin:
      fail-fast: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  # Disable static resource handling - API Gateway doesn't serve static files
  # and this was causing GET /auth/me to fall through to ResourceHttpRequestHandler
  web:
    resources:
      add-mappings: false
  
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: BASIC
          # Longer timeouts for auth operations
          auth-service:
            connectTimeout: 5000
            readTimeout: 30000
          # Longer timeouts for LLM operations  
          llm-service:
            connectTimeout: 5000
            readTimeout: 60000
          # Standard timeouts for data services
          life-tracker:
            connectTimeout: 5000
            readTimeout: 30000
          analytics-service:
            connectTimeout: 5000
            readTimeout: 30000
          vision-security:
            connectTimeout: 5000
            readTimeout: 30000

  lifecycle:
    timeout-per-shutdown-phase: 30s

# Service URLs
services:
  voice-gateway:
    url: ${VOICE_GATEWAY_URL:http://voice-gateway:8081}
  nlp-service:
    url: ${NLP_SERVICE_URL:http://nlp-service:8082}
  orchestrator:
    url: ${ORCHESTRATOR_URL:http://orchestrator:8083}
  pc-control:
    url: ${PC_CONTROL_URL:http://pc-control:8084}
    stub-mode: ${PC_CONTROL_STUB_MODE:false}
    # When the host pc-control process is bridged into the cluster (selectorless
    # host-pc-control Service + Endpoints to the workstation), this lets the
    # direct /api/v1/pc/** routes flow through even in K8s runtime mode.
    local-bridge: ${PC_CONTROL_LOCAL_BRIDGE:false}
  vision-security:
    enabled: ${VISION_SECURITY_ENABLED:false}
    # local-bridge=true tells the gateway that even in k8s runtime mode the
    # vision-security-service Service is wired (selectorless Service +
    # patched Endpoints) to a workstation host process on port 8094 — the
    # K8s-mode guard in GatewayCapabilityService is loosened accordingly.
    # The launcher sets this when ./scripts/product/jarvis-vision-security-up.sh
    # and apply-vision-security-host-endpoints.sh have both succeeded.
    local-bridge: ${VISION_SECURITY_LOCAL_BRIDGE:false}
    url: ${VISION_SECURITY_URL:http://vision-security-service:8094}
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  sync-service:
    url: ${SYNC_SERVICE_URL:http://sync-service:8095}
  user-profile:
    url: ${USER_PROFILE_URL:http://user-profile:8089}
  smart-home:
    url: ${SMART_HOME_URL:http://smart-home-service:8086}
  analytics:
    url: ${ANALYTICS_URL:http://analytics-service:8087}
  planner:
    url: ${PLANNER_URL:http://planner-service:8092}
  security:
    url: ${SECURITY_URL:http://security-service:8088}
  memory:
    enabled: ${MEMORY_SERVICE_ENABLED:false}
    url: ${MEMORY_SERVICE_URL:http://memory-service:8093}
  llm:
    enabled: ${JARVIS_LLM_ENABLED:false}
    url: ${LLM_SERVICE_URL:http://llm-service:8091}
  agent-service:
    url: ${AGENT_SERVICE_URL:http://agent-service:8090}
  media-service:
    url: ${MEDIA_SERVICE_URL:http://media-service:8095}

# Per-downstream-service proxy timeouts (api-gateway hardening #8). Overrides here take
# precedence over ProxyTimeoutPolicy's hardcoded fallbacks; any service key omitted keeps
# using those code defaults. Keys must match the downstreamService identifier passed to
# DownstreamProxyService#forward (e.g. "agent-service", "media-service").
gateway:
  proxy:
    timeout:
      connect-ms-by-service:
        agent-service: ${AGENT_SERVICE_CONNECT_TIMEOUT_MS:5000}
        media-service: ${MEDIA_SERVICE_CONNECT_TIMEOUT_MS:5000}
      read-ms-by-service:
        # Matches ProxyTimeoutPolicy.LLM_READ_TIMEOUT: swarm runs with awaitCompletion=true can
        # block up to swarm.swarm-run.wait-timeout-seconds (default 60s).
        agent-service: ${AGENT_SERVICE_READ_TIMEOUT_MS:60000}
        # Matches ProxyTimeoutPolicy.EXTENDED_READ_TIMEOUT: the synchronous ffprobe endpoint can
        # exceed the default 10s on larger source files.
        media-service: ${MEDIA_SERVICE_READ_TIMEOUT_MS:30000}

# Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

# Actuator & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Rate Limiting (requests per minute)
rate-limit:
  enabled: false
  max-requests-per-minute: 100

# ──────────────────────────────────────────────────────────
# JWT Configuration (canonical namespace: jarvis.jwt.*)
# ──────────────────────────────────────────────────────────
jarvis:
  runtime:
    mode: ${JARVIS_RUNTIME_MODE:}
  jwt:
    enabled: true
    secret: ${JWT_SECRET}
    expiration: 86400000  # 24 hours
    issuer: jarvis
  gateway:
    internal-https:
      enabled: ${JARVIS_GATEWAY_INTERNAL_HTTPS_ENABLED:false}
      port: ${JARVIS_GATEWAY_INTERNAL_HTTPS_PORT:8443}
      key-store: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_PATH:}
      key-store-password: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_PASSWORD:changeit}
      key-store-type: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_TYPE:PKCS12}
      key-alias: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEY_ALIAS:api-gateway-internal}

# Service-to-service JWT (used by FeignAuthConfig to sign X-Service-Token)
# Production must set SERVICE_JWT_SECRET independently of JWT_SECRET (SECURITY_HARDENING_PLAN.md F-002).
# The fallback to ${JWT_SECRET} is retained only so misconfigured local dev still boots; the
# allow-shared-secret guard below prevents this fallback from being silently accepted in non-dev profiles.
service:
  jwt:
    secret: ${SERVICE_JWT_SECRET:${JWT_SECRET}}
    allow-shared-secret: ${SERVICE_JWT_ALLOW_SHARED_SECRET:false}
jwt:
  secret: ${JWT_SECRET:}

# CORS
# Hardening (SECURITY_HARDENING_PLAN.md F-005): allowed-headers is an explicit list to match the
# nginx-ingress narrower allow-list. "*" with allow-credentials=true is fragile if origins ever broaden.
cors:
  enabled: true
  allowed-origins:
    - https://api.jarvis.local
    - https://voice.jarvis.local
    # desktop-javafx (ARCHITECTURE.md "Native Desktop Agent") — config-driven, override via
    # env for local/dev origins. Never widen this list to "*".
    - ${JARVIS_DESKTOP_APP_ORIGIN:https://desktop.jarvis.local}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - X-User-Id
    - X-Username
    - X-User-Roles
    - Accept
    - Accept-Language
  allow-credentials: true

logging:
  level:
    org.jarvis.apigateway: INFO
    org.jarvis.apigateway.security.JwtAuthFilter: INFO
    feign: WARN
    org.springframework.cloud.openfeign: WARN
