server:
  port: ${JARVIS_API_GATEWAY_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  ssl:
    enabled: ${JARVIS_GATEWAY_SSL_ENABLED:false}
    key-store: ${JARVIS_GATEWAY_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_GATEWAY_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_GATEWAY_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  # Disable static resource handling - API Gateway doesn't serve static files
  # and this was causing GET /auth/me to fall through to ResourceHttpRequestHandler
  web:
    resources:
      add-mappings: false
  
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: BASIC
          # Longer timeouts for auth operations
          auth-service:
            connectTimeout: 5000
            readTimeout: 30000
          # Longer timeouts for LLM operations  
          llm-service:
            connectTimeout: 5000
            readTimeout: 60000
          # Standard timeouts for data services
          life-tracker:
            connectTimeout: 5000
            readTimeout: 30000
          analytics-service:
            connectTimeout: 5000
            readTimeout: 30000
          vision-security:
            connectTimeout: 5000
            readTimeout: 30000

  lifecycle:
    timeout-per-shutdown-phase: 30s

# Service URLs
services:
  voice-gateway:
    url: ${VOICE_GATEWAY_URL:http://voice-gateway:8081}
  nlp-service:
    url: ${NLP_SERVICE_URL:http://nlp-service:8082}
  orchestrator:
    url: ${ORCHESTRATOR_URL:http://orchestrator:8083}
  pc-control:
    url: ${PC_CONTROL_URL:http://pc-control:8084}
  vision-security:
    enabled: ${VISION_SECURITY_ENABLED:false}
    url: ${VISION_SECURITY_URL:http://vision-security-service:8094}
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  smart-home:
    url: ${SMART_HOME_URL:http://smart-home-service:8086}
  analytics:
    url: ${ANALYTICS_URL:http://analytics-service:8087}
  planner:
    url: ${PLANNER_URL:http://planner-service:8092}
  security:
    url: ${SECURITY_URL:http://security-service:8088}
  memory:
    enabled: ${MEMORY_SERVICE_ENABLED:false}
    url: ${MEMORY_SERVICE_URL:http://memory-service:8093}
  llm:
    url: ${LLM_SERVICE_URL:http://llm-service:8091}

# Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3

# Actuator & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Rate Limiting (requests per minute)
rate-limit:
  enabled: false
  max-requests-per-minute: 100

# ──────────────────────────────────────────────────────────
# JWT Configuration (canonical namespace: jarvis.jwt.*)
# ──────────────────────────────────────────────────────────
jarvis:
  jwt:
    enabled: true
    secret: ${JWT_SECRET}
    expiration: 86400000  # 24 hours
    issuer: jarvis
  gateway:
    internal-https:
      enabled: ${JARVIS_GATEWAY_INTERNAL_HTTPS_ENABLED:false}
      port: ${JARVIS_GATEWAY_INTERNAL_HTTPS_PORT:8443}
      key-store: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_PATH:}
      key-store-password: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_PASSWORD:changeit}
      key-store-type: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEYSTORE_TYPE:PKCS12}
      key-alias: ${JARVIS_GATEWAY_INTERNAL_HTTPS_KEY_ALIAS:api-gateway-internal}

# Service-to-service JWT (used by FeignAuthConfig to sign X-Service-Token)
service:
  jwt:
    secret: ${SERVICE_JWT_SECRET:${JWT_SECRET}}
jwt:
  secret: ${JWT_SECRET:}

# CORS
cors:
  enabled: true
  allowed-origins:
    - https://api.jarvis.local
    - https://voice.jarvis.local
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

logging:
  level:
    org.jarvis.apigateway: INFO
    org.jarvis.apigateway.security.JwtAuthFilter: INFO
    feign: WARN
    org.springframework.cloud.openfeign: WARN
