server:
  port: ${JARVIS_LIFE_TRACKER_PORT:8085}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_LIFE_TRACKER_SSL_ENABLED:false}
    key-store: ${JARVIS_LIFE_TRACKER_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_LIFE_TRACKER_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_LIFE_TRACKER_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: life-tracker
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool Size - оптимально для микросервиса
      maximum-pool-size: 10
      minimum-idle: 2
      
      # Connection Timeouts
      connection-timeout: 30000       # 30s - время ожидания соединения из пула
      
      # Idle Connection Management
      idle-timeout: 600000            # 10 min - закрытие idle соединений
      
      # Connection Lifetime - КРИТИЧНО для предотвращения "Connection closed"
      max-lifetime: 1200000           # 20 min - обновление до PostgreSQL timeout
      keepalive-time: 300000          # 5 min - keepalive пинг
      
      # Validation
      validation-timeout: 5000        # 5s - проверка валидности
      connection-test-query: SELECT 1 # Тест соединения
      
      # Debugging
      leak-detection-threshold: 60000 # 60s - предупреждение о leak
      
      # Startup
      initialization-fail-timeout: -1 # Не падать если БД недоступна при старте
      
      # Pool name for metrics
      pool-name: life-tracker-pool
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    clean-disabled: true              # Запретить clean в production

  lifecycle:
    timeout-per-shutdown-phase: 30s   # Graceful shutdown

# Service-to-service JWT (validated by ServiceJwtFilter from jarvis-common)
service:
  jwt:
    secret: ${SERVICE_JWT_SECRET:${JWT_SECRET:}}
jwt:
  secret: ${JWT_SECRET:}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.lifetracker: INFO
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.HikariConfig: DEBUG

# Cross-service URLs (movie-JARVIS proactive voice push)
services:
  voice-gateway:
    url: ${VOICE_GATEWAY_URL:http://voice-gateway:8081}

# Proactive warning speaker — cluster speaks life-map warnings on its own.
jarvis:
  proactive:
    enabled: ${JARVIS_PROACTIVE_ENABLED:true}
    users: ${JARVIS_PROACTIVE_USERS:owner}
    interval-ms: ${JARVIS_PROACTIVE_INTERVAL_MS:300000}
    min-gap-seconds: ${JARVIS_PROACTIVE_MIN_GAP_SECONDS:1800}
    language: ${JARVIS_PROACTIVE_LANGUAGE:en-US}
    quiet-start-hour: ${JARVIS_PROACTIVE_QUIET_START:23}
    quiet-end-hour: ${JARVIS_PROACTIVE_QUIET_END:8}
