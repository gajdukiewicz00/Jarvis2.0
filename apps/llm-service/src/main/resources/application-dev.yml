# Development profile for llm-service
# Optimized for local development with llm-server in Docker (CPU inference)

# LLM MUST be enabled
jarvis:
  llm:
    enabled: true

# LLM server running in Docker on host
llm:
  base-url: http://localhost:5000
  timeouts:
    connect-ms: 5000
    read-ms: 900000  # 15 min for CPU inference

# User-profile service is OPTIONAL in dev
services:
  user-profile:
    enabled: false

# Debug logging for troubleshooting
logging:
  level:
    org.jarvis.llm: DEBUG
    org.jarvis.llm.client: DEBUG
    org.jarvis.llm.config: DEBUG
