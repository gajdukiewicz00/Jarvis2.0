server:
  port: ${JARVIS_LLM_SERVICE_PORT:8091}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: llm-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# LLM Configuration
jarvis:
  llm:
    # IMPORTANT: Must be true for LLM to work!
    enabled: ${JARVIS_LLM_ENABLED:false}
    # Phase 3: hard guard against cloud AI URLs at startup. Production must
    # keep this true. Tests run in the `test` Spring profile which bypasses
    # the enforcer.
    local-only: ${JARVIS_LLM_LOCAL_ONLY:true}
    # Host model daemon — three llama.cpp processes on the Linux host fronted
    # by the `host-model-daemon` k8s Service in jarvis-prod.
    host-daemon:
      enabled: ${JARVIS_HOST_DAEMON_ENABLED:true}
      host: ${JARVIS_HOST_DAEMON_HOST:host-model-daemon.jarvis-prod.svc.cluster.local}
      main:
        port: ${JARVIS_HOST_DAEMON_MAIN_PORT:18080}
        health-path: /health
      coding:
        port: ${JARVIS_HOST_DAEMON_CODING_PORT:18081}
        health-path: /health
      router:
        port: ${JARVIS_HOST_DAEMON_ROUTER_PORT:18082}
        health-path: /health

  # AI model stack (see docs/architecture/local-ai-memory-stack.md).
  # Wiring-only: defaults describe the CURRENTLY deployed stack (Qwen) so a
  # fresh checkout reads truthfully. Override via env to flip to the planned
  # Gemma + Devstral stack when the swap lands.
  ai:
    network:
      external-network-allowed: ${JARVIS_AI_EXTERNAL_NETWORK_ALLOWED:false}
    models:
      main:
        id: ${JARVIS_AI_MODEL_MAIN_ID:qwen2.5-3b-instruct-q4_k_m}
        runtime: ${JARVIS_AI_MODEL_MAIN_RUNTIME:llamacpp}
        endpoint: ${JARVIS_AI_MODEL_MAIN_ENDPOINT:http://127.0.0.1:18080}
        context-length: ${JARVIS_AI_MODEL_MAIN_CTX:8192}
      coding:
        id: ${JARVIS_AI_MODEL_CODING_ID:qwen2.5-3b-instruct-q4_k_m}
        runtime: ${JARVIS_AI_MODEL_CODING_RUNTIME:llamacpp}
        endpoint: ${JARVIS_AI_MODEL_CODING_ENDPOINT:http://127.0.0.1:18081}
        context-length: ${JARVIS_AI_MODEL_CODING_CTX:8192}
      router:
        id: ${JARVIS_AI_MODEL_ROUTER_ID:qwen2.5-3b-instruct-q4_k_m}
        runtime: ${JARVIS_AI_MODEL_ROUTER_RUNTIME:llamacpp}
        endpoint: ${JARVIS_AI_MODEL_ROUTER_ENDPOINT:http://127.0.0.1:18082}
        context-length: ${JARVIS_AI_MODEL_ROUTER_CTX:4096}
    embeddings:
      id: ${JARVIS_AI_EMBEDDINGS_ID:multilingual-e5-small}
      runtime: ${JARVIS_AI_EMBEDDINGS_RUNTIME:python-sentence-transformers}
      endpoint: ${JARVIS_AI_EMBEDDINGS_ENDPOINT:http://127.0.0.1:5001}
      dimensions: ${JARVIS_AI_EMBEDDINGS_DIMENSIONS:384}
    reranker:
      enabled: ${JARVIS_AI_RERANKER_ENABLED:false}
      id: ${JARVIS_AI_RERANKER_ID:}
      runtime: ${JARVIS_AI_RERANKER_RUNTIME:}
      endpoint: ${JARVIS_AI_RERANKER_ENDPOINT:}

llm:
  # Phase 3: defaults route to the host model daemon (main channel) instead of
  # the deprecated `llm-server` Python pod. Keep override variable name for
  # backward compatibility with existing scripts.
  base-url: ${LLM_SERVER_URL:http://host-model-daemon.jarvis-prod.svc.cluster.local:18080}
  # Timeouts for chat requests (CPU inference can take 60-120+ seconds)
  timeouts:
    connect-ms: ${LLM_CONNECT_TIMEOUT_MS:5000}
    read-ms: ${LLM_READ_TIMEOUT_MS:600000}  # 10 min default
  # Timeouts for health checks (must be short to not block actuator)
  health:
    timeouts:
      connect-ms: ${LLM_HEALTH_CONNECT_TIMEOUT_MS:2000}
      read-ms: ${LLM_HEALTH_READ_TIMEOUT_MS:2000}
  memory:
    sessionTtl: ${LLM_MEMORY_SESSION_TTL:PT60M}
    maxSessions: ${LLM_MEMORY_MAX_SESSIONS:10000}
    maxMessagesPerSession: ${LLM_MEMORY_MAX_MESSAGES_PER_SESSION:100}
  system-prompt: >
    Ты - Jarvis, персональный AI-ассистент.
    ВАЖНО: Ты ВСЕГДА отвечаешь ТОЛЬКО на русском языке.
    Твои возможности включают: управление компьютером (громкость, приложения, таймеры),
    умный дом (свет, климат), трекинг финансов и времени, календарь, аналитика.
    Ты — агент с инструментами, а не обычный чат. Если пользователь просит действие,
    которое входит в эти возможности (открыть/запустить приложение, включить музыку,
    управлять громкостью или умным домом), НИКОГДА не отвечай, что «не можешь» или что
    «не можешь сделать это из чата». Подтверди, что выполняешь действие, либо задай
    короткий уточняющий вопрос. Ответ «не могу» допустим ТОЛЬКО если действие реально
    вне перечисленных возможностей.
    Отвечай кратко, по-дружески, ТОЛЬКО на русском языке.
  locale:
    default-locale: ru_RU
    force-russian: true
  # Token budget management
  budget:
    system-prompt: ${LLM_BUDGET_SYSTEM:500}
    memory-context: ${LLM_BUDGET_MEMORY:600}
    history: ${LLM_BUDGET_HISTORY:1400}
    total: ${LLM_BUDGET_TOTAL:3500}
  executor:
    core-pool-size: ${LLM_EXECUTOR_CORE_POOL_SIZE:2}
    max-pool-size: ${LLM_EXECUTOR_MAX_POOL_SIZE:4}
    queue-capacity: ${LLM_EXECUTOR_QUEUE_CAPACITY:200}
    keepalive-seconds: ${LLM_EXECUTOR_KEEPALIVE_SECONDS:60}
    shutdown-timeout-seconds: ${LLM_EXECUTOR_SHUTDOWN_TIMEOUT_SECONDS:20}
  # Admission control: prevents VRAM thrash and inference storms
  admission:
    max-concurrent: ${LLM_ADMISSION_MAX_CONCURRENT:1}
    max-queue-depth: ${LLM_ADMISSION_MAX_QUEUE_DEPTH:8}
  # Model profiles: per-channel inference parameters
  profiles:
    voice-fast:
      max-tokens: ${LLM_PROFILE_VOICE_MAX_TOKENS:256}
      temperature: ${LLM_PROFILE_VOICE_TEMPERATURE:0.3}
      timeout-seconds: ${LLM_PROFILE_VOICE_TIMEOUT:15}
    desktop-general:
      max-tokens: ${LLM_PROFILE_DESKTOP_MAX_TOKENS:512}
      temperature: ${LLM_PROFILE_DESKTOP_TEMPERATURE:0.7}
      timeout-seconds: ${LLM_PROFILE_DESKTOP_TIMEOUT:120}
    background-summary:
      max-tokens: ${LLM_PROFILE_BACKGROUND_MAX_TOKENS:1024}
      temperature: ${LLM_PROFILE_BACKGROUND_TEMPERATURE:0.5}
      timeout-seconds: ${LLM_PROFILE_BACKGROUND_TIMEOUT:300}
    orchestration:
      max-tokens: ${LLM_PROFILE_ORCHESTRATION_MAX_TOKENS:700}
      temperature: ${LLM_PROFILE_ORCHESTRATION_TEMPERATURE:0.2}
      timeout-seconds: ${LLM_PROFILE_ORCHESTRATION_TIMEOUT:60}

# Long-term memory integration
memory:
  enabled: ${MEMORY_ENABLED:false}
  service:
    url: ${MEMORY_SERVICE_URL:http://memory-service:8093}
    enabled: ${MEMORY_SERVICE_ENABLED:false}
  search:
    top-k: ${MEMORY_TOPK:5}
    max-tokens: ${MEMORY_MAX_TOKENS:600}

# External services
services:
  user-profile:
    base-url: ${USER_PROFILE_URL:http://user-profile:8089}
    enabled: ${USER_PROFILE_ENABLED:false}  # Optional, disabled by default for standalone testing
    timeouts:
      connect-ms: ${USER_PROFILE_CONNECT_TIMEOUT_MS:3000}
      read-ms: ${USER_PROFILE_READ_TIMEOUT_MS:5000}

# Actuator / Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  pii:
    enabled: ${LOG_PII_ENABLED:false}
    allowQuerySnippet: ${LOG_PII_ALLOW_QUERY_SNIPPET:false}
    querySnippetMaxLength: ${LOG_PII_QUERY_SNIPPET_MAX_LENGTH:32}
  level:
    org.jarvis.llm: INFO
    org.jarvis.llm.config: INFO
