server:
  port: ${JARVIS_LLM_SERVICE_PORT:8091}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: llm-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# LLM Configuration
jarvis:
  llm:
    # IMPORTANT: Must be true for LLM to work!
    enabled: ${JARVIS_LLM_ENABLED:false}

llm:
  base-url: ${LLM_SERVER_URL:http://llm-server:5000}
  # Timeouts for chat requests (CPU inference can take 60-120+ seconds)
  timeouts:
    connect-ms: ${LLM_CONNECT_TIMEOUT_MS:5000}
    read-ms: ${LLM_READ_TIMEOUT_MS:600000}  # 10 min default
  # Timeouts for health checks (must be short to not block actuator)
  health:
    timeouts:
      connect-ms: ${LLM_HEALTH_CONNECT_TIMEOUT_MS:2000}
      read-ms: ${LLM_HEALTH_READ_TIMEOUT_MS:2000}
  memory:
    sessionTtl: ${LLM_MEMORY_SESSION_TTL:PT60M}
    maxSessions: ${LLM_MEMORY_MAX_SESSIONS:10000}
    maxMessagesPerSession: ${LLM_MEMORY_MAX_MESSAGES_PER_SESSION:100}
  system-prompt: >
    Ты - Jarvis, персональный AI-ассистент.
    ВАЖНО: Ты ВСЕГДА отвечаешь ТОЛЬКО на русском языке.
    Твои возможности включают: управление компьютером (громкость, приложения, таймеры), 
    умный дом (свет, климат), трекинг финансов и времени, календарь, аналитика.
    Отвечай кратко, по-дружески, ТОЛЬКО на русском языке.
  locale:
    default-locale: ru_RU
    force-russian: true
  # Token budget management
  budget:
    system-prompt: ${LLM_BUDGET_SYSTEM:500}
    memory-context: ${LLM_BUDGET_MEMORY:600}
    history: ${LLM_BUDGET_HISTORY:1400}
    total: ${LLM_BUDGET_TOTAL:3500}
  executor:
    core-pool-size: ${LLM_EXECUTOR_CORE_POOL_SIZE:2}
    max-pool-size: ${LLM_EXECUTOR_MAX_POOL_SIZE:4}
    queue-capacity: ${LLM_EXECUTOR_QUEUE_CAPACITY:200}
    keepalive-seconds: ${LLM_EXECUTOR_KEEPALIVE_SECONDS:60}
    shutdown-timeout-seconds: ${LLM_EXECUTOR_SHUTDOWN_TIMEOUT_SECONDS:20}
  # Admission control: prevents VRAM thrash and inference storms
  admission:
    max-concurrent: ${LLM_ADMISSION_MAX_CONCURRENT:1}
    max-queue-depth: ${LLM_ADMISSION_MAX_QUEUE_DEPTH:8}
  # Model profiles: per-channel inference parameters
  profiles:
    voice-fast:
      max-tokens: ${LLM_PROFILE_VOICE_MAX_TOKENS:256}
      temperature: ${LLM_PROFILE_VOICE_TEMPERATURE:0.3}
      timeout-seconds: ${LLM_PROFILE_VOICE_TIMEOUT:15}
    desktop-general:
      max-tokens: ${LLM_PROFILE_DESKTOP_MAX_TOKENS:512}
      temperature: ${LLM_PROFILE_DESKTOP_TEMPERATURE:0.7}
      timeout-seconds: ${LLM_PROFILE_DESKTOP_TIMEOUT:120}
    background-summary:
      max-tokens: ${LLM_PROFILE_BACKGROUND_MAX_TOKENS:1024}
      temperature: ${LLM_PROFILE_BACKGROUND_TEMPERATURE:0.5}
      timeout-seconds: ${LLM_PROFILE_BACKGROUND_TIMEOUT:300}
    orchestration:
      max-tokens: ${LLM_PROFILE_ORCHESTRATION_MAX_TOKENS:700}
      temperature: ${LLM_PROFILE_ORCHESTRATION_TEMPERATURE:0.2}
      timeout-seconds: ${LLM_PROFILE_ORCHESTRATION_TIMEOUT:60}

# Long-term memory integration
memory:
  enabled: ${MEMORY_ENABLED:false}
  service:
    url: ${MEMORY_SERVICE_URL:http://memory-service:8093}
    enabled: ${MEMORY_SERVICE_ENABLED:false}
  search:
    top-k: ${MEMORY_TOPK:5}
    max-tokens: ${MEMORY_MAX_TOKENS:600}

# External services
services:
  user-profile:
    base-url: ${USER_PROFILE_URL:http://user-profile:8089}
    enabled: ${USER_PROFILE_ENABLED:false}  # Optional, disabled by default for standalone testing
    timeouts:
      connect-ms: ${USER_PROFILE_CONNECT_TIMEOUT_MS:3000}
      read-ms: ${USER_PROFILE_READ_TIMEOUT_MS:5000}

# Actuator / Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  pii:
    enabled: ${LOG_PII_ENABLED:false}
    allowQuerySnippet: ${LOG_PII_ALLOW_QUERY_SNIPPET:false}
    querySnippetMaxLength: ${LOG_PII_QUERY_SNIPPET_MAX_LENGTH:32}
  level:
    org.jarvis.llm: INFO
    org.jarvis.llm.config: INFO
