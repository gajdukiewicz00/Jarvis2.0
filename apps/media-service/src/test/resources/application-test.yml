# Test profile for media-service.
# Disables the hard requirement for a service-JWT secret so the context can start
# without cluster secrets. The security filter chain stays ACTIVE (SecurityConfig is
# @Profile("!dev")), so authentication is still enforced and auth tests are meaningful.
service:
  jwt:
    required: false

media:
  enabled: true
  ffprobe:
    mode: mock
  ffmpeg:
    mode: mock
  asr:
    mode: mock
  translation:
    mode: mock
  tts:
    mode: mock

# Pin the in-memory job store for the full-context @SpringBootTest. The effective
# production default is now file-backed (FileBackedMediaJobStore, matchIfMissing =
# true) so job history survives a pod restart, but the test suite should stay
# isolated from the developer's real filesystem and not accumulate stray
# /tmp/jarvis-media-jobs/*.json files across local test runs.
jarvis:
  media:
    job-store: memory

logging:
  level:
    org.jarvis.media: INFO
