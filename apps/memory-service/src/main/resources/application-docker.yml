# =============================================================================
# Memory Service - Docker/Kubernetes Profile
# =============================================================================
spring:
  datasource:
    # Use postgres-pgvector service in Kubernetes
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-pgvector:5432/jarvis_memory}
    username: ${SPRING_DATASOURCE_USERNAME:jarvis}
    password: ${SPRING_DATASOURCE_PASSWORD:}

memory:
  embedding:
    service-url: ${EMBEDDING_SERVICE_URL:http://embedding-service:5001}
    timeout-ms: ${EMBEDDING_TIMEOUT_MS:30000}
  
  search:
    top-k: ${MEMORY_TOPK:5}
    max-tokens: ${MEMORY_MAX_TOKENS:600}
    min-similarity: 0.5
  
  chunking:
    size: ${CHUNK_SIZE:500}
    overlap: 50
    min-size: 100

logging:
  level:
    org.jarvis.memory: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
