server:
  port: ${JARVIS_MEMORY_SERVICE_PORT:8093}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: memory-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${MEMORY_DATASOURCE_MAX_POOL_SIZE:8}
      minimum-idle: ${MEMORY_DATASOURCE_MIN_IDLE:1}
      connection-timeout: ${MEMORY_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: 5000
      initialization-fail-timeout: 60000
      pool-name: memory-service-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    table: flyway_schema_history_memory

# Memory service configuration
memory:
  startup:
    fail-fast: ${MEMORY_STARTUP_FAIL_FAST:true}

  embedding:
    service-url: ${EMBEDDING_SERVICE_URL:http://127.0.0.1:5001}
    dimension: 384  # multilingual-e5-small
    timeout-ms: 30000
  
  search:
    top-k: ${MEMORY_TOPK:5}
    max-tokens: ${MEMORY_MAX_TOKENS:600}
    min-similarity: 0.5
  
  chunking:
    size: ${CHUNK_SIZE:500}
    overlap: 50
    min-size: 100

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# Logging
logging:
  pii:
    enabled: ${LOG_PII_ENABLED:false}
    allowQuerySnippet: ${LOG_PII_ALLOW_QUERY_SNIPPET:false}
    querySnippetMaxLength: ${LOG_PII_QUERY_SNIPPET_MAX_LENGTH:32}
  level:
    org.jarvis.memory: INFO
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
