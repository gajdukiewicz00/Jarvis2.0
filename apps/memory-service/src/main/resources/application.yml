server:
  port: ${JARVIS_MEMORY_SERVICE_PORT:8093}
  shutdown: graceful

jarvis:
  audit:
    consumer-group: ${JARVIS_AUDIT_CONSUMER_GROUP:audit-projector}
  memory:
    obsidian:
      enabled: ${JARVIS_OBSIDIAN_ENABLED:true}
      vault-path: ${JARVIS_OBSIDIAN_VAULT_PATH:~/JarvisVault}
      deleted-log-subdir: ${JARVIS_OBSIDIAN_DELETED_LOG_SUBDIR:06_System/deleted-memory-log}
      daily-subdir: ${JARVIS_OBSIDIAN_DAILY_SUBDIR:01_Daily}
      inbox-subdir: ${JARVIS_OBSIDIAN_INBOX_SUBDIR:00_Inbox}
    embedding:
      enabled: ${JARVIS_MEMORY_EMBEDDING_ENABLED:true}
      url: ${JARVIS_MEMORY_EMBEDDING_URL:http://embedding-service:5001/embed}
      timeout-ms: ${JARVIS_MEMORY_EMBEDDING_TIMEOUT_MS:5000}
    # CV screen-context consumer (jarvis.cv.screen_context.created -> Postgres).
    cv:
      enabled: ${JARVIS_MEMORY_CV_ENABLED:true}
      topic: ${JARVIS_MEMORY_CV_TOPIC:jarvis.cv.screen_context.created}
      consumer-group: ${JARVIS_MEMORY_CV_CONSUMER_GROUP:cv-screen-context-projector}
      store-raw-screenshot: ${JARVIS_MEMORY_CV_STORE_RAW_SCREENSHOT:true}
      max-screenshot-bytes: ${JARVIS_MEMORY_CV_MAX_SCREENSHOT_BYTES:8388608}
      embed: ${JARVIS_MEMORY_CV_EMBED:true}
    # Roadmap P1 #9 — user-managed memory: dedup, TTL/expiry, review queue, export.
    dedup:
      enabled: ${JARVIS_MEMORY_DEDUP_ENABLED:true}
      strategy: ${JARVIS_MEMORY_DEDUP_STRATEGY:MERGE}
    expiry:
      enabled: ${JARVIS_MEMORY_EXPIRY_ENABLED:true}
      cleanup-interval-ms: ${JARVIS_MEMORY_EXPIRY_CLEANUP_INTERVAL_MS:3600000}
    review:
      pending-confidence-threshold: ${JARVIS_MEMORY_REVIEW_THRESHOLD:0.50}
    export:
      # Base64 AES-256 key. Blank (default) = /export/encrypted and
      # /import/encrypted are disabled (400) rather than silently no-op encrypting.
      encryption-key-base64: ${JARVIS_MEMORY_EXPORT_ENCRYPTION_KEY:}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: memory-service

  # Phase 8: Kafka consumer for the audit projector. Topology is declared
  # by jarvis-common's KafkaTopologyConfig (auto-loaded when bootstrap-servers is set).
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${JARVIS_AUDIT_CONSUMER_GROUP:audit-projector}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
      missing-topics-fatal: false

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${MEMORY_DATASOURCE_MAX_POOL_SIZE:8}
      minimum-idle: ${MEMORY_DATASOURCE_MIN_IDLE:1}
      connection-timeout: ${MEMORY_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: 5000
      initialization-fail-timeout: 60000
      pool-name: memory-service-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    table: flyway_schema_history_memory

# Memory service configuration
memory:
  startup:
    fail-fast: ${MEMORY_STARTUP_FAIL_FAST:true}

  embedding:
    service-url: ${EMBEDDING_SERVICE_URL:http://127.0.0.1:5001}
    dimension: 384  # multilingual-e5-small
    timeout-ms: 30000
  
  search:
    top-k: ${MEMORY_TOPK:5}
    max-tokens: ${MEMORY_MAX_TOKENS:600}
    min-similarity: 0.5
  
  chunking:
    size: ${CHUNK_SIZE:500}
    overlap: 50
    min-size: 100

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  pii:
    enabled: ${LOG_PII_ENABLED:false}
    allowQuerySnippet: ${LOG_PII_ALLOW_QUERY_SNIPPET:false}
    querySnippetMaxLength: ${LOG_PII_QUERY_SNIPPET_MAX_LENGTH:32}
  level:
    org.jarvis.memory: INFO
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
