server:
  port: ${JARVIS_NLP_SERVICE_PORT:8082}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_NLP_SSL_ENABLED:false}
    key-store: ${JARVIS_NLP_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_NLP_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_NLP_KEYSTORE_TYPE:PKCS12}

jarvis:
  nlp:
    # Phase 3: when true, /api/v1/nlp/intent-fast tries the host router model
    # via llm-service before falling back to the deterministic regex engine.
    # Default false until a router GGUF is actually loaded on the host.
    fast-intent:
      enabled: ${JARVIS_NLP_FAST_INTENT_ENABLED:false}
      url: ${JARVIS_NLP_FAST_INTENT_URL:http://llm-service:8091/api/v1/llm/intent}
      timeout-ms: ${JARVIS_NLP_FAST_INTENT_TIMEOUT_MS:1500}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: nlp-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.nlp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"
