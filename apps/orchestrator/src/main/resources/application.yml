server:
  port: ${JARVIS_ORCHESTRATOR_PORT:8083}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_ORCHESTRATOR_SSL_ENABLED:false}
    key-store: ${JARVIS_ORCHESTRATOR_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_ORCHESTRATOR_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_ORCHESTRATOR_KEYSTORE_TYPE:PKCS12}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: orchestrator
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  # Phase 4: RabbitMQ command pipeline. Topology auto-declared by
  # jarvis-common's RabbitTopologyConfig once spring.rabbitmq.host is set.
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:jarvis}
    password: ${SPRING_RABBITMQ_PASSWORD:jarvis}
    virtual-host: ${SPRING_RABBITMQ_VHOST:jarvis}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 4
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 500ms
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 10000
            loggerLevel: BASIC
          # Per-dependency timeout budgets: named clients match each @FeignClient's
          # `name` attribute. Non-critical / best-effort dependencies get a
          # tighter budget so a hanging downstream service fails fast into the
          # retry + circuit-breaker path instead of blocking the request thread.
          nlp-service:
            connectTimeout: 1000
            readTimeout: 3000
          memory-service:
            connectTimeout: 1000
            readTimeout: 2000
          pc-control:
            connectTimeout: 1000
            readTimeout: 3000
          smart-home-service:
            connectTimeout: 1000
            readTimeout: 3000
          api-gateway-pc:
            connectTimeout: 1000
            readTimeout: 3000

# Service URLs (in-cluster defaults)
jarvis:
  # Phase 4: command pipeline tuning
  command:
    default-ttl-seconds: ${JARVIS_COMMAND_DEFAULT_TTL_SECONDS:30}
    pending:
      sweep-interval-ms: ${JARVIS_COMMAND_PENDING_SWEEP_MS:1000}
  nlp:
    url: ${NLP_SERVICE_URL:http://nlp-service:8082}
    # NLP call resilience: bounded retry with backoff (analyze is a pure read,
    # safe to retry) plus a circuit breaker. On exhaustion/open circuit,
    # processText degrades to the LLM/rule-based fallback instead of failing.
    retry:
      max-attempts: ${JARVIS_NLP_RETRY_MAX_ATTEMPTS:2}
      initial-backoff-ms: ${JARVIS_NLP_RETRY_BACKOFF_MS:200}
    circuit-breaker:
      failure-threshold: ${JARVIS_NLP_CB_FAILURE_THRESHOLD:3}
      reset-timeout-seconds: ${JARVIS_NLP_CB_RESET_SECONDS:30}
  pc-control:
    url: ${PC_CONTROL_URL:http://pc-control:8084}
  smart-home:
    url: ${SMART_HOME_URL:http://smart-home-service:8086}
  memory:
    url: ${MEMORY_SERVICE_URL:http://memory-service:8093}
    # Memory-service is a non-critical, best-effort dependency for the assist
    # flow: reads are retried (idempotent search), writes are not (ingest has
    # side effects). Shared circuit breaker degrades assist responses with a
    # `degraded: true` flag instead of failing the whole request.
    retry:
      max-attempts: ${JARVIS_MEMORY_RETRY_MAX_ATTEMPTS:2}
      initial-backoff-ms: ${JARVIS_MEMORY_RETRY_BACKOFF_MS:200}
    circuit-breaker:
      failure-threshold: ${JARVIS_MEMORY_CB_FAILURE_THRESHOLD:3}
      reset-timeout-seconds: ${JARVIS_MEMORY_CB_RESET_SECONDS:30}
  llm:
    url: ${LLM_SERVICE_URL:http://llm-service:8091}
    # LLM Feature flag - disabled by default for stability
    enabled: ${JARVIS_LLM_ENABLED:false}
    # Timeout for LLM calls (seconds)
    timeout-seconds: ${JARVIS_LLM_TIMEOUT_SECONDS:10}
    # Circuit breaker configuration
    circuit-breaker:
      # Open circuit after N consecutive failures
      failure-threshold: ${JARVIS_LLM_CB_FAILURE_THRESHOLD:3}
      # Keep circuit open for N seconds before retrying
      reset-timeout-seconds: ${JARVIS_LLM_CB_RESET_SECONDS:60}

orchestrator:
  executor:
    core-pool-size: ${ORCHESTRATOR_EXECUTOR_CORE_POOL_SIZE:2}
    max-pool-size: ${ORCHESTRATOR_EXECUTOR_MAX_POOL_SIZE:4}
    queue-capacity: ${ORCHESTRATOR_EXECUTOR_QUEUE_CAPACITY:32}
    keep-alive-seconds: ${ORCHESTRATOR_EXECUTOR_KEEP_ALIVE_SECONDS:30}
    shutdown-await-seconds: ${ORCHESTRATOR_EXECUTOR_SHUTDOWN_AWAIT_SECONDS:10}

# API Gateway for PC Control WebSocket
api-gateway:
  url: ${API_GATEWAY_URL:http://api-gateway:8080}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  level:
    org.jarvis.orchestrator: INFO
