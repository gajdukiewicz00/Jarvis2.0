server:
  port: ${JARVIS_ORCHESTRATOR_PORT:8083}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_ORCHESTRATOR_SSL_ENABLED:false}
    key-store: ${JARVIS_ORCHESTRATOR_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_ORCHESTRATOR_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_ORCHESTRATOR_KEYSTORE_TYPE:PKCS12}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: orchestrator
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
  # Phase 4: RabbitMQ command pipeline. Topology auto-declared by
  # jarvis-common's RabbitTopologyConfig once spring.rabbitmq.host is set.
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:jarvis}
    password: ${SPRING_RABBITMQ_PASSWORD:jarvis}
    virtual-host: ${SPRING_RABBITMQ_VHOST:jarvis}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 4
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 500ms
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 10000
            loggerLevel: BASIC

# Service URLs (in-cluster defaults)
jarvis:
  # Phase 4: command pipeline tuning
  command:
    default-ttl-seconds: ${JARVIS_COMMAND_DEFAULT_TTL_SECONDS:30}
    pending:
      sweep-interval-ms: ${JARVIS_COMMAND_PENDING_SWEEP_MS:1000}
  nlp:
    url: ${NLP_SERVICE_URL:http://nlp-service:8082}
  pc-control:
    url: ${PC_CONTROL_URL:http://pc-control:8084}
  smart-home:
    url: ${SMART_HOME_URL:http://smart-home-service:8086}
  llm:
    url: ${LLM_SERVICE_URL:http://llm-service:8091}
    # LLM Feature flag - disabled by default for stability
    enabled: ${JARVIS_LLM_ENABLED:false}
    # Timeout for LLM calls (seconds)
    timeout-seconds: ${JARVIS_LLM_TIMEOUT_SECONDS:10}
    # Circuit breaker configuration
    circuit-breaker:
      # Open circuit after N consecutive failures
      failure-threshold: ${JARVIS_LLM_CB_FAILURE_THRESHOLD:3}
      # Keep circuit open for N seconds before retrying
      reset-timeout-seconds: ${JARVIS_LLM_CB_RESET_SECONDS:60}

orchestrator:
  executor:
    core-pool-size: ${ORCHESTRATOR_EXECUTOR_CORE_POOL_SIZE:2}
    max-pool-size: ${ORCHESTRATOR_EXECUTOR_MAX_POOL_SIZE:4}
    queue-capacity: ${ORCHESTRATOR_EXECUTOR_QUEUE_CAPACITY:32}
    keep-alive-seconds: ${ORCHESTRATOR_EXECUTOR_KEEP_ALIVE_SECONDS:30}
    shutdown-await-seconds: ${ORCHESTRATOR_EXECUTOR_SHUTDOWN_AWAIT_SECONDS:10}

# API Gateway for PC Control WebSocket
api-gateway:
  url: ${API_GATEWAY_URL:http://api-gateway:8080}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  level:
    org.jarvis.orchestrator: INFO
