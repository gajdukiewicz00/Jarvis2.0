# =============================================================================
# Jarvis 2.0 - PC Control - Kubernetes Profile
# =============================================================================
# ВАЖНО: В K8s используется StubSystemControlService вместо LinuxSystemControlService
# так как в контейнере нет доступа к X11/PulseAudio хоста.
# =============================================================================

server:
  port: 8084

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

  # RabbitMQ consumer
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:jarvis}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:jarvis}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  # Kafka отключена по умолчанию
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jarvis:
  rabbitmq:
    queue: ${RABBITMQ_QUEUE_PC_CONTROL:pc-control.commands}
  kafka:
    topic: ${KAFKA_TOPIC_PC_CONTROL:jarvis.events.pc-control}
  features:
    rabbitmq-enabled: ${FEATURE_RABBITMQ_PC_CONTROL:false}
    kafka-enabled: false  # Kafka отключена в dev

# PC Control specific settings for K8s
pc-control:
  # Stub mode активируется автоматически через @Profile("k8s") на StubSystemControlService
  stub-mode: true

security:
  allowed-actions: ${SECURITY_ALLOWED_ACTIONS:VOLUME_UP,VOLUME_DOWN,VOLUME_MUTE,LAUNCH_APP,MEDIA_CONTROL,TIMER_START,TIMER_STOP}

# Actuator для K8s probes
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    rabbit:
      enabled: false  # Не падать если RabbitMQ недоступен
    kafka:
      enabled: false  # Kafka отключена

logging:
  level:
    org.jarvis.pccontrol: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"

