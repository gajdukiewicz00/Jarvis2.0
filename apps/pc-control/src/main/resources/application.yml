server:
  port: ${JARVIS_PC_CONTROL_PORT:8084}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_PC_CONTROL_SSL_ENABLED:false}
    key-store: ${JARVIS_PC_CONTROL_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_PC_CONTROL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_PC_CONTROL_KEYSTORE_TYPE:PKCS12}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: pc-control
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:jarvis}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jarvis:
  rabbitmq:
    queue: ${RABBITMQ_QUEUE_PC_CONTROL:pc-control.commands}
  kafka:
    topic: ${KAFKA_TOPIC_PC_CONTROL:jarvis.events.pc-control}
  features:
    rabbitmq-enabled: ${FEATURE_RABBITMQ_PC_CONTROL:false}
    kafka-enabled: ${FEATURE_KAFKA_PC_CONTROL:false}

pc-control:
  stub-mode: ${PC_CONTROL_STUB_MODE:false}
  file-root: ${PC_CONTROL_FILE_ROOT:/var/jarvis/shared}
  file-extensions: ${PC_CONTROL_FILE_EXTENSIONS:txt,log,md,json,yml,yaml,csv}
  desktop:
    application-dirs:
      - /usr/share/applications
      - ${user.home}/.local/share/applications
    browser-candidates:
      - firefox
      - google-chrome
      - chromium
      - brave-browser
      - microsoft-edge
      - microsoft-edge-stable
    amixer-control: ${PC_CONTROL_AMIXER_CONTROL:Master}

security:
  allowed-actions: ${SECURITY_ALLOWED_ACTIONS:MEDIA_CONTROL,VOLUME_UP,VOLUME_DOWN,SET_VOLUME,VOLUME_SET,MUTE,UNMUTE,PLAY_PAUSE,PAUSE,NEXT,PREV,OPEN_APP,OPEN_URL,HOTKEY,NOTIFY,SYSTEM_COMMAND,SCENARIO}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    rabbit:
      enabled: false
    kafka:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.pccontrol: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] [requestId=%X{requestId:-}] [correlationId=%X{correlationId:-}] %logger{36} - %msg%n"
