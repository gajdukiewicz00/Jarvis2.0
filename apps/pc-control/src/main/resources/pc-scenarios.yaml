scenarios:
  - name: legacy_window_normalize
    description: "Normalize the active window."
    steps:
      - id: normalize-window
        actionType: WINDOW_NORMALIZE
        description: "Normalize the active window"

  - name: legacy_window_minimize
    description: "Minimize the active window."
    steps:
      - id: minimize-window
        actionType: WINDOW_MINIMIZE
        description: "Minimize the active window"

  - name: legacy_mouse_left_click
    description: "Click the left mouse button."
    steps:
      - id: click-left
        actionType: MOUSE_LEFT_CLICK
        description: "Click the left mouse button"

  - name: legacy_empty_trash
    description: "Empty the desktop trash."
    steps:
      - id: empty-trash
        actionType: EMPTY_TRASH
        description: "Empty the trash"

  - name: legacy_create_new_folder
    description: "Create a new folder in the active file manager view."
    steps:
      - id: folder-hotkey
        actionType: HOTKEY
        parameters:
          keyCombination: "ctrl+shift+n"
        description: "Open the new folder shortcut"
      - id: wait-after-hotkey
        actionType: WAIT
        parameters:
          millis: "300"
        description: "Wait for the folder input to appear"
      - id: confirm-folder
        actionType: HOTKEY
        parameters:
          keyCombination: "Return"
        description: "Confirm the new folder"

  - name: legacy_open_optical_drive
    description: "Open the optical drive tray."
    steps:
      - id: open-drive
        actionType: OPEN_OPTICAL_DRIVE
        description: "Open the optical drive tray"

  - name: legacy_close_optical_drive
    description: "Close the optical drive tray."
    steps:
      - id: close-drive
        actionType: CLOSE_OPTICAL_DRIVE
        description: "Close the optical drive tray"

  - name: legacy_clean_slate_cancel
    description: "Replay the legacy desktop context-menu clean-slate macro."
    steps:
      - id: move-corner
        actionType: MOUSE_MOVE
        parameters:
          x: "1026"
          y: "25"
        description: "Move to the top-right desktop area"
      - id: open-context-menu
        actionType: MOUSE_RIGHT_CLICK
        description: "Open the desktop context menu"
      - id: move-context-item
        actionType: MOUSE_MOVE
        parameters:
          x: "1068"
          y: "37"
        description: "Move to the first menu item"
      - id: click-context-item
        actionType: MOUSE_LEFT_CLICK
        description: "Select the first menu item"
      - id: wait-context-transition
        actionType: WAIT
        parameters:
          millis: "200"
        description: "Wait for the submenu transition"
      - id: move-submenu-item
        actionType: MOUSE_MOVE
        parameters:
          x: "769"
          y: "164"
        description: "Move to the submenu item"
      - id: click-submenu-item
        actionType: MOUSE_LEFT_CLICK
        description: "Select the submenu item"

  - name: legacy_ppt_delete_slide
    description: "Open the PowerPoint delete-slide command."
    steps:
      - id: open-edit-tab
        actionType: HOTKEY
        parameters:
          keyCombination: "Alt+z"
      - id: wait-ribbon
