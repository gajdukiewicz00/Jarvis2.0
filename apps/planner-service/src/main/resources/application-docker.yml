spring:
  application:
    name: planner-service
  
  datasource:
    url: jdbc:postgresql://postgres:5432/jarvis_db
    username: jarvis
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000  # 20 minutes - refresh before PostgreSQL timeout
      keepalive-time: 300000  # 5 minutes - keep connections alive
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      initialization-fail-timeout: -1
  
  jpa:
    open-in-view: false
  
  flyway:
    baseline-on-migrate: true
    repair-on-migrate: true

services:
  life-tracker:
    url: http://life-tracker:8085
  analytics:
    url: http://analytics-service:8087
  user-profile:
    url: http://user-profile:8089
  llm-service:
    url: http://llm-service:8091

logging:
  level:
    org.jarvis.planner: INFO
