# =============================================================================
# Jarvis 2.0 - Planner Service - Kubernetes Profile
# =============================================================================
# Активируется через: SPRING_PROFILES_ACTIVE=k8s
# ВАЖНО: При checksum mismatch в Flyway нужно очистить схему planner-service
# в PostgreSQL (DROP SCHEMA planner CASCADE; CREATE SCHEMA planner;)
# =============================================================================

spring:
  application:
    name: planner-service
  
  datasource:
    url: jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_db
    username: ${SPRING_DATASOURCE_USERNAME:jarvis}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000
      keepalive-time: 300000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: planner
  
  # Flyway Configuration
  # ВАЖНО: используем отдельную схему planner чтобы избежать конфликтов с life-tracker
  flyway:
    enabled: true
    schemas: planner
    default-schema: planner
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: true
    # table: flyway_schema_history_planner  # альтернатива - отдельная таблица истории

server:
  port: 8092

# External services
services:
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  analytics:
    url: ${ANALYTICS_URL:http://analytics-service:8087}
  user-profile:
    url: ${USER_PROFILE_URL:http://user-profile:8089}
  # LLM временно отключен
  # llm-service:
  #   url: ${LLM_SERVICE_URL:http://llm-service:8091}

# Planner configuration
planner:
  task:
    default-duration: 30
    max-daily-tasks: 8
  reminder:
    advance-notification: 15
  plan:
    generation-time: "06:00"
    work-hours-start: "09:00"
    work-hours-end: "17:00"

# Actuator для K8s probes
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# Logging
logging:
  level:
    org.jarvis.planner: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"

