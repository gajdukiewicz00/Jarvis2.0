spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: planner-service
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000
      keepalive-time: 300000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
      initialization-fail-timeout: -1
      auto-commit: true
      register-mbeans: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: planner
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: false
    repair-on-migrate: true
    table: flyway_schema_history_planner
    schemas: planner
    default-schema: planner
    create-schemas: true

server:
  port: ${JARVIS_PLANNER_PORT:8092}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_PLANNER_SSL_ENABLED:false}
    key-store: ${JARVIS_PLANNER_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_PLANNER_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_PLANNER_KEYSTORE_TYPE:PKCS12}

# External services
services:
  api-gateway:
    url: ${API_GATEWAY_URL:http://api-gateway:8080}
  analytics:
    url: ${ANALYTICS_URL:http://analytics-service:8087}
  life-tracker:
    url: ${LIFE_TRACKER_URL:http://life-tracker:8085}
  user-profile:
    url: ${USER_PROFILE_URL:http://user-profile:8089}
  llm-service:
    url: ${LLM_SERVICE_URL:http://llm-service:8091}
  voice-gateway:
    url: ${VOICE_GATEWAY_URL:http://voice-gateway:8081}

# Planner configuration
planner:
  task:
    default-duration: 30  # minutes
    max-daily-tasks: 8
  reminder:
    advance-notification: 15  # minutes before
  plan:
    generation-time: "06:00"  # Daily plan generation time
    work-hours-start: "09:00"
    work-hours-end: "17:00"
  auto-actions:
    scheduler-enabled: ${PLANNER_AUTO_ACTIONS_SCHEDULER_ENABLED:false}
    user-id: ${PLANNER_AUTO_ACTIONS_USER_ID:}
  llm:
    enabled: ${PLANNER_LLM_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Logging
logging:
  level:
    org.jarvis.planner: DEBUG
    org.springframework.web: INFO
