# Development profile for security-service
# Activate with: SPRING_PROFILES_ACTIVE=dev

# Extended JWT expiration for development (24 hours instead of 1 hour)
jarvis:
  jwt:
    access-expiration: 86400000  # 24 hours for dev convenience
    refresh-expiration: 604800000  # 7 days

logging:
  level:
    org.jarvis.security: DEBUG

