server:
  port: ${JARVIS_SECURITY_PORT:8088}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_SECURITY_SSL_ENABLED:false}
    key-store: ${JARVIS_SECURITY_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_SECURITY_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_SECURITY_KEYSTORE_TYPE:PKCS12}

spring:
  application:
    name: security-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  
  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool Size
      maximum-pool-size: 10
      minimum-idle: 2
      
      # Connection Timeouts
      connection-timeout: 30000       # 30s
      
      # Idle Connection Management  
      idle-timeout: 600000            # 10 min
      
      # Connection Lifetime - предотвращение "Connection closed"
      max-lifetime: 1200000           # 20 min
      keepalive-time: 300000          # 5 min
      
      # Validation
      validation-timeout: 5000        # 5s
      connection-test-query: SELECT 1
      
      # Startup
      initialization-fail-timeout: -1
      
      # Pool name
      pool-name: security-service-pool
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: security
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
    table: flyway_schema_history_security
    schemas: security
    default-schema: security
    create-schemas: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

# JWT Configuration
jarvis:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: 3600000    # 1 hour in prod
    refresh-expiration: 604800000 # 7 days
    issuer: jarvis
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    role: ${BOOTSTRAP_ADMIN_ROLE:ADMIN}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.security: INFO
    com.zaxxer.hikari: INFO
