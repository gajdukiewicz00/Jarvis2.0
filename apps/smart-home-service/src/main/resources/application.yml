server:
  port: ${JARVIS_SMART_HOME_PORT:8086}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_SMART_HOME_SSL_ENABLED:false}
    key-store: ${JARVIS_SMART_HOME_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_SMART_HOME_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_SMART_HOME_KEYSTORE_TYPE:PKCS12}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: smart-home-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:jarvis}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Device state-history persistence
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SMART_HOME_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SMART_HOME_DATASOURCE_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      pool-name: smart-home-service-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    clean-disabled: true

jarvis:
  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://mosquitto:1883}
    client-id: ${MQTT_CLIENT_ID:jarvis-smart-home}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
  rabbitmq:
    queue: ${RABBITMQ_QUEUE_SMART_HOME:smart-home.commands}
  kafka:
    topic: ${KAFKA_TOPIC_SMART_HOME:jarvis.events.smarthome}
  features:
    rabbitmq-enabled: ${FEATURE_RABBITMQ_SMART_HOME:false}

# Service-to-service JWT (validated by ServiceJwtFilter from jarvis-common)
service:
  jwt:
    secret: ${SERVICE_JWT_SECRET:${JWT_SECRET:}}
jwt:
  secret: ${JWT_SECRET:}

smarthome:
  provider: ${SMART_HOME_PROVIDER:mqtt}

security:
  allowed-actions: ${SECURITY_ALLOWED_ACTIONS:TURN_ON,TURN_OFF,TOGGLE,DIM,BRIGHTEN,SET_COLOR,SET_TEMPERATURE,SET_BRIGHTNESS,LOCK,UNLOCK,OPEN,CLOSE}

# Actuator & Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    rabbit:
      enabled: false
    kafka:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.smarthome: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"
