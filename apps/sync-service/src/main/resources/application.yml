spring:
  application:
    name: sync-service
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${JARVIS_SYNC_SERVICE_PORT:8095}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jarvis:
  sync:
    # Where the long-lived server X25519+Ed25519 keys are persisted (so paired
    # devices keep working across restarts). Created with mode 0600 on first boot.
    server-key-path: ${JARVIS_SYNC_SERVER_KEY_PATH:/var/lib/jarvis/sync/server-keys.json}
    # Replay window: at most this many recent nonces tracked per device.
    replay-cache-size-per-device: 4096
    # Pairing-init nonces are only valid this long.
    pairing-nonce-ttl-seconds: 120
    # Where decrypted payloads are dispatched.
    life-tracker-url: ${JARVIS_SYNC_LIFE_TRACKER_URL:http://life-tracker:8085}
    orchestrator-url: ${JARVIS_SYNC_ORCHESTRATOR_URL:http://orchestrator:8080}
    dispatch-timeout-millis: 1500

logging:
  level:
    org.jarvis.syncservice: INFO
