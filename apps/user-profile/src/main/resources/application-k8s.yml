# =============================================================================
# Jarvis 2.0 - User Profile - Kubernetes Profile
# =============================================================================

spring:
  application:
    name: user-profile
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/jarvis_user_profile}
    username: ${SPRING_DATASOURCE_USERNAME:jarvis}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000
      keepalive-time: 300000
      validation-timeout: 5000
      connection-test-query: SELECT 1
      initialization-fail-timeout: -1
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update  # Автоматически добавляет недостающие колонки
    show-sql: false
  
  # ВРЕМЕННО: Flyway отключен, таблицы уже созданы вручную
  # После очистки БД включить обратно
  flyway:
    enabled: false

server:
  port: 8089

# Actuator для K8s probes
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.jarvis.userprofile: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] %logger{36} - %msg%n"

