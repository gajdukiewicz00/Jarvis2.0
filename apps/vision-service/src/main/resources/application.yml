server:
  port: ${JARVIS_VISION_SERVICE_PORT:8094}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: vision-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

vision:
  enabled: ${VISION_SERVICE_ENABLED:true}
  detector-provider: ${VISION_DETECTOR_PROVIDER:opencv-haarcascade}
  verifier-provider: ${VISION_VERIFIER_PROVIDER:embedding-cosine-mvp}
  similarity-threshold: ${VISION_SIMILARITY_THRESHOLD:0.82}
  minimum-face-size-pixels: ${VISION_MIN_FACE_SIZE:80}
  face-cascade-path: ${VISION_FACE_CASCADE_PATH:}
  owner-reference-directory: ${VISION_OWNER_REFERENCE_DIRECTORY:${user.home}/.jarvis/security-monitoring/owner-reference}
  reference-extensions: ${VISION_REFERENCE_EXTENSIONS:jpg,jpeg,png,bmp}
  pipeline:
    gamma: ${VISION_PIPELINE_GAMMA:1.10}
    blur-kernel-size: ${VISION_PIPELINE_BLUR_KERNEL_SIZE:5}
    adaptive-threshold-block-size: ${VISION_PIPELINE_ADAPTIVE_THRESHOLD_BLOCK_SIZE:21}
    adaptive-threshold-constant: ${VISION_PIPELINE_ADAPTIVE_THRESHOLD_CONSTANT:5.0}
    canny-low-threshold: ${VISION_PIPELINE_CANNY_LOW_THRESHOLD:40}
    canny-high-threshold: ${VISION_PIPELINE_CANNY_HIGH_THRESHOLD:120}
    morphology-kernel-size: ${VISION_PIPELINE_MORPHOLOGY_KERNEL_SIZE:5}
    minimum-candidate-area-pixels: ${VISION_PIPELINE_MIN_CANDIDATE_AREA_PIXELS:400}
  embedding:
    face-image-size: ${VISION_EMBEDDING_FACE_IMAGE_SIZE:64}
    pooling-grid-size: ${VISION_EMBEDDING_POOLING_GRID_SIZE:8}
    model:
      backend: ${VISION_EMBEDDING_MODEL_BACKEND:opencv-dnn-onnx}
      profile: ${VISION_EMBEDDING_MODEL_PROFILE:arcface-112-rgb}
      path: ${VISION_EMBEDDING_MODEL_PATH:}
      input-width: ${VISION_EMBEDDING_MODEL_INPUT_WIDTH:112}
      input-height: ${VISION_EMBEDDING_MODEL_INPUT_HEIGHT:112}
      scale: ${VISION_EMBEDDING_MODEL_SCALE:0.0078125}
      mean-blue: ${VISION_EMBEDDING_MODEL_MEAN_BLUE:127.5}
      mean-green: ${VISION_EMBEDDING_MODEL_MEAN_GREEN:127.5}
      mean-red: ${VISION_EMBEDDING_MODEL_MEAN_RED:127.5}
      swap-red-blue: ${VISION_EMBEDDING_MODEL_SWAP_RB:true}
      output-name: ${VISION_EMBEDDING_MODEL_OUTPUT_NAME:}
      expected-embedding-length: ${VISION_EMBEDDING_MODEL_EXPECTED_LENGTH:512}
      validate-on-startup: ${VISION_EMBEDDING_MODEL_VALIDATE_ON_STARTUP:true}
      similarity-threshold: ${VISION_EMBEDDING_MODEL_SIMILARITY_THRESHOLD:}
  alignment:
    enabled: ${VISION_ALIGNMENT_ENABLED:true}
    minimum-eye-separation-ratio: ${VISION_ALIGNMENT_MIN_EYE_SEPARATION_RATIO:0.18}
    maximum-roll-angle-degrees: ${VISION_ALIGNMENT_MAX_ROLL_DEGREES:20.0}
  reference-cache:
    prewarm-on-startup: ${VISION_REFERENCE_CACHE_PREWARM_ON_STARTUP:false}
  liveness:
    enabled: ${VISION_LIVENESS_ENABLED:true}
    minimum-sharpness: ${VISION_LIVENESS_MIN_SHARPNESS:18.0}
    minimum-contrast: ${VISION_LIVENESS_MIN_CONTRAST:18.0}
    pass-threshold: ${VISION_LIVENESS_PASS_THRESHOLD:0.55}
  screen:
    enabled: ${VISION_SCREEN_ANALYSIS_ENABLED:true}
    ocr-ready-contrast-threshold: ${VISION_SCREEN_OCR_READY_CONTRAST_THRESHOLD:22.0}
    text-edge-density-threshold: ${VISION_SCREEN_TEXT_EDGE_DENSITY_THRESHOLD:0.08}
    sensitive-threshold: ${VISION_SCREEN_SENSITIVE_THRESHOLD:0.60}
  enrollment:
    enabled: ${VISION_ENROLLMENT_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.jarvis.vision: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-}] [requestId=%X{requestId:-}] [correlationId=%X{correlationId:-}] %logger{36} - %msg%n"
