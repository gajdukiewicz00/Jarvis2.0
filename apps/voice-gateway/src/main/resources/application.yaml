server:
  port: ${JARVIS_VOICE_GATEWAY_PORT:8081}
  shutdown: graceful
  ssl:
    enabled: ${JARVIS_VOICE_GATEWAY_SSL_ENABLED:false}
    key-store: ${JARVIS_VOICE_GATEWAY_KEYSTORE_PATH:}
    key-store-password: ${JARVIS_VOICE_GATEWAY_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${JARVIS_VOICE_GATEWAY_KEYSTORE_TYPE:PKCS12}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: voice-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

  # SPEC-1 Phase 5/6 — voice confirmation publishes ConfirmationResult on
  # jarvis.commands.confirmation.result. RabbitTemplate + queue topology come
  # from jarvis-common's RabbitTopologyConfig (auto-loaded once host is set).
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:jarvis}
    password: ${SPRING_RABBITMQ_PASSWORD:jarvis}
    virtual-host: ${SPRING_RABBITMQ_VHOST:jarvis}
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 4

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jarvis:
  stt:
    provider: ${JARVIS_STT_PROVIDER:vosk}
  vosk:
    model-path-ru: ${JARVIS_VOSK_MODEL_PATH_RU:${JARVIS_MODELS_DIR:models}/stt/vosk/vosk-model-small-ru-0.22}
    model-path-en: ${JARVIS_VOSK_MODEL_PATH_EN:${JARVIS_MODELS_DIR:models}/stt/vosk/vosk-model-small-en-us-0.15}
    default-language: ${JARVIS_VOSK_DEFAULT_LANGUAGE:ru-RU}
    sample-rate: ${JARVIS_VOSK_SAMPLE_RATE:16000}
  voice:
    whisper:
      model-path: ${JARVIS_VOICE_WHISPER_MODEL_PATH:${JARVIS_MODELS_DIR:models}/stt/whisper/ggml-small.bin}
    # Hybrid voice: use pre-recorded .wav when available, TTS fallback
    pre-recorded:
      enabled: ${JARVIS_VOICE_PRE_RECORDED_ENABLED:true}
    confirmation:
      # SPEC-1 mandates a Rabbit-backed confirmation channel; only switch off
      # in unit tests / dev sandboxes that intentionally have no broker.
      enabled: ${JARVIS_VOICE_CONFIRMATION_ENABLED:true}
    tts:
      # When true, TTS DOWN drags voice-gateway readiness into DEGRADED.
      # Set to false in k8s deployments that ship without espeak-ng in the
      # base image so /actuator/health/readiness stays UP while TTS calls
      # still surface TTS_UNAVAILABLE.
      required-for-readiness: ${JARVIS_VOICE_TTS_REQUIRED_FOR_READINESS:${JARVIS_VOICE_TTS_REQUIREDFORREADINESS:true}}
  orchestrator:
    url: ${JARVIS_ORCHESTRATOR_URL:http://orchestrator:8083}

# Text-to-Speech Configuration
tts:
  enabled: ${TTS_ENABLED:true}
  provider: ${TTS_PROVIDER:espeak}
  espeak:
    binary-path: ${JARVIS_TTS_ESPEAK_BINARY:}
    voice: russian
    speed: 150
  google:
    voice-name: ru-RU-Wavenet-A
    language-code: ru-RU
    speaking-rate: 1.0
    pitch: 0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      status:
        order: down,out-of-service,degraded,up,unknown
      group:
        readiness:
          # voiceReadiness already aggregates STT/TTS/assets/orchestrator/websocket
          # AND rabbit (see VoiceReadinessService.inspectRabbit), so the pod still
          # fails readiness when the broker is unreachable. Listing `rabbit`
          # explicitly here breaks startup whenever RabbitAutoConfiguration is
          # excluded (local runtime / dev profiles without a broker).
          include: voiceReadiness
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  level:
    org.jarvis.voicegateway: INFO
    org.vosk: INFO
