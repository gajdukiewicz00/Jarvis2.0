commands:
  - id: rule_open_browser
    priority: 30
    matchers:
      - type: exact
        values:
          - "–Њ—В–Ї—А–Њ–є –±—А–∞—Г–Ј–µ—А"
          - "open browser"
      - type: alias
        values:
          - "–±—А–∞—Г–Ј–µ—А"
      - type: contains
        values:
          - "–Њ—В–Ї—А–Њ–є –±—А–∞—Г–Ј–µ—А"
          - "–Ј–∞–њ—Г—Б—В–Є –±—А–∞—Г–Ј–µ—А"
          - "launch browser"
    action:
      target: pc_control
      name: OPEN_APP
      params:
        app: browser
    response:
      key: loading_sir

  - id: rule_open_terminal
    matchers:
      - type: exact
        values:
          - "–Њ—В–Ї—А–Њ–є —В–µ—А–Љ–Є–љ–∞–ї"
          - "open terminal"
      - type: contains
        values:
          - "–Ј–∞–њ—Г—Б—В–Є —В–µ—А–Љ–Є–љ–∞–ї"
          - "–Њ—В–Ї—А–Њ–є –Ї–Њ–љ—Б–Њ–ї—М"
          - "launch terminal"
    action:
      target: pc_control
      name: OPEN_APP
      params:
        app: terminal
    response:
      key: loading_sir

  - id: rule_open_telegram
    priority: 30
    matchers:
      - type: exact
        values:
          - "–Њ—В–Ї—А–Њ–є —В–µ–ї–µ–≥—А–∞–Љ"
          - "open telegram"
          - "launch telegram"
      - type: alias
        values:
          - "—В–µ–ї–µ–≥—А–∞–Љ"
          - "telegram"
      - type: contains
        values:
          - "open telegram"
          - "–Њ—В–Ї—А–Њ–є —В–µ–ї–µ–≥—А–∞–Љ"
          - "–Ј–∞–њ—Г—Б—В–Є —В–µ–ї–µ–≥—А–∞–Љ"
          - "–Њ—В–Ї—А–Њ–є —В–µ–ї–µ–≥—Г"
          - "–≤–Ї–ї—О—З–Є —В–µ–ї–µ–≥—А–∞–Љ"
      - type: regex
        values:
          - "\\b(open|launch|start|run|show)\\b.*\\btelegram"
          - "(–Њ—В–Ї—А–Њ–є|–Њ—В–Ї—А—Л—В—М|–Ј–∞–њ—Г—Б—В–Є|–Ј–∞–њ—Г—Б—В–Є—В—М|–≤–Ї–ї—О—З–Є|–њ–Њ–Ї–∞–ґ–Є).*—В–µ–ї–µ–≥—А–∞"
    action:
      target: pc_control
      name: OPEN_APP
      params:
        app: telegram
    response:
      text:
        ru: "–Ю—В–Ї—А—Л–≤–∞—О Telegram, —Б—Н—А."
        en: "Opening Telegram, sir."

  - id: rule_open_google
    matchers:
      - type: exact
        values:
          - "–Њ—В–Ї—А–Њ–є –≥—Г–≥–ї"
          - "open google"
      - type: alias
        values:
          - "–≥—Г–≥–ї"
          - "google"
      - type: contains
        values:
          - "–Ј–∞–њ—Г—Б—В–Є –≥—Г–≥–ї"
    action:
      target: pc_control
      name: OPEN_URL
      params:
        url: "https://www.google.com"
    response:
      key: loading_sir

  - id: rule_open_youtube
    matchers:
      - type: exact
        values:
          - "–Њ—В–Ї—А–Њ–є —О—В—Г–±"
          - "open youtube"
      - type: alias
        values:
          - "—О—В—Г–±"
          - "youtube"
      - type: contains
        values:
          - "–Ј–∞–њ—Г—Б—В–Є —О—В—Г–±"
          - "open the youtube"
    action:
      target: pc_control
      name: OPEN_URL
      params:
        url: "https://www.youtube.com/"
    response:
      key: loading_sir

  - id: rule_volume_up
    matchers:
      - type: exact
        values:
          - "–≥—А–Њ–Љ—З–µ"
          - "volume up"
      - type: alias
        values:
          - "–њ–Њ–≥—А–Њ–Љ—З–µ"
          - "louder"
      - type: contains
        values:
          - "—Б–і–µ–ї–∞–є –≥—А–Њ–Љ—З–µ"
          - "–њ—А–Є–±–∞–≤—М –Ј–≤—Г–Ї"
          - "turn up the volume"
    action:
      target: pc_control
      name: VOLUME_UP
      params:
        delta: 10
    response:
      text:
        ru: "–Ф–µ–ї–∞—О –≥—А–Њ–Љ—З–µ, —Б—Н—А."
        en: "Turning it up, sir."

  - id: rule_volume_down
    matchers:
      - type: exact
        values:
          - "—В–Є—И–µ"
          - "volume down"
      - type: alias
        values:
          - "–њ–Њ—В–Є—И–µ"
          - "quieter"
      - type: contains
        values:
          - "—Б–і–µ–ї–∞–є —В–Є—И–µ"
          - "—Г–±–∞–≤—М –Ј–≤—Г–Ї"
          - "turn down the volume"
    action:
      target: pc_control
      name: VOLUME_DOWN
      params:
        delta: 10
    response:
      text:
        ru: "–£–Љ–µ–љ—М—И–∞—О –≥—А–Њ–Љ–Ї–Њ—Б—В—М, —Б—Н—А."
        en: "Turning it down, sir."

  - id: rule_mute
    matchers:
      - type: exact
        values:
          - "–≤—Л–Ї–ї—О—З–Є –Ј–≤—Г–Ї"
          - "mute"
      - type: contains
        values:
          - "–Њ—В–Ї–ї—О—З–Є –Ј–≤—Г–Ї"
          - "–Ј–∞–≥–ї—Г—И–Є –Ј–≤—Г–Ї"
    action:
      target: pc_control
      name: MUTE
    response:
      key: affirmative

  - id: rule_unmute
    matchers:
      - type: exact
        values:
          - "–≤–Ї–ї—О—З–Є –Ј–≤—Г–Ї"
          - "unmute"
      - type: contains
        values:
          - "–≤–µ—А–љ–Є –Ј–≤—Г–Ї"
          - "restore the sound"
    action:
      target: pc_control
      name: UNMUTE
    response:
      key: affirmative

  - id: rule_clipboard_copy
    matchers:
      - type: exact
        values:
          - "—Б–Ї–Њ–њ–Є—А—Г–є"
          - "copy"
      - type: contains
        values:
          - "—Б–Ї–Њ–њ–Є—А—Г–є —В–µ–Ї—Б—В"
          - "copy that"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+c"
    response:
      key: yes_sir_alt

  - id: rule_clipboard_paste
    matchers:
      - type: exact
        values:
          - "–≤—Б—В–∞–≤—М"
          - "paste"
      - type: contains
        values:
          - "–≤—Б—В–∞–≤–Є—В—М"
          - "paste text"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+v"
    response:
      key: yes_sir_alt

  - id: rule_close_window
    matchers:
      - type: exact
        values:
          - "–Ј–∞–Ї—А–Њ–є –Њ–Ї–љ–Њ"
          - "close window"
      - type: contains
        values:
          - "–Ј–∞–Ї—А–Њ–є –њ—А–Њ–≥—А–∞–Љ–Љ—Г"
          - "close app"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Alt+F4"
    response:
      key: request_completed_sir

  - id: rule_fullscreen
    matchers:
      - type: exact
        values:
          - "–љ–∞ –≤–µ—Б—М —Н–Ї—А–∞–љ"
          - "fullscreen"
      - type: contains
        values:
          - "–њ–Њ–ї–љ–Њ—Н–Ї—А–∞–љ–љ—Л–є —А–µ–ґ–Є–Љ"
          - "go fullscreen"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "F11"
    response:
      key: yes_sir_alt

  - id: rule_screenshot
    matchers:
      - type: exact
        values:
          - "—Б–і–µ–ї–∞–є —Б–Ї—А–Є–љ—И–Њ—В"
          - "screenshot"
      - type: contains
        values:
          - "—Б–љ–Є–Љ–Њ–Ї —Н–Ї—А–∞–љ–∞"
          - "take screenshot"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Print"
    response:
      key: yes_sir_alt

  - id: rule_show_desktop
    matchers:
      - type: exact
        values:
          - "—А–∞–±–Њ—З–Є–є —Б—В–Њ–ї"
          - "show desktop"
      - type: contains
        values:
          - "–њ–Њ–Ї–∞–ґ–Є —А–∞–±–Њ—З–Є–є —Б—В–Њ–ї"
          - "go to desktop"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Super+d"
    response:
      key: yes_sir_alt

  - id: rule_sleep_mode
    matchers:
      - type: exact
        values:
          - "—Б–њ—П—Й–Є–є —А–µ–ґ–Є–Љ"
          - "sleep mode"
      - type: contains
        values:
          - "—Г—Б—Л–њ–Є –Ї–Њ–Љ–њ—М—О—В–µ—А"
          - "go to sleep"
    action:
      target: system
      name: sleep
    response:
      key: rest_mode

  - id: rule_monitor_off
    matchers:
      - type: exact
        values:
          - "–≤—Л–Ї–ї—О—З–Є –Љ–Њ–љ–Є—В–Њ—А"
          - "monitor off"
      - type: contains
        values:
          - "–Њ—В–Ї–ї—О—З–Є –Љ–Њ–љ–Є—В–Њ—А"
          - "screen off"
    action:
      target: system
      name: monitor_off
    response:
      key: rest_mode
