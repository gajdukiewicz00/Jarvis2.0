commands:
  - id: rule_legacy_word_256
    description: "Migrated legacy hotkey: Управление Microsoft Word / Настройка шрифта"
    priority: -5
    matchers:
      - type: exact
        values:
          - "настройка шрифта"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+shift+f"
    response:
      key: yes_sir_alt

