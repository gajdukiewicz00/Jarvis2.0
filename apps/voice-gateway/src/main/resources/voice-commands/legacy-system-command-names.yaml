commands:
  - id: rule_legacy_system_125
    description: "Migrated legacy system command / Закрыть окно"
    priority: -5
    matchers:
      - type: exact
        values:
          - "закрыть окно"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Alt+F4"
    response:
      key: request_completed_sir

  - id: rule_legacy_system_178
    description: "Migrated legacy system command / Вставить"
    priority: -5
    matchers:
      - type: exact
        values:
          - "вставить"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+v"
    response:
      key: affirmative

  - id: rule_legacy_system_204
    description: "Migrated legacy system command / Скопировать"
    priority: -5
    matchers:
      - type: exact
        values:
          - "скопировать"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+c"
    response:
      key: affirmative

  - id: rule_legacy_system_134
    description: "Migrated legacy system command / Смена имени"
    priority: -5
    matchers:
      - type: exact
        values:
          - "смена имени"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "F2"
    response:
      key: affirmative

  - id: rule_legacy_system_179
    description: "Migrated legacy system command / Арес страницы"
    priority: -5
    matchers:
      - type: exact
        values:
          - "арес страницы"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Alt+d"
    response:
      key: affirmative

  - id: rule_legacy_system_154
    description: "Migrated legacy system command / Повтори окно"
    priority: -5
    matchers:
      - type: exact
        values:
          - "повтори окно"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "ctrl+n"
    response:
      key: affirmative

  - id: rule_legacy_system_177
    description: "Migrated legacy system command / Энтэр"
    priority: -5
    matchers:
      - type: exact
        values:
          - "энтэр"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "Return"
    response:
      key: affirmative

  # rule_legacy_system_582 ("сделай громче") removed: it shadowed rule_volume_up
  # (desktop-control.yaml) as an EXACT match with a generic "yes_sir" response. The
  # canonical VOLUME_UP rule speaks "Делаю громче, сэр." — keep that as the single owner.
  #
  # rule_legacy_system_583 ("сделай тише") removed for the same reason: rule_volume_down
  # (desktop-control.yaml) owns it and speaks "Уменьшаю громкость, сэр.".
