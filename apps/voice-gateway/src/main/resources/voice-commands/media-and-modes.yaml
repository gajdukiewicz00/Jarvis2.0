commands:
  - id: rule_play_music
    matchers:
      - type: exact
        values:
          - "включи музыку"
          - "play music"
      - type: contains
        values:
          - "запусти музыку"
          - "turn on some music"
          - "turn on music"
          - "поставь музыку"
          - "включи какую-нибудь музыку"
      - type: regex
        values:
          - "\\b(turn on|play|start|put on)\\b.*\\bmusic"
          - "(включи|поставь|запусти|врубай|врубить).*музык"
    action:
      target: pc_control
      name: OPEN_URL
      params:
        url: "https://music.youtube.com/"
    response:
      text:
        ru: "Включаю музыку, сэр."
        en: "Playing music, sir."

  - id: rule_play_radio
    matchers:
      - type: exact
        values:
          - "включи радио"
          - "play radio"
      - type: contains
        values:
          - "запусти радио"
          - "turn on the radio"
    action:
      target: pc_control
      name: OPEN_URL
      params:
        url: "https://radio.garden/"
    response:
      key: pleasant_listening_sir

  - id: rule_pause_media
    matchers:
      - type: exact
        values:
          - "пауза"
          - "pause"
      - type: contains
        values:
          - "поставь на паузу"
          - "останови музыку"
          - "останови воспроизведение"
          - "stop the music"
          - "pause the music"
    action:
      target: pc_control
      name: PAUSE
    response:
      text:
        ru: "Пауза, сэр."
        en: "Paused, sir."

  - id: rule_play_media
    matchers:
      - type: exact
        values:
          - "воспроизведи"
          - "продолжи"
          - "играй"
          - "play"
          - "resume"
      - type: contains
        values:
          - "продолжи воспроизведение"
          - "продолжай играть"
          - "resume playback"
          - "воспроизведи музыку"
    action:
      target: pc_control
      name: PLAY
    response:
      text:
        ru: "Воспроизвожу, сэр."
        en: "Playing, sir."

  - id: rule_next_track
    matchers:
      - type: exact
        values:
          - "следующий трек"
          - "next track"
      - type: alias
        values:
          - "следующий"
          - "next"
      - type: contains
        values:
          - "включи следующий трек"
          - "воспроизведи следующий трек"
          - "skip this song"
          - "следующая песня"
          - "переключи трек"
          - "переключи песню"
          - "next song"
      - type: regex
        # Input is normalized (lowercase, ё→е). Patterns are only lowercased, so \w
        # does NOT match Cyrillic here — use explicit [а-я]* for Russian suffixes.
        values:
          - "следующ[а-я]*\\s+(трек[а-я]*|песн[а-я]*|композиц[а-я]*)"
          - "переключи\\s+(трек[а-я]*|песн[а-я]*|музык[а-я]*|композиц[а-я]*)"
          - "пропусти\\s+(трек[а-я]*|песн[а-я]*|композиц[а-я]*)"
          - "воспроизведи\\s+следующ[а-я]*\\s+(трек[а-я]*|песн[а-я]*)"
          - "\\bnext\\b.*\\b(track|song)\\b"
          - "\\bskip\\b.*\\b(track|song)\\b"
    action:
      target: pc_control
      name: NEXT
    response:
      text:
        ru: "Переключаю трек, сэр."
        en: "Skipping to the next track, sir."

  - id: rule_previous_track
    matchers:
      - type: exact
        values:
          - "предыдущий трек"
          - "previous track"
      - type: alias
        values:
          - "предыдущий"
          - "previous"
      - type: contains
        values:
          - "включи предыдущий трек"
          - "go to previous track"
    action:
      target: pc_control
      name: PREV
    response:
      key: affirmative

  - id: rule_work_mode
    matchers:
      - type: exact
        values:
          - "за работу"
          - "work mode"
      - type: contains
        values:
          - "рабочий режим"
          - "начинаем работать"
          - "time to work"
    action:
      target: pc_control
      name: SCENARIO
      params:
        name: work
    response:
      key: loading_sir

  - id: rule_rest_mode
    matchers:
      - type: exact
        values:
          - "режим отдыха"
          - "rest mode"
      - type: contains
        values:
          - "я хочу отдохнуть"
          - "relax mode"
    action:
      target: pc_control
      name: SCENARIO
      params:
        name: rest
    response:
      key: rest_mode

  - id: rule_game_mode
    matchers:
      - type: exact
        values:
          - "игровой режим"
          - "game mode"
      - type: contains
        values:
          - "включи игровой режим"
          - "gaming mode"
    action:
      target: pc_control
      name: SCENARIO
      params:
        name: game
    response:
      key: game_voice_control_activated
