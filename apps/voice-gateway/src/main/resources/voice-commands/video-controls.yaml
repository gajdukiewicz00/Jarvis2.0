commands:
  - id: rule_video_play_pause
    matchers:
      - type: exact
        values:
          - "поставь видео на паузу"
          - "видео на паузу"
          - "продолжи видео"
          - "продолжить видео"
          - "pause the video"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "k"
    response:
      key: affirmative

  - id: rule_video_seek_forward
    matchers:
      - type: exact
        values:
          - "перемотай видео вперед"
          - "перемотай вперед на 10 секунд"
          - "видео вперед на 10 секунд"
          - "seek video forward"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "l"
    response:
      key: affirmative

  - id: rule_video_seek_backward
    matchers:
      - type: exact
        values:
          - "отмотай видео назад"
          - "перемотай назад на 10 секунд"
          - "видео назад на 10 секунд"
          - "seek video backward"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "j"
    response:
      key: affirmative

  - id: rule_video_next
    matchers:
      - type: exact
        values:
          - "следующее видео"
          - "следующий видос"
          - "некст видео"
          - "next video"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "shift+n"
    response:
      key: affirmative

  - id: rule_video_previous
    matchers:
      - type: exact
        values:
          - "предыдущее видео"
          - "предыдущий видос"
          - "previous video"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "shift+p"
    response:
      key: affirmative

  - id: rule_video_start
    matchers:
      - type: exact
        values:
          - "в начало видео"
          - "перемотай видео в начало"
          - "сначала видео"
          - "video from start"
    action:
      target: pc_control
      name: HOTKEY
      params:
        keyCombination: "0"
    response:
      key: affirmative

  - id: rule_video_jump_10
