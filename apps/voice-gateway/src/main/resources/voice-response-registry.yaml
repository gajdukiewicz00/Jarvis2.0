responses:
  - key: always_at_service_sir
    assets:
      ru: ru/system/always_at_service_sir
    text:
      ru: "Всегда к вашим услугам, сэр."
      en: "Always at your service, sir."

  - key: at_your_service_sir
    assets:
      ru: ru/assistant/at_your_service_sir
    text:
      ru: "К вашим услугам, сэр."
      en: "At your service, sir."

  - key: hello_i_am_jarvis
    assets:
      ru: ru/assistant/hello_i_am_jarvis
    text:
      ru: "Привет, я Джарвис."
      en: "Hello. I am Jarvis."

  - key: good_morning
    assets:
      ru: ru/assistant/good_morning
    text:
      ru: "Доброе утро."
      en: "Good morning."

  - key: loading_sir
    assets:
      ru: ru/assistant/loading_sir
    text:
      ru: "Загружаю, сэр."
      en: "Loading, sir."

  - key: request_completed_sir
    assets:
      ru: ru/assistant/request_completed_sir
    text:
      ru: "Запрос выполнен, сэр."
      en: "Request completed, sir."

  - key: yes_sir
    assets:
      ru: ru/system/yes_sir
    text:
      ru: "Да, сэр."
      en: "Yes, sir."

  - key: yes_sir_alt
    assets:
      ru: ru/system/yes_sir_alt
    text:
      ru: "Да, сэр."
      en: "Yes, sir."

  - key: affirmative
    assets:
      ru: ru/system/affirmative
    text:
      ru: "Есть."
      en: "Affirmative."

  - key: rest_mode
    assets:
      ru: ru/system/rest_mode
    text:
      ru: "Я отдыхать."
      en: "Entering rest mode."

  - key: news_update
    assets:
      ru: ru/assistant/news_update
    text:
      ru: "Открываю новости."
      en: "Opening the news."

  - key: running_diagnostics
    assets:
      ru: ru/assistant/running_diagnostics
    text:
      ru: "Начинаю диагностику системы."
      en: "Running diagnostics."

  - key: welcome_back
    assets:
      ru: ru/assistant/welcome_back
    text:
      ru: "С возвращением."
      en: "Welcome back."

  - key: pleasant_listening_sir
    assets:
      ru: ru/media/pleasant_listening_sir
    text:
      ru: "Приятного прослушивания, сэр."
      en: "Enjoy listening, sir."

  - key: game_voice_control_activated
    assets:
      ru: ru/scenarios/game_voice_control_activated
    text:
      ru: "Активирую игровой протокол."
      en: "Activating game protocol."

  - key: internet_check
    assets:
      ru: ru/diagnostics/internet_check
    text:
      ru: "Проверяю скорость интернета."
      en: "Checking the internet speed."

  - key: monitor_off_ack
    text:
      ru: "Гашу экран, сэр."
      en: "Turning the screen off, sir."

  - key: lonely_mode
    text:
      ru: "Подбираю компанию на фоне, сэр."
      en: "Opening a little background company, sir."

  - key: motivation_mode
    text:
      ru: "Подбираю мотивацию, сэр."
      en: "Loading a motivation boost, sir."

  - key: bored_game
    text:
      ru: "Есть идея, сэр. Открываю игру."
      en: "I have an idea, sir. Opening a game."

  - key: sad_playlist
    text:
      ru: "Подбираю что-нибудь под настроение."
      en: "Opening something that fits the mood."

  - key: melancholy_playlist
    text:
      ru: "Включаю спокойную подборку."
      en: "Opening something calm."

  - key: greeting_disabled
    text:
      ru: "Принято, сэр. Отключаю приветствие только для этой сессии."
      en: "Understood, sir. Disabling the greeting for this session only."

  - key: love_response
    text:
      ru: "Это взаимно, сэр."
      en: "The feeling is mutual, sir."

  - key: random_fact_legacy
    text:
      ru: "Сэр, у осьминога три сердца."
      en: "Sir, an octopus has three hearts."

  - key: coin_flip_heads
    text:
      ru: "Монета говорит: орел."
      en: "The coin says: heads."

  - key: fairy_tale_short
    text:
      ru: "Жил-был код, который однажды собрался с первого раза, и с тех пор его считали легендой."
      en: "Once there was code that built on the first try, and it became a legend."

  - key: cosmos_brief
    text:
      ru: "Космос только кажется тихим, сэр. В нем постоянно рождаются звезды и сталкиваются галактики."
      en: "Space only looks quiet, sir. Stars are born and galaxies collide in it all the time."

  - key: everest_brief
    text:
      ru: "Эверест выше восьми тысяч метров, и главная сложность там не подъем, а кислород и погода."
      en: "Everest is over eight thousand meters high, and the real challenge there is oxygen and weather."

  - key: alien_life_brief
    text:
      ru: "Прямых доказательств пока нет, сэр, но миров во Вселенной достаточно, чтобы вопрос оставался открытым."
      en: "There is no direct proof yet, sir, but the universe has enough worlds to keep the question open."

