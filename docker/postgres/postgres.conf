# PostgreSQL configuration optimized for Docker container environment
# This configuration helps reduce autovacuum warnings and improve performance

# Network Settings
listen_addresses = '*'

# Memory Settings
# Optimized for Docker container with ~1GB RAM allocation
shared_buffers = 256MB           # 25% of container memory
work_mem = 8MB                   # Reduced to handle more concurrent queries
maintenance_work_mem = 128MB     # For VACUUM, CREATE INDEX operations
effective_cache_size = 512MB     # Estimate of OS cache available

# Autovacuum Settings
# CRITICAL: Prevents "autovacuum worker took too long" warnings
# These settings ensure autovacuum workers start promptly and handle multiple databases
autovacuum = on
autovacuum_max_workers = 4               # Increased from 3 to handle 6 databases
autovacuum_naptime = 30s                 # Reduced from 60s for more frequent runs
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 10ms      # Add small delay to reduce I/O impact
autovacuum_vacuum_cost_limit = 200       # Balance between performance and responsiveness

# Connection Settings
# Configured to handle HikariCP pools from ~6 microservices
# Each service: max 5 connections = ~30 active + overhead
max_connections = 100                    # Sufficient headroom
superuser_reserved_connections = 3

# Write Ahead Log
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Logging
# Log autovacuum activities to help diagnose issues
log_autovacuum_min_duration = 0          # Log all autovacuum activities
log_min_duration_statement = 1000        # Log queries taking > 1 second
log_connections = off                    # Reduce log noise
log_disconnections = off

# Performance tuning
random_page_cost = 1.1                   # Optimized for SSD
effective_io_concurrency = 200           # For SSD
default_statistics_target = 100

# Statement timeout (safety)
# Prevent runaway queries from blocking autovacuum
statement_timeout = 300000               # 5 minutes max per statement
