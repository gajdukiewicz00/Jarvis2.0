openapi: 3.0.0
info:
  title: Analytics Service API
  version: 1.0.0
paths:
  /api/v1/analytics/overview:
    get:
      summary: Get analytics overview
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalExpenses:
                    type: number
                  expenseCount:
                    type: integer
                  totalTimeTrackedSeconds:
                    type: integer
                  timeRecordCount:
                    type: integer
