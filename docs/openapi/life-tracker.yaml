openapi: 3.0.0
info:
  title: Life Tracker Service API
  version: 1.0.0
paths:
  /api/v1/life/finance/expenses:
    post:
      summary: Add a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                currency:
                  type: string
                category:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Expense added
    get:
      summary: Get all expenses
      responses:
        '200':
          description: List of expenses

  /api/v1/life/time/start:
    post:
      summary: Start a timer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                activity:
                  type: string
                category:
                  type: string
      responses:
        '200':
          description: Timer started

  /api/v1/life/time/stop:
    post:
      summary: Stop the current timer
      responses:
        '200':
          description: Timer stopped

  /api/v1/life/calendar/event:
    post:
      summary: Add a calendar event
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                allDay:
                  type: boolean
      responses:
        '200':
          description: Event added
          content:
            application/json:
              schema:
                type: array
                  properties:
                    id:
                      type: integer
                    amount:
                      type: number
                    category:
                      type: string
