openapi: 3.0.0
info:
  title: NLP Service API
  version: 1.0.0
paths:
  /api/v1/nlp/analyze:
    post:
      summary: Analyze text and extract intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Intent analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  intent:
                    type: string
                  parameters:
                    type: object
                    additionalProperties:
                      type: string
