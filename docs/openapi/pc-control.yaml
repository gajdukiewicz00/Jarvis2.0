openapi: 3.0.0
info:
  title: PC Control Service API
  version: 1.0.0
paths:
  /api/v1/pc/action:
    post:
      summary: Execute a PC control action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actionType:
                  type: string
                  enum: [OPEN_APP, MEDIA_CONTROL, SYSTEM_COMMAND]
                parameters:
                  type: object
      responses:
        '200':
          description: Action executed
