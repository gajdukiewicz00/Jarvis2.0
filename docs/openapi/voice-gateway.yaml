openapi: 3.0.0
info:
  title: Voice Gateway Service API
  version: 1.0.0
  description: |
    Deprecated as an authoritative voice reference.
    This OpenAPI file is incomplete and intentionally skeletal.
    Use /VOICE_LAYER_REALITY.md, /VOICE_ARCHITECTURE.md, /VOICE_OPERATIONS.md,
    /VOICE_GAPS.md, and GET /api/v1/voice/runtime as the current source of truth.
paths:
  /api/v1/voice/command:
    post:
      summary: Send a text command (debug/fallback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Command received
