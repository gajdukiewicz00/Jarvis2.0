rules:
  - id: meeting_creates_todo
    when:
      event: calendar.event_created
      conditions:
        - field: "event.startTime"
          op: "within"
          value: "24h"
    then:
      action: tool.create_todo
      args:
        title: "Подготовиться к встрече: {{event.title}}"
        dueDate: "{{event.startTime}}"
        priority: "HIGH"
        tags: ["meeting"]

  - id: budget_overrun_alert
    when:
      event: finance.budget_status
      conditions:
        - field: "status"
          op: "equals"
          value: "OVER"
    then:
      action: notify
      args:
        message: "Перерасход по категории {{budget.category}}"

  - id: empty_day_suggestion
    when:
      event: calendar.day_summary
      conditions:
        - field: "events.count"
          op: "equals"
          value: 0
    then:
      action: ai.suggest_plan
      args:
        focus: "today"
