# Kustomize strategic-merge patch: inject observability-env ConfigMap
# into all Spring Boot service deployments.
# Each deployment gets envFrom: configMapRef: observability-env (optional).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
        prometheus.io/scheme: http
    spec:
      containers:
        - name: api-gateway
          envFrom:
            - secretRef:
                name: jarvis-secrets
            - configMapRef:
                name: observability-env
                optional: true
---
