# Prometheus — metrics collection and alerting
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: jarvis-prod
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: jarvis-actuator
        # Compatibility baseline for the current internal-TLS rollout.
        # Scrapes still target pod IPs, while service certificates are issued
        # for service DNS names / 127.0.0.1. The repo-side follow-up is:
        # mount the Jarvis CA bundle, scrape via service DNS, set `server_name`,
        # then remove `insecure_skip_verify`.
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["jarvis-prod"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

          - source_labels: [__meta_kubernetes_pod_phase]
            action: keep
            regex: Running

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __tmp_prometheus_port

          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keepequal
            target_label: __tmp_prometheus_port

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
            action: replace
            regex: (https?)
            replacement: $1
            target_label: __scheme__

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: __metrics_path__

          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: app

          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: app

          - action: labeldrop
            regex: __tmp_prometheus_port

  alerts.yml: |
    groups:
      - name: jarvis_availability
        rules:
          - alert: JarvisServiceDown
            expr: up{job="jarvis-actuator"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.app }} is DOWN"
              description: "Prometheus cannot scrape {{ $labels.app }} (pod {{ $labels.pod }}) for more than 1 minute."

          - alert: JarvisHighRestartRate
            expr: increase(process_uptime_seconds{job="jarvis-actuator"}[10m]) < 300 and up{job="jarvis-actuator"} == 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.app }} restarted recently"

      - name: jarvis_http
        rules:
          - alert: JarvisHigh5xxRate
            expr: |
              (
                sum by (app) (rate(http_server_requests_seconds_count{status=~"5..",job="jarvis-actuator"}[5m]))
                /
                clamp_min(sum by (app) (rate(http_server_requests_seconds_count{job="jarvis-actuator"}[5m])), 1)
              ) > 0.05
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: ">5% 5xx on {{ $labels.app }}"

          - alert: JarvisHighLatencyP99
            expr: |
              histogram_quantile(0.99,
                sum by (app, le) (rate(http_server_requests_seconds_bucket{job="jarvis-actuator"}[5m]))
              ) > 5
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "P99 >5s on {{ $labels.app }}"

      - name: jarvis_jvm
        rules:
          - alert: JarvisJvmHeapHigh
            expr: jvm_memory_used_bytes{area="heap",job="jarvis-actuator"} / jvm_memory_max_bytes{area="heap",job="jarvis-actuator"} > 0.90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Heap >90% on {{ $labels.app }}"

          - alert: JarvisJvmHeapCritical
            expr: jvm_memory_used_bytes{area="heap",job="jarvis-actuator"} / jvm_memory_max_bytes{area="heap",job="jarvis-actuator"} > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Heap >95% on {{ $labels.app }}"

      - name: jarvis_llm
        rules:
          - alert: LlmAdmissionQueueSaturated
            expr: llm_admission_queue > 6
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "LLM admission queue depth {{ $value }}"

          - alert: LlmHighFailureRate
            expr: |
              rate(llm_chat_failures_total[5m])
              /
              clamp_min(rate(llm_chat_requests_total[5m]), 0.001)
              > 0.20
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: ">20% LLM chat failure rate"

          - alert: LlmInferenceTimeout
            expr: rate(llm_chat_timeouts_total[5m]) > 0.1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "LLM inference timeouts increasing"

      # --- Wave-1 subsystem alerts (agent/media/sync/analytics/memory/planner/
      # security). Documented + mirrored copy: observability/prometheus/wave1-alerts.yml
      # (keep both in sync). Rules marked PROPOSED reference metric names that
      # are not emitted yet — see observability/README.md for the follow-up list.
      - name: jarvis_media
        rules:
          # PROPOSED: requires media_jobs_total{status,type} (Counter media.jobs) in MediaJobService.
          - alert: MediaJobFailureRateHigh
            expr: |
              (
                sum(rate(media_jobs_total{status="FAILED"}[10m]))
                /
                clamp_min(sum(rate(media_jobs_total[10m])), 0.001)
              ) > 0.25
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: ">25% of media jobs failing (10m window)"
              description: "media-service job failure ratio is {{ $value | humanizePercentage }}."

      - name: jarvis_agent_swarm
        rules:
          # REAL: swarm_tasks_total already implemented (SwarmMetrics.java). Backlog-growth
          # is the practical proxy for "task stuck" (no per-task in-flight age gauge exists).
          - alert: AgentSwarmTaskBacklogGrowing
            expr: |
              clamp_min(
                sum(increase(swarm_tasks_total{state="created"}[30m]))
                -
                sum(increase(swarm_tasks_total{state=~"completed|failed|cancelled"}[30m])),
              0) > 5
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Agent swarm task backlog is growing ({{ $value }} unfinished over 30m)"
              description: "created-but-not-terminal swarm tasks are outpacing completions/failures/cancellations."

          # REAL: swarm_task_duration_seconds_max already implemented, but only records
          # COMPLETED task durations, not in-flight age.
          - alert: AgentSwarmCompletedTaskDurationHigh
            expr: swarm_task_duration_seconds_max > 900
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "A completed swarm task took over 15 minutes"

      - name: jarvis_llm_brain
        rules:
          # REAL: llm_fallback_used_total already implemented (LlmMetrics.java). Elevated
          # fallback usage correlates with host-model-daemon being unreachable (see the
          # recurring Endpoints/EndpointSlice placeholder-IP regression in docs/COMPONENT_STATUS.md).
          - alert: LlmBrainLikelyUnreachable
            expr: rate(llm_fallback_used_total[5m]) > 0.1
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "LLM deterministic-fallback rate elevated — brain likely unreachable"
              description: "Known cause: host-model-daemon Endpoints reset to 192.0.2.1. Run ./scripts/jarvis-host-endpoint-check.sh --fix."

          # PROPOSED: requires a periodic-health-check gauge, e.g. llm_brain_reachable (0/1).
          - alert: LlmBrainUnreachable
            expr: llm_brain_reachable == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "LLM brain (host-model-daemon) reports unreachable"
              description: "llm_brain_reachable is PROPOSED — not emitted yet; until it exists, rely on LlmBrainLikelyUnreachable."

      - name: jarvis_memory
        rules:
          # REAL: standard Micrometer/HikariCP binder metric.
          - alert: MemoryDbConnectionPressure
            expr: hikaricp_connections_pending{application="memory-service"} > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "memory-service DB connection pool under pressure"

          # PROPOSED: requires memory_db_errors_total{operation} (Counter memory.db.errors).
          - alert: MemoryDbErrorsElevated
            expr: increase(memory_db_errors_total[10m]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "memory-service DB error count elevated"
              description: "memory_db_errors_total is PROPOSED — not emitted yet; use the memory-DB-errors Loki query as the real signal today."

      - name: jarvis_gateway
        rules:
          # REAL: http_server_requests_seconds_count already implemented on every Actuator
          # service. Same shape as JarvisHigh5xxRate above, scoped + escalated for the gateway.
          - alert: JarvisGatewayHigh5xxRate
            expr: |
              (
                sum(rate(http_server_requests_seconds_count{status=~"5..",job="jarvis-actuator",application="api-gateway"}[5m]))
                /
                clamp_min(sum(rate(http_server_requests_seconds_count{job="jarvis-actuator",application="api-gateway"}[5m])), 1)
              ) > 0.05
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: ">5% 5xx on api-gateway"
              description: "api-gateway is the single front door for all downstream services."

      - name: jarvis_kubernetes
        rules:
          # PROPOSED (infra prerequisite): requires kube-state-metrics to be deployed and
          # scraped — not currently part of this stack. Standard, DRY way to catch
          # Pending/CrashLoopBackOff/NotReady pods across every workload.
          - alert: JarvisPodNotReady
            expr: kube_pod_status_ready{namespace="jarvis-prod", condition="true"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} has not been Ready for 5m"
              description: "Requires kube-state-metrics deployment + a Prometheus scrape job for it."
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: jarvis-prod
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jarvis-prometheus
  namespace: jarvis-prod
  labels:
    app.kubernetes.io/part-of: jarvis
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jarvis-prometheus
  namespace: jarvis-prod
  labels:
    app.kubernetes.io/part-of: jarvis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jarvis-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: jarvis-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: jarvis-prod
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: jarvis-prod
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: jarvis
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: jarvis-prod
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
