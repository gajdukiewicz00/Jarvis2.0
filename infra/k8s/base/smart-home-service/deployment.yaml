# Smart Home Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-home-service
  namespace: jarvis-prod
  labels:
    app: smart-home-service
    app.kubernetes.io/name: smart-home-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-home-service
  template:
    metadata:
      labels:
        app: smart-home-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smart-home-service
          image: jarvis/smart-home-service
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: MQTT_BROKER_URL
              value: "tcp://mosquitto:1883"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: MQTT_PASSWORD
            # Device state-history persistence (wave-6). Own schema in the shared
            # jarvis_db, mirroring the other DB-backed services. Overrides the
            # global SPRING_DATASOURCE_URL from jarvis-secrets; username/password
            # still come from that secret via envFrom. Requires smart-home-service
            # in the db-clients postgres NetworkPolicy allowlist (see
            # overlays/prod/networkpolicy-allowlist.yaml).
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis-prod.svc.cluster.local:5432/jarvis_db?currentSchema=smarthome"
            - name: SPRING_FLYWAY_TABLE
              value: "flyway_schema_history_smarthome"
            - name: SPRING_FLYWAY_SCHEMAS
              value: "smarthome"
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: "smarthome"
            - name: SPRING_FLYWAY_CREATE_SCHEMAS
              value: "true"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA
              value: "smarthome"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: smart-home-service
  namespace: jarvis-prod
  labels:
    app: smart-home-service
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      name: http
  selector:
    app: smart-home-service
