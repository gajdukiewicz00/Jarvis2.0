# Smart Home Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-home-service
  namespace: jarvis-prod
  labels:
    app: smart-home-service
    app.kubernetes.io/name: smart-home-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-home-service
  template:
    metadata:
      labels:
        app: smart-home-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smart-home-service
          image: jarvis/smart-home-service
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: MQTT_BROKER_URL
              value: "tcp://mosquitto:1883"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: MQTT_PASSWORD
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "128Mi"
              cpu: "50m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: smart-home-service
  namespace: jarvis-prod
  labels:
    app: smart-home-service
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      name: http
  selector:
    app: smart-home-service
