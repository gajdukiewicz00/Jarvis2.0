# Voice Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: jarvis-prod
  labels:
    app: voice-gateway
    app.kubernetes.io/name: voice-gateway
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-gateway
  template:
    metadata:
      labels:
        app: voice-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: voice-gateway
          image: jarvis/voice-gateway
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vosk-models
              mountPath: /models
              readOnly: true
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            # SPEC-1 Phase 5/6: voice confirmation publishes on
            # jarvis.commands.confirmation.result, so Rabbit is mandatory.
            # SPRING_RABBITMQ_USERNAME/PASSWORD come from jarvis-secrets.
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_VHOST
              value: jarvis
            - name: MANAGEMENT_HEALTH_RABBIT_ENABLED
              value: "true"
            - name: JARVIS_VOSK_MODEL_PATH_RU
              value: /models/stt/vosk/vosk-model-small-ru-0.22
            - name: JARVIS_VOSK_MODEL_PATH_EN
              value: /models/stt/vosk/vosk-model-small-en-us-0.15
            - name: SPRING_AUTOCONFIGURE_EXCLUDE
              value: >-
                org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,
                org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,
                org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
          resources:
            limits:
              memory: "12Gi"
              cpu: "1"
            requests:
              memory: "4Gi"
              cpu: "250m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: vosk-models
          persistentVolumeClaim:
            claimName: vosk-models-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: voice-gateway
  namespace: jarvis-prod
  labels:
    app: voice-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: voice-gateway
