# =============================================================================
# LLM Server (llama.cpp wrapper, Python image)
# =============================================================================
# Provides /v1/chat/completions and friends; consumed by llm-service.
# The model file is mounted from llm-models-pvc.  The PVC is provisioned
# out-of-band:
#   * dev / workstation:  k8s/overlays/dev-hostpath (hostPath PV pointing at
#                         ${HOME}/.jarvis/models/llm)
#   * prod:               any RWO PVC named llm-models-pvc with the GGUF
#                         model copied in via scripts/seed-llm-model-pvc.sh
# That PVC stays out of this overlay because hostPath is operator-specific.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: jarvis-prod
  labels:
    app: llm-server
    app.kubernetes.io/name: llm-server
    app.kubernetes.io/component: inference
spec:
  # Scaled up by the local-prod-replicas patch when --enable-llm is requested.
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
        app.kubernetes.io/name: llm-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-server
          image: jarvis/llm-server
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: LLM_BACKEND
              value: llamacpp
            - name: DEVICE
              value: cpu
            - name: LLM_DEVICE
              value: cpu
            - name: ENABLE_GPU
              value: "false"
            - name: MODEL_PATH
              value: /models
            - name: GGUF_MODEL_PATH
              value: /models/qwen2.5-3b-instruct-q4_k_m.gguf
            - name: N_GPU_LAYERS
              value: "0"
            - name: N_CTX
              value: "4096"
            - name: N_BATCH
              value: "512"
            - name: MAX_NEW_TOKENS
              value: "700"
            - name: MAX_GENERATION_SECONDS
              value: "120"
            - name: TEMPERATURE
              value: "0.7"
            - name: ENABLE_STREAMING
              value: "true"
            - name: ENABLE_WARMUP
              value: "true"
            - name: LOG_LEVEL
              value: INFO
            - name: VERBOSE_LLAMACPP
              value: "false"
          volumeMounts:
            - name: llm-models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 8Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: llm-models
          persistentVolumeClaim:
            claimName: llm-models-pvc
        - name: tmp
          emptyDir: {}
        - name: app-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: jarvis-prod
  labels:
    app: llm-server
spec:
  type: ClusterIP
  selector:
    app: llm-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
