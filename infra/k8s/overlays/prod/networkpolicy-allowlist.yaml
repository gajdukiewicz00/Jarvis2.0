apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-service-egress-optional
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: llm-service
  policyTypes:
    - Egress
  egress:
    # host-model-daemon is a selectorless Service with manual Endpoints that
    # point to the Linux host. NetworkPolicy cannot select that target by pod,
    # so egress is constrained to the daemon ports only.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 18080
        - protocol: TCP
          port: 18081
        - protocol: TCP
          port: 18082
    # In-cluster llm-server (Python llama.cpp wrapper) is the default LLM
    # backend now; egress on its container port 5000 must be allowed.
    - to:
        - podSelector:
            matchLabels:
              app: llm-server
      ports:
        - protocol: TCP
          port: 5000
    - to:
        - podSelector:
            matchLabels:
              app: memory-service
      ports:
        - protocol: TCP
          port: 8093
    - to:
        - podSelector:
            matchLabels:
              app: user-profile
      ports:
        - protocol: TCP
          port: 8089
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memory-user-ingress-from-llm
  namespace: jarvis-prod
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - memory-service
          - user-profile
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: llm-service
      ports:
        - protocol: TCP
          port: 8093
        - protocol: TCP
          port: 8089
---
# llm-server (in-cluster llama.cpp wrapper) must accept connections from
# llm-service. memory-service + user-profile share the policy so the
# combined "LLM downstream" ingress lives in one place.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-server-memory-user-ingress-from-llm
  namespace: jarvis-prod
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - llm-server
          - memory-service
          - user-profile
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: llm-service
      ports:
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 8093
        - protocol: TCP
          port: 8089
---
