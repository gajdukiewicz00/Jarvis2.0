---
# vision-security-service is a selectorless Service whose Endpoints object
# is patched at deploy time to the workstation host IP (see
# infra/scripts/microk8s/apply-vision-security-host-endpoints.sh and
# infra/k8s/base/vision-security-service/). NetworkPolicy cannot select a
# host endpoint by pod label, so the api-gateway egress is constrained to
# port 8094 only — same pattern as the host-model-daemon bridge above.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-egress-vision-security-bridge
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8094
---
# media-service's LlmTranslationProvider calls llm-service directly (subtitle
# translation) when jarvis.media.translation.mode=llm — see MediaProperties /
# RestClientConfig, default services.llm-service-url=http://llm-service:8091.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: media-egress-llm-service
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: media-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: llm-service
      ports:
        - protocol: TCP
          port: 8091
---
