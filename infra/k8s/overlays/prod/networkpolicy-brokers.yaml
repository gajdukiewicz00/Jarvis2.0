apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-egress-brokers
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-ingress-from-orchestrator
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: orchestrator
        - podSelector:
            matchLabels:
              app: voice-gateway
        - podSelector:
            matchLabels:
              app: memory-service
      ports:
        - protocol: TCP
          port: 5672
---
# voice-gateway publishes owner-confirmation events; Spring's
# RabbitHealthIndicator also probes on every readiness check.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: voice-gateway-egress-rabbit
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: voice-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-ingress-from-orchestrator
  namespace: jarvis-prod
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: orchestrator
      ports:
        - protocol: TCP
          port: 9092
