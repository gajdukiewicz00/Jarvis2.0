apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis-prod
spec:
  template:
    spec:
      initContainers:
        - name: wait-security-service
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -ec
            - |
              until wget -qO- http://security-service:8088/actuator/health/readiness | grep -q '"status":"UP"'; do
                echo "waiting for security-service readiness"
                sleep 3
              done
        - name: wait-orchestrator
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -ec
            - |
              until wget -qO- http://orchestrator:8083/actuator/health/readiness | grep -q '"status":"UP"'; do
                echo "waiting for orchestrator readiness"
                sleep 3
              done
      containers:
        - name: api-gateway
          env:
            - name: MEMORY_SERVICE_ENABLED
              value: "true"
            - name: MEMORY_SERVICE_URL
              value: "http://memory-service:8093"
            - name: JARVIS_LLM_ENABLED
              value: "false"
---
apiVersion: apps/v1
kind: Deployment
