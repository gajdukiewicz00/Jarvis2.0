# Embedding Service (Python/CPU) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: jarvis
  labels:
    app: embedding-service
    app.kubernetes.io/name: embedding-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: jarvis/embedding-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: MODEL_NAME
              value: "intfloat/multilingual-e5-small"
            - name: CACHE_SIZE
              value: "1000"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5001"
          volumeMounts:
            - name: embedding-cache
              mountPath: /app/cache
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"
            requests:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: embedding-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: jarvis
  labels:
    app: embedding-service
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      name: http
  selector:
    app: embedding-service

