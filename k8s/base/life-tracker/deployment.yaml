# Life Tracker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: life-tracker
  namespace: jarvis
  labels:
    app: life-tracker
    app.kubernetes.io/name: life-tracker
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: life-tracker
  template:
    metadata:
      labels:
        app: life-tracker
    spec:
      containers:
        - name: life-tracker
          image: jarvis/life-tracker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_db"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: life-tracker
  namespace: jarvis
  labels:
    app: life-tracker
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      name: http
  selector:
    app: life-tracker
