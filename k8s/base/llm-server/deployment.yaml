# LLM Server (Python/GPU) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: jarvis
  labels:
    app: llm-server
    app.kubernetes.io/name: llm-server
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
    spec:
      containers:
        - name: llm-server
          image: jarvis/llm-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: LLM_BACKEND
              value: "transformers"
            - name: MODEL_PATH
              value: "/models/h2ogpt-4096-llama2-7b-chat"
            - name: GGUF_MODEL_PATH
              value: "/models/h2ogpt-7b-chat-q4_k_m.gguf"
            - name: MAX_NEW_TOKENS
              value: "512"
            - name: MAX_GENERATION_SECONDS
              value: "120"
            - name: TEMPERATURE
              value: "0.7"
            - name: N_GPU_LAYERS
              value: "-1"
            - name: N_CTX
              value: "4096"
            - name: ENABLE_STREAMING
              value: "true"
            - name: ENABLE_WARMUP
              value: "true"
            - name: LOG_LEVEL
              value: "INFO"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: models
          hostPath:
            path: /home/kwaqa/models
            type: Directory
      # Ensure pod runs on node with GPU
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: jarvis
  labels:
    app: llm-server
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app: llm-server

