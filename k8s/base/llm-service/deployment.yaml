# LLM Service (Java) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: jarvis
  labels:
    app: llm-service
    app.kubernetes.io/name: llm-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
        - name: llm-service
          image: jarvis/llm-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: LLM_SERVER_URL
              value: "http://llm-server.jarvis.svc.cluster.local:5000"
            - name: JARVIS_LLM_ENABLED
              value: "true"
            - name: LLM_MAX_NEW_TOKENS
              value: "512"
            - name: LLM_READ_TIMEOUT_MS
              value: "600000"
            - name: MEMORY_SERVICE_URL
              value: "http://memory-service.jarvis.svc.cluster.local:8093"
            - name: USER_PROFILE_SERVICE_URL
              value: "http://user-profile.jarvis.svc.cluster.local:8089"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: jarvis
  labels:
    app: llm-service
spec:
  type: ClusterIP
  ports:
    - port: 8091
      targetPort: 8091
      name: http
  selector:
    app: llm-service

