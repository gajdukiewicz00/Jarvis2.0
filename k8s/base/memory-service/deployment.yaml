# Memory Service (Java) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-service
  namespace: jarvis
  labels:
    app: memory-service
    app.kubernetes.io/name: memory-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-service
  template:
    metadata:
      labels:
        app: memory-service
    spec:
      containers:
        - name: memory-service
          image: jarvis/memory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8093
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_memory"
            - name: EMBEDDING_SERVICE_URL
              value: "http://embedding-service.jarvis.svc.cluster.local:5001"
            - name: MEMORY_TOPK
              value: "5"
            - name: MEMORY_MAX_TOKENS
              value: "600"
            - name: CHUNK_SIZE
              value: "500"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8093
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8093
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memory-service
  namespace: jarvis
  labels:
    app: memory-service
spec:
  type: ClusterIP
  ports:
    - port: 8093
      targetPort: 8093
      name: http
  selector:
    app: memory-service

