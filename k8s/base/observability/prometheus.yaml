# Prometheus — metrics collection and alerting
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: jarvis
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: jarvis-actuator
        # Compatibility baseline for the current internal-TLS rollout.
        # Scrapes still target pod IPs, while service certificates are issued
        # for service DNS names / 127.0.0.1. The repo-side follow-up is:
        # mount the Jarvis CA bundle, scrape via service DNS, set `server_name`,
        # then remove `insecure_skip_verify`.
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["jarvis"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

          - source_labels: [__meta_kubernetes_pod_phase]
            action: keep
            regex: Running

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __tmp_prometheus_port

          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keepequal
            target_label: __tmp_prometheus_port

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
            action: replace
            regex: (https?)
            replacement: $1
            target_label: __scheme__

          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: __metrics_path__

          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: app

          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            regex: (.+)
            replacement: $1
            target_label: app

          - action: labeldrop
            regex: __tmp_prometheus_port

  alerts.yml: |
    groups:
      - name: jarvis_availability
        rules:
          - alert: JarvisServiceDown
            expr: up{job="jarvis-actuator"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.app }} is DOWN"
              description: "Prometheus cannot scrape {{ $labels.app }} (pod {{ $labels.pod }}) for more than 1 minute."

          - alert: JarvisHighRestartRate
            expr: increase(process_uptime_seconds{job="jarvis-actuator"}[10m]) < 300 and up{job="jarvis-actuator"} == 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "{{ $labels.app }} restarted recently"

      - name: jarvis_http
        rules:
          - alert: JarvisHigh5xxRate
            expr: |
              (
                sum by (app) (rate(http_server_requests_seconds_count{status=~"5..",job="jarvis-actuator"}[5m]))
                /
                clamp_min(sum by (app) (rate(http_server_requests_seconds_count{job="jarvis-actuator"}[5m])), 1)
              ) > 0.05
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: ">5% 5xx on {{ $labels.app }}"

          - alert: JarvisHighLatencyP99
            expr: |
              histogram_quantile(0.99,
                sum by (app, le) (rate(http_server_requests_seconds_bucket{job="jarvis-actuator"}[5m]))
              ) > 5
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "P99 >5s on {{ $labels.app }}"

      - name: jarvis_jvm
        rules:
          - alert: JarvisJvmHeapHigh
            expr: jvm_memory_used_bytes{area="heap",job="jarvis-actuator"} / jvm_memory_max_bytes{area="heap",job="jarvis-actuator"} > 0.90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Heap >90% on {{ $labels.app }}"

          - alert: JarvisJvmHeapCritical
            expr: jvm_memory_used_bytes{area="heap",job="jarvis-actuator"} / jvm_memory_max_bytes{area="heap",job="jarvis-actuator"} > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Heap >95% on {{ $labels.app }}"

      - name: jarvis_llm
        rules:
          - alert: LlmAdmissionQueueSaturated
            expr: llm_admission_queue > 6
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "LLM admission queue depth {{ $value }}"

          - alert: LlmHighFailureRate
            expr: |
              rate(llm_chat_failures_total[5m])
              /
              clamp_min(rate(llm_chat_requests_total[5m]), 0.001)
              > 0.20
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: ">20% LLM chat failure rate"

          - alert: LlmInferenceTimeout
            expr: rate(llm_chat_timeouts_total[5m]) > 0.1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "LLM inference timeouts increasing"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: jarvis
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jarvis-prometheus
  namespace: jarvis
  labels:
    app.kubernetes.io/part-of: jarvis
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jarvis-prometheus
  namespace: jarvis
  labels:
    app.kubernetes.io/part-of: jarvis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jarvis-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: jarvis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: jarvis
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: jarvis
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: jarvis
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: jarvis
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
