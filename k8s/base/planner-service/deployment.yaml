# Planner Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-service
  namespace: jarvis
  labels:
    app: planner-service
    app.kubernetes.io/name: planner-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner-service
  template:
    metadata:
      labels:
        app: planner-service
    spec:
      containers:
        - name: planner-service
          image: jarvis/planner-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8092
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_db"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8092
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8092
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: planner-service
  namespace: jarvis
  labels:
    app: planner-service
spec:
  type: ClusterIP
  ports:
    - port: 8092
      targetPort: 8092
      name: http
  selector:
    app: planner-service

