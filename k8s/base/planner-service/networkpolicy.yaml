# Restrict planner-service ingress to api-gateway only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: planner-service-ingress
  namespace: jarvis
  labels:
    app: planner-service
spec:
  podSelector:
    matchLabels:
      app: planner-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8092
