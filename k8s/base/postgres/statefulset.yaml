# PostgreSQL StatefulSet with pgvector extension
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jarvis
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "jarvis"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_PASSWORD
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_USER
            - name: PGDATABASE
              value: "jarvis"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: jarvis
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: jarvis
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- Create databases for services
      CREATE DATABASE jarvis_security;
      CREATE DATABASE jarvis_user_profile;
      CREATE DATABASE jarvis_memory;
      CREATE DATABASE jarvis_db;
      
      -- Enable pgvector extension
      CREATE EXTENSION IF NOT EXISTS vector;
      
      -- Grant privileges
      GRANT ALL PRIVILEGES ON DATABASE jarvis_security TO jarvis;
      GRANT ALL PRIVILEGES ON DATABASE jarvis_user_profile TO jarvis;
      GRANT ALL PRIVILEGES ON DATABASE jarvis_memory TO jarvis;
      GRANT ALL PRIVILEGES ON DATABASE jarvis_db TO jarvis;
    EOSQL
    
    # Enable pgvector in memory database
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "jarvis_memory" <<-EOSQL
      CREATE EXTENSION IF NOT EXISTS vector;
    EOSQL
