# =============================================================================
# Jarvis 2.0 - Secrets
# =============================================================================
# ВАЖНО: В production используй External Secrets Operator или Sealed Secrets
# Эти значения - для dev/test. Замени перед деплоем!
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: jarvis-secrets
  namespace: jarvis
  labels:
    app.kubernetes.io/name: jarvis-secrets
    app.kubernetes.io/part-of: jarvis
type: Opaque
stringData:
  # ==========================================================================
  # PostgreSQL Credentials
  # ==========================================================================
  POSTGRES_USER: "jarvis"
  POSTGRES_PASSWORD: "jarvis-k8s-password-change-me"
  
  # Spring datasource (для микросервисов)
  SPRING_DATASOURCE_USERNAME: "jarvis"
  SPRING_DATASOURCE_PASSWORD: "jarvis-k8s-password-change-me"
  
  # ==========================================================================
  # RabbitMQ Credentials
  # ==========================================================================
  RABBITMQ_DEFAULT_USER: "jarvis"
  RABBITMQ_DEFAULT_PASS: "rabbitmq-k8s-password-change-me"
  RABBITMQ_ERLANG_COOKIE: "jarvis-erlang-cookie-for-cluster"
  
  # Spring RabbitMQ
  SPRING_RABBITMQ_USERNAME: "jarvis"
  SPRING_RABBITMQ_PASSWORD: "rabbitmq-k8s-password-change-me"
  
  # ==========================================================================
  # Kafka Credentials (для будущего SASL)
  # ==========================================================================
  KAFKA_SASL_USERNAME: "jarvis"
  KAFKA_SASL_PASSWORD: "kafka-k8s-password-change-me"
  
  # ==========================================================================
  # JWT Secret
  # ==========================================================================
  JWT_SECRET: "jarvis-jwt-secret-key-for-k8s-min-256-bits-long-for-HS256-algorithm-change-in-production"
  
  # ==========================================================================
  # Encryption Keys (для будущего шифрования)
  # ==========================================================================
  ENCRYPTION_KEY: "jarvis-encryption-key-32-bytes!"
# =============================================================================
# TLS Secret для Ingress
# =============================================================================
# ВАЖНО: TLS secret генерируется динамически через jarvis-launch.sh
# НЕ храните реальные сертификаты в Git! 
# 
# Скрипт jarvis-launch.sh автоматически:
# 1. Генерирует self-signed сертификат в docker/certs/
# 2. Создаёт kubernetes secret jarvis-tls через kubectl create secret tls
# 
# Для ручной генерации:
# openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#   -keyout jarvis.key -out jarvis.crt \
#   -subj "/CN=jarvis.local/O=Jarvis" \
#   -addext "subjectAltName=DNS:jarvis.local,DNS:*.jarvis.local,DNS:localhost,IP:127.0.0.1"
#
# kubectl create secret tls jarvis-tls \
#   --cert=jarvis.crt --key=jarvis.key -n jarvis
# =============================================================================
