# Security Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: jarvis
  labels:
    app: security-service
    app.kubernetes.io/name: security-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: jarvis/security-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_security"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: jarvis
  labels:
    app: security-service
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: 8088
      name: http
      name: http
  selector:
    app: security-service

