# Smart Home Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-home-service
  namespace: jarvis
  labels:
    app: smart-home-service
    app.kubernetes.io/name: smart-home-service
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-home-service
  template:
    metadata:
      labels:
        app: smart-home-service
    spec:
      containers:
        - name: smart-home-service
          image: jarvis/smart-home-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: MQTT_BROKER_URL
              value: "tcp://mosquitto.jarvis.svc.cluster.local:1883"
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
            requests:
              memory: "128Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: smart-home-service
  namespace: jarvis
  labels:
    app: smart-home-service
spec:
  type: ClusterIP
  ports:
    - port: 8086
      targetPort: 8086
      name: http
  selector:
    app: smart-home-service

