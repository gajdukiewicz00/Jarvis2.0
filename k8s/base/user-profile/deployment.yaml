# User Profile Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-profile
  namespace: jarvis
  labels:
    app: user-profile
    app.kubernetes.io/name: user-profile
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-profile
  template:
    metadata:
      labels:
        app: user-profile
    spec:
      containers:
        - name: user-profile
          image: jarvis/user-profile:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_user_profile"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-profile
  namespace: jarvis
  labels:
    app: user-profile
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      name: http
  selector:
    app: user-profile

