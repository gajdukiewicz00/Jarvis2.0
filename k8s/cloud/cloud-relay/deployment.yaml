
apiVersion: v1
kind: Namespace
metadata:
  name: jarvis-relay
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-relay
  namespace: jarvis-relay
  labels:
    app: cloud-relay
    app.kubernetes.io/name: cloud-relay
    app.kubernetes.io/part-of: jarvis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-relay
  template:
    metadata:
      labels:
        app: cloud-relay
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloud-relay
          image: jarvis/cloud-relay
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8096
              name: http
          env:
            - name: JARVIS_RELAY_QUEUE_CAP
              value: "256"
            - name: JARVIS_RELAY_MAX_BLOB_BYTES
              value: "65536"
            - name: JARVIS_RELAY_BLOB_TTL_SECONDS
              value: "86400"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: "192Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "25m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8096
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8096
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8096
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-relay
  namespace: jarvis-relay
  labels:
    app: cloud-relay
spec:
  type: ClusterIP
  ports:
    - port: 8096
      targetPort: 8096
      name: http
  selector:
    app: cloud-relay
