# =============================================================================
# Jarvis 2.0 - Secrets (DEV ONLY)
# =============================================================================
# ⚠️  DEV/TEST credentials only! DO NOT use in production!
# ⚠️  For production: use External Secrets Operator or Sealed Secrets
#
# Apply after namespace: kubectl apply -f k8s/dev/02-secrets-dev.yaml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: jarvis-secrets
  namespace: jarvis
  labels:
    app.kubernetes.io/name: jarvis-secrets
    app.kubernetes.io/part-of: jarvis
    environment: dev
type: Opaque
stringData:
  # ==========================================================================
  # PostgreSQL Credentials (DEV)
  # ==========================================================================
  POSTGRES_USER: "jarvis"
  POSTGRES_PASSWORD: "jarvis-dev-password"
  
  # Spring datasource
  SPRING_DATASOURCE_USERNAME: "jarvis"
  SPRING_DATASOURCE_PASSWORD: "jarvis-dev-password"
  
  # ==========================================================================
  # RabbitMQ Credentials (DEV)
  # ==========================================================================
  RABBITMQ_DEFAULT_USER: "jarvis"
  RABBITMQ_DEFAULT_PASS: "rabbitmq-dev-password"
  RABBITMQ_ERLANG_COOKIE: "jarvis-dev-erlang-cookie"
  
  # Spring RabbitMQ
  SPRING_RABBITMQ_USERNAME: "jarvis"
  SPRING_RABBITMQ_PASSWORD: "rabbitmq-dev-password"
  
  # ==========================================================================
  # Kafka Credentials (DEV - for future SASL)
  # ==========================================================================
  KAFKA_SASL_USERNAME: "jarvis"
  KAFKA_SASL_PASSWORD: "kafka-dev-password"
  
  # ==========================================================================
  # JWT Secret (DEV)
  # ==========================================================================
  JWT_SECRET: "jarvis-dev-jwt-secret-min-256-bits-for-HS256-algorithm"
  
  # ==========================================================================
  # Encryption Key (DEV)
  # ==========================================================================
  ENCRYPTION_KEY: "jarvis-dev-encryption-key-32b!"

