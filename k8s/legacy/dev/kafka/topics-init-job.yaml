# =============================================================================
# Jarvis 2.0 - Kafka Topics Initialization Job
# =============================================================================
# Создаёт все топики Jarvis при первом запуске
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: jarvis
  labels:
    app: kafka-topics-init
    app.kubernetes.io/name: kafka-topics-init
    app.kubernetes.io/part-of: jarvis
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: kafka-topics-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Ждём, пока Kafka будет готова
        - name: wait-for-kafka
          image: bitnami/kafka:3.7
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until kafka-broker-api-versions.sh --bootstrap-server kafka.jarvis.svc.cluster.local:9092; do
                echo "Kafka not ready yet, waiting..."
                sleep 5
              done
              echo "Kafka is ready!"
      containers:
        - name: create-topics
          image: bitnami/kafka:3.7
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BOOTSTRAP="kafka.jarvis.svc.cluster.local:9092"
              
              echo "=== Creating Jarvis Kafka Topics ==="
              
              # Топики для событий (event sourcing / analytics)
              TOPICS=(
                "jarvis.events.expenses:3:1:604800000"        # 7 дней retention
                "jarvis.events.time-tracking:3:1:604800000"
                "jarvis.events.calendar:3:1:604800000"
                "jarvis.events.smarthome:3:1:259200000"       # 3 дня
                "jarvis.events.pc-control:3:1:259200000"
                "jarvis.events.voice:3:1:86400000"            # 1 день
                "jarvis.events.audit:3:1:2592000000"          # 30 дней
                "jarvis.events.logs:3:1:86400000"             # 1 день
              )
              
              for topic_config in "${TOPICS[@]}"; do
                IFS=':' read -r topic partitions replication retention <<< "$topic_config"
                
                echo "Creating topic: $topic (partitions=$partitions, replication=$replication, retention=${retention}ms)"
                
                kafka-topics.sh --bootstrap-server $BOOTSTRAP \
                  --create --if-not-exists \
                  --topic "$topic" \
                  --partitions "$partitions" \
                  --replication-factor "$replication" \
                  --config retention.ms="$retention" \
                  --config cleanup.policy=delete
              done
              
              echo "=== All topics created ==="
              echo ""
              echo "=== Topic list ==="
              kafka-topics.sh --bootstrap-server $BOOTSTRAP --list
              echo ""
              echo "=== Topic details ==="
              kafka-topics.sh --bootstrap-server $BOOTSTRAP --describe

