# =============================================================================
# Jarvis 2.0 - PostgreSQL Init Scripts ConfigMap
# =============================================================================
# Скрипты инициализации баз данных для всех микросервисов
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres-init
    app.kubernetes.io/part-of: jarvis
data:
  # ==========================================================================
  # 01-init-databases.sh - Создание всех баз данных
  # ==========================================================================
  01-init-databases.sh: |
    #!/bin/bash
    set -e
    
    echo "=== Jarvis 2.0: Initializing databases ==="
    
    # Список баз данных для микросервисов
    DATABASES=(
      "jarvis_db"              # life-tracker, planner-service
      "jarvis_assistant_core"  # assistant-core
      "jarvis_user_profile"    # user-profile
      "jarvis_security"        # security-service
      "jarvis_analytics"       # analytics-service (для агрегатов)
    )
    
    for dbname in "${DATABASES[@]}"; do
      echo "Creating database: $dbname"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        SELECT 'CREATE DATABASE $dbname'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$dbname')\gexec
        
        GRANT ALL PRIVILEGES ON DATABASE $dbname TO $POSTGRES_USER;
    EOSQL
      echo "Database $dbname created successfully"
    done
    
    echo "=== All databases initialized ==="

  # ==========================================================================
  # 02-configure-connections.sql - Настройка соединений
  # ==========================================================================
  02-configure-connections.sql: |
    -- Увеличиваем лимиты соединений для микросервисной архитектуры
    -- Примечание: эти настройки применятся при следующем рестарте
    -- Для runtime используй ALTER SYSTEM
    
    -- Проверяем текущие настройки
    SELECT name, setting, unit, context 
    FROM pg_settings 
    WHERE name IN ('max_connections', 'shared_buffers', 'work_mem');
    
    -- Создаём расширения если нужны
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

  # ==========================================================================
  # postgres.conf override (опционально)
  # ==========================================================================
  postgresql.conf: |
    # =======================================================================
    # Jarvis 2.0 PostgreSQL Configuration (Dev Profile)
    # =======================================================================
    
    # Connection Settings
    max_connections = 100
    
    # Memory Settings (для dev - минимальные)
    shared_buffers = 128MB
    work_mem = 4MB
    maintenance_work_mem = 64MB
    
    # Write Ahead Log
    wal_level = replica
    max_wal_senders = 3
    
    # Query Tuning
    effective_cache_size = 256MB
    
    # Logging
    log_destination = 'stderr'
    logging_collector = off
    log_statement = 'ddl'
    log_duration = off
    log_min_duration_statement = 1000
    
    # Locale
    lc_messages = 'en_US.utf8'
    lc_monetary = 'en_US.utf8'
    lc_numeric = 'en_US.utf8'
    lc_time = 'en_US.utf8'

