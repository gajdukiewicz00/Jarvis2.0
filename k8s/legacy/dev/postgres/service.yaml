# =============================================================================
# Jarvis 2.0 - PostgreSQL Service (Dev Profile)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres

