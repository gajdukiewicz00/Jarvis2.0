# =============================================================================
# Jarvis 2.0 - Analytics Service (Dev Profile)
# =============================================================================
# Aggregation and analytics over life-tracker data
# Kafka consumer (когда feature flag включен) или Feign → life-tracker
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: jarvis
  labels:
    app: analytics-service
    app.kubernetes.io/name: analytics-service
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        app.kubernetes.io/name: analytics-service
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      initContainers:
        - name: wait-for-life-tracker
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for life-tracker..."
              until nc -z life-tracker 8085; do
                echo "life-tracker not ready, waiting..."
                sleep 5
              done
              echo "life-tracker is ready!"
      containers:
        - name: analytics-service
          image: jarvis/analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            # Life-tracker URL (для Feign, пока feature flag выключен)
            - name: LIFE_TRACKER_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: LIFE_TRACKER_URL
            # Kafka (для событий когда включено)
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_EXPENSES
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_EXPENSES
            - name: KAFKA_TOPIC_TIME_TRACKING
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_TIME_TRACKING
            - name: KAFKA_TOPIC_CALENDAR
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_CALENDAR
            # Feature flag
            - name: FEATURE_KAFKA_ANALYTICS
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_KAFKA_ANALYTICS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: jarvis
  labels:
    app: analytics-service
    app.kubernetes.io/name: analytics-service
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 8087
      targetPort: 8087
      protocol: TCP
      name: http
  selector:
    app: analytics-service

