# =============================================================================
# Jarvis 2.0 - API Gateway (Dev Profile)
# =============================================================================
# Главная точка входа для всех внешних запросов
# - JWT валидация
# - Routing к микросервисам
# - RabbitMQ producer для команд (когда feature flag включен)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: jarvis
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: jarvis
        tier: gateway
    spec:
      # Init container для ожидания зависимостей
      initContainers:
        - name: wait-for-security-service
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for security-service..."
              until nc -z security-service 8088; do
                echo "security-service not ready, waiting..."
                sleep 5
              done
              echo "security-service is ready!"
      containers:
        - name: api-gateway
          image: jarvis/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Spring profile
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: JWT_SECRET
            # Service URLs
            - name: SERVICES_SECURITY_URL
              value: http://security-service.jarvis.svc.cluster.local:8088
            - name: VOICE_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: VOICE_GATEWAY_URL
            - name: NLP_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: NLP_SERVICE_URL
            - name: ORCHESTRATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: ORCHESTRATOR_URL
            - name: PC_CONTROL_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: PC_CONTROL_URL
            - name: LIFE_TRACKER_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: LIFE_TRACKER_URL
            - name: SMART_HOME_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SMART_HOME_URL
            - name: ANALYTICS_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: ANALYTICS_SERVICE_URL
            - name: LLM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: LLM_SERVICE_URL
            # RabbitMQ (для будущей миграции)
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_PORT
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_PASSWORD
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              value: "jarvis"
            # Feature flags
            - name: FEATURE_RABBITMQ_PC_CONTROL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_RABBITMQ_PC_CONTROL
            - name: FEATURE_RABBITMQ_SMART_HOME
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_RABBITMQ_SMART_HOME
            # CORS configuration
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: jarvis
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: api-gateway

