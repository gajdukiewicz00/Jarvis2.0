# =============================================================================
# Jarvis 2.0 - Life Tracker Service (Dev Profile)
# =============================================================================
# Expenses, time tracking, calendar events
# Kafka producer для событий (когда feature flag включен)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: life-tracker
  namespace: jarvis
  labels:
    app: life-tracker
    app.kubernetes.io/name: life-tracker
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: life-tracker
  template:
    metadata:
      labels:
        app: life-tracker
        app.kubernetes.io/name: life-tracker
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do
                echo "PostgreSQL not ready, waiting..."
                sleep 5
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: life-tracker
          image: jarvis/life-tracker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            # Database
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            # Kafka (для событий)
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_EXPENSES
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_EXPENSES
            - name: KAFKA_TOPIC_TIME_TRACKING
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_TIME_TRACKING
            - name: KAFKA_TOPIC_CALENDAR
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_CALENDAR
            # Feature flags
            - name: FEATURE_KAFKA_EVENTS
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_KAFKA_ANALYTICS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: life-tracker
  namespace: jarvis
  labels:
    app: life-tracker
    app.kubernetes.io/name: life-tracker
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
      name: http
  selector:
    app: life-tracker

