# Jarvis 2.0 — LLM stack (llm-server + llm-service) for dev/minikube.
# If you run minikube with Docker/Podman driver, mount models from host in a
# separate terminal and keep it running:
#   minikube mount /home/kwaqa/models:/models
# Ensure MODEL_PATH points inside /models.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-smoke-script
  namespace: jarvis
data:
  llm-smoke.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    # Smoke test for llm-service REST API with session memory check.
    # Defaults target the in-cluster service; override LLM_SERVICE_URL for port-forward/local.
    # Examples:
    #   LLM_SERVICE_URL=http://localhost:8091 ./llm-smoke.sh
    #   TIMEOUT_SEC=60 SESSION_ID=smoke1 CODEWORD=alpha ./llm-smoke.sh

    LLM_SERVICE_URL="${LLM_SERVICE_URL:-http://llm-service:8091}"
    TIMEOUT_SEC="${TIMEOUT_SEC:-30}"
    HEALTH_TIMEOUT_SEC="${HEALTH_TIMEOUT_SEC:-8}"
    SESSION_ID="${SESSION_ID:-smoke}"
    CODEWORD="${CODEWORD:-s3cr3t}"
    CORRELATION_ID="smoke-$(date +%s)"

    health_url="${LLM_SERVICE_URL}/api/v1/llm/health"
    chat_url="${LLM_SERVICE_URL}/api/v1/llm/chat"

    echo "Checking llm-service health at ${health_url} ..."
    health_tmp="$(mktemp)"
    health_status="$(curl -sS --max-time "${HEALTH_TIMEOUT_SEC}" -o "${health_tmp}" -w "%{http_code}" "${health_url}")"
    health_json="$(cat "${health_tmp}")"
    rm -f "${health_tmp}"

    if [ "${health_status}" != "200" ]; then
      echo "❌ health check failed: status=${health_status}, body=${health_json}" >&2
      exit 1
    fi
    echo "Health: ${health_json}"

    chat_request() {
      local prompt="$1"
      local tmp
      tmp="$(mktemp)"
      local payload
      payload=$(cat <<EOF
    {
      "sessionId": "${SESSION_ID}",
      "messages": [
        { "role": "user", "content": "${prompt}" }
      ]
    }
    EOF
    )
      local start_ms end_ms status
      start_ms="$(date +%s%3N)"
      status="$(curl -sS --max-time "${TIMEOUT_SEC}" -o "${tmp}" -w "%{http_code}" \
        -H "Content-Type: application/json" \
        -H "X-Correlation-ID: ${CORRELATION_ID}" \
        -X POST -d "${payload}" "${chat_url}")" || status=$?
      end_ms="$(date +%s%3N)"
      local body
      body="$(cat "${tmp}")"
      rm -f "${tmp}"

      if [ "${status}" != "200" ]; then
        echo "❌ chat failed: status=${status}, body=${body}" >&2
        exit 1
      fi

      if ! echo "${body}" | grep -q '"reply"'; then
        echo "❌ reply field missing in response: ${body}" >&2
        exit 1
      fi

      local latency_ms=$((end_ms - start_ms))
      local reply_preview
      reply_preview="$(echo "${body}" | sed -n 's/.*"reply":"\([^"]*\)".*/\1/p' | head -c 120)"
      echo "Reply (~${latency_ms} ms): ${reply_preview}"

      CHAT_LAST_BODY="${body}"
    }

    echo "Chat #1: ask model to remember codeword '${CODEWORD}' ..."
    chat_request "Запомни кодовое слово ${CODEWORD}."

    echo "Chat #2: ask model to recall the codeword ..."
    chat_request "Какое кодовое слово я сказал ранее? Ответь одной строкой."

    lower_reply="$(echo "${CHAT_LAST_BODY}" | tr '[:upper:]' '[:lower:]')"
    lower_codeword="$(echo "${CODEWORD}" | tr '[:upper:]' '[:lower:]')"
    if ! echo "${lower_reply}" | grep -q "${lower_codeword}"; then
      echo "❌ memory check failed: reply does not mention codeword '${CODEWORD}'" >&2
      exit 1
    fi

    echo "✅ llm-service smoke test passed (session memory OK)"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: jarvis
  labels:
    app: llm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
    spec:
      containers:
        - name: llm-server
          image: jarvis/llm-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DEVICE
              value: "cpu" # set to "cuda" when GPU nodes are available
            - name: MODEL_PATH
              value: "/models/h2ogpt-4096-llama2-7b-chat"
            - name: MAX_TOKENS
              value: "512"
            - name: MAX_HISTORY_LENGTH
              value: "20"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "1"
              memory: "6Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
            # To run on GPU, also set DEVICE=cuda and add:
            # limits:
            #   nvidia.com/gpu: 1
          volumeMounts:
            - name: llm-models
              mountPath: /models
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 40   # allows ~13 minutes for model load
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
      volumes:
        - name: llm-models
          hostPath:
            path: /models
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: jarvis
spec:
  type: ClusterIP
  selector:
    app: llm-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: jarvis
  labels:
    app: llm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
        - name: llm-service
          image: jarvis/llm-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: JARVIS_LLM_ENABLED
              value: "true"
            - name: LLM_SERVER_URL
              value: "http://llm-server:5000"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/llm/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/llm/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: llm-smoke
              mountPath: /scripts/llm-smoke.sh
              subPath: llm-smoke.sh
              readOnly: true
      volumes:
        - name: llm-smoke
          configMap:
            name: llm-smoke-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: jarvis
spec:
  type: ClusterIP
  selector:
    app: llm-service
  ports:
    - name: http
      port: 8091
      targetPort: 8091

