# =============================================================================
# Jarvis 2.0 - PC Control Service (Dev Profile)
# =============================================================================
# System control: volume, media, apps, timers
# RabbitMQ consumer для pc-control.commands
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pc-control
  namespace: jarvis
  labels:
    app: pc-control
    app.kubernetes.io/name: pc-control
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pc-control
  template:
    metadata:
      labels:
        app: pc-control
        app.kubernetes.io/name: pc-control
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      containers:
        - name: pc-control
          image: jarvis/pc-control:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            # RabbitMQ
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_PORT
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_PASSWORD
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              value: "jarvis"
            # Queue
            - name: RABBITMQ_QUEUE_PC_CONTROL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_QUEUE_PC_CONTROL
            # Kafka для событий
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_TOPIC_PC_CONTROL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: KAFKA_TOPIC_PC_CONTROL
            # Feature flag
            - name: FEATURE_RABBITMQ_PC_CONTROL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_RABBITMQ_PC_CONTROL
            # Security
            - name: SECURITY_ALLOWED_ACTIONS
              value: "VOLUME_UP,VOLUME_DOWN,VOLUME_MUTE,LAUNCH_APP,MEDIA_CONTROL,TIMER_START,TIMER_STOP"
            # PulseAudio (для контроля громкости внутри контейнера)
            - name: PULSE_SERVER
              value: "unix:/run/user/1000/pulse/native"
            - name: DISPLAY
              value: ":0"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          # Для реального управления PC нужен доступ к хосту
          # Раскомментируй для privileged mode
          # securityContext:
          #   privileged: true
          # volumeMounts:
          #   - name: pulse-socket
          #     mountPath: /run/user/1000/pulse
          #   - name: x11-socket
          #     mountPath: /tmp/.X11-unix
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      # volumes:
      #   - name: pulse-socket
      #     hostPath:
      #       path: /run/user/1000/pulse
      #   - name: x11-socket
      #     hostPath:
      #       path: /tmp/.X11-unix
---
apiVersion: v1
kind: Service
metadata:
  name: pc-control
  namespace: jarvis
  labels:
    app: pc-control
    app.kubernetes.io/name: pc-control
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
  selector:
    app: pc-control

