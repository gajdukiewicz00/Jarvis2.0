# =============================================================================
# Jarvis 2.0 - Remaining Services (Dev Profile)
# =============================================================================
# nlp-service, orchestrator, user-profile, planner-service
# (llm-service и llm-server временно отключены - см. llm-disabled.yaml)
# =============================================================================

# -----------------------------------------------------------------------------
# NLP Service
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  namespace: jarvis
  labels:
    app: nlp-service
    app.kubernetes.io/name: nlp-service
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp-service
  template:
    metadata:
      labels:
        app: nlp-service
        app.kubernetes.io/name: nlp-service
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      containers:
        - name: nlp-service
          image: jarvis/nlp-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
  namespace: jarvis
  labels:
    app: nlp-service
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: nlp-service
---
# -----------------------------------------------------------------------------
# Orchestrator
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: jarvis
  labels:
    app: orchestrator
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      containers:
        - name: orchestrator
          image: jarvis/orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            - name: JARVIS_NLP_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: NLP_SERVICE_URL
            - name: JARVIS_PC_CONTROL_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: PC_CONTROL_URL
            - name: SERVER_PORT
              value: "8083"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: jarvis
  labels:
    app: orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: orchestrator
---
# -----------------------------------------------------------------------------
# User Profile
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-profile
  namespace: jarvis
  labels:
    app: user-profile
    app.kubernetes.io/name: user-profile
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-profile
  template:
    metadata:
      labels:
        app: user-profile
        app.kubernetes.io/name: user-profile
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c", "until nc -z postgres 5432; do sleep 5; done"]
      containers:
        - name: user-profile
          image: jarvis/user-profile:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_user_profile"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-profile
  namespace: jarvis
  labels:
    app: user-profile
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      name: http
  selector:
    app: user-profile
---
# -----------------------------------------------------------------------------
# Planner Service
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planner-service
  namespace: jarvis
  labels:
    app: planner-service
    app.kubernetes.io/name: planner-service
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planner-service
  template:
    metadata:
      labels:
        app: planner-service
        app.kubernetes.io/name: planner-service
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c", "until nc -z postgres 5432; do sleep 5; done"]
      containers:
        - name: planner-service
          image: jarvis/planner-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8092
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.jarvis.svc.cluster.local:5432/jarvis_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: LIFE_TRACKER_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: LIFE_TRACKER_URL
            - name: ANALYTICS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: ANALYTICS_SERVICE_URL
            - name: USER_PROFILE_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: USER_PROFILE_URL
            # LLM_SERVICE_URL временно отключен
            # - name: LLM_SERVICE_URL
            #   valueFrom:
            #     configMapKeyRef:
            #       name: jarvis-config
            #       key: LLM_SERVICE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8092
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8092
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: planner-service
  namespace: jarvis
  labels:
    app: planner-service
spec:
  type: ClusterIP
  ports:
    - port: 8092
      targetPort: 8092
      name: http
  selector:
    app: planner-service

