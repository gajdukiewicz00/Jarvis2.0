# =============================================================================
# Jarvis 2.0 - Voice Gateway (Dev Profile)
# =============================================================================
# STT/TTS service (Vosk, Whisper, eSpeak)
# RabbitMQ producer для voice.commands
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: jarvis
  labels:
    app: voice-gateway
    app.kubernetes.io/name: voice-gateway
    app.kubernetes.io/part-of: jarvis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-gateway
  template:
    metadata:
      labels:
        app: voice-gateway
        app.kubernetes.io/name: voice-gateway
        app.kubernetes.io/part-of: jarvis
        tier: backend
    spec:
      containers:
        - name: voice-gateway
          image: jarvis/voice-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: SPRING_PROFILES_ACTIVE
            # Orchestrator URL
            - name: JARVIS_ORCHESTRATOR_URL
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: ORCHESTRATOR_URL
            # Vosk model path
            - name: JARVIS_VOSK_MODEL_PATH
              value: "/app/models/vosk-model-small-ru-0.22"
            # RabbitMQ
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_HOST
            - name: SPRING_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: RABBITMQ_PORT
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: SPRING_RABBITMQ_PASSWORD
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              value: "jarvis"
            # Feature flag
            - name: FEATURE_RABBITMQ_VOICE
              valueFrom:
                configMapKeyRef:
                  name: jarvis-config
                  key: FEATURE_RABBITMQ_VOICE
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: voice-gateway
  namespace: jarvis
  labels:
    app: voice-gateway
    app.kubernetes.io/name: voice-gateway
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: voice-gateway

