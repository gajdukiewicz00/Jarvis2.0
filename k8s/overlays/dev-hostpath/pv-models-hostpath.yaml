# =============================================================================
# Dev-only hostPath PVs for local single-node setups.
# Replace the placeholder path below with the absolute path to this repo's models/ directory.
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-models-pv
  labels:
    type: local
    app: llm-server
spec:
  storageClassName: manual
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /REPLACE_WITH_ABSOLUTE_REPO_MODELS_PATH
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vosk-models-pv
  labels:
    type: local
    app: voice-gateway
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /REPLACE_WITH_ABSOLUTE_REPO_MODELS_PATH
    type: DirectoryOrCreate
