# Development overlay for Minikube
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jarvis-core

resources:
  # Namespaces
  - ../../namespaces/jarvis-namespaces.yaml
  
  # Secrets
  - ../../secrets/jwt-secret.yaml
  - ../../secrets/db-credentials.yaml
  
  # Data layer
  - ../../base/postgres/statefulset.yaml
  
  # Core services
  - ../../base/api-gateway/deployment.yaml
  - ../../base/security-service/deployment.yaml
  - ../../base/voice-gateway/deployment.yaml
  - ../../base/nlp-service/deployment.yaml
  - ../../base/orchestrator/deployment.yaml
  - ../../base/pc-control/deployment.yaml
  - ../../base/life-tracker/deployment.yaml
  - ../../base/analytics-service/deployment.yaml
  - ../../base/planner-service/deployment.yaml
  - ../../base/user-profile/deployment.yaml
  
  # LLM services
  - ../../base/llm-server/deployment.yaml
  - ../../base/llm-service/deployment.yaml
  - ../../base/embedding-service/deployment.yaml
  - ../../base/memory-service/deployment.yaml
  
  # IoT services
  - ../../base/smart-home-service/deployment.yaml
  - ../../base/mosquitto/deployment.yaml

# Common labels
commonLabels:
  environment: dev
  app.kubernetes.io/managed-by: kustomize

# Images (can be overridden for local builds)
images:
  - name: jarvis/api-gateway
    newTag: latest
  - name: jarvis/voice-gateway
    newTag: latest
  - name: jarvis/nlp-service
    newTag: latest
  - name: jarvis/orchestrator
    newTag: latest
  - name: jarvis/pc-control
    newTag: latest
  - name: jarvis/life-tracker
    newTag: latest
  - name: jarvis/analytics-service
    newTag: latest
  - name: jarvis/planner-service
    newTag: latest
  - name: jarvis/user-profile
    newTag: latest
  - name: jarvis/security-service
    newTag: latest
  - name: jarvis/smart-home-service
    newTag: latest
  - name: jarvis/llm-service
    newTag: latest
  - name: jarvis/memory-service
    newTag: latest
  - name: jarvis/llm-server
    newTag: latest
  - name: jarvis/embedding-service
    newTag: latest

