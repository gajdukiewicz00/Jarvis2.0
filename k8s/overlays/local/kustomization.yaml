# =============================================================================
# Jarvis 2.0 - Local Development Overlay (Kubernetes)
# =============================================================================
# Configures:
# - GPU-enabled llm-server (RTX 5070, 12GB VRAM)
# - PostgreSQL with pgvector
# - Embedding service (CPU)
# - Memory service (Java)
# - LLM service (Java)
# - hostPath volumes for local model storage
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jarvis

resources:
  - ../../base
  - pv-models.yaml
  - secrets-local.yaml
  # LLM/Memory stack - условно включается через ENABLE_LLM/ENABLE_MEMORY флаги
  # По умолчанию отключены (optional)
  # - postgres-pgvector.yaml  # Включается только если ENABLE_MEMORY=true
  # - embedding-service.yaml  # Включается только если ENABLE_LLM=true
  # - memory-service.yaml     # Включается только если ENABLE_MEMORY=true
  # - llm-server.yaml         # Включается только если ENABLE_LLM=true
  # - llm-service.yaml        # Включается только если ENABLE_LLM=true

configMapGenerator:
  - name: jarvis-local-config
    literals:
      # Model paths
      - MODELS_PATH=/models
      - GGUF_MODEL_PATH=/models/h2ogpt-7b-chat-q4_k_m.gguf
      - HF_MODEL_PATH=/models/h2ogpt-4096-llama2-7b-chat
      # LLM settings
      - LLM_BACKEND=llamacpp
      - N_GPU_LAYERS=35
      - N_CTX=4096
      - MAX_NEW_TOKENS=700
      - MAX_GENERATION_SECONDS=120
      # Service URLs (in-cluster)
      - LLM_SERVER_URL=http://llm-server:5000
      - EMBEDDING_SERVICE_URL=http://embedding-service:5001
      - MEMORY_SERVICE_URL=http://memory-service:8093
      # Memory settings
      - MEMORY_ENABLED=true
      - MEMORY_TOPK=5
      - MEMORY_MAX_TOKENS=600
      # Database
      - POSTGRES_HOST=postgres-pgvector
      - POSTGRES_PORT=5432
      - POSTGRES_DB=jarvis_memory

