# =============================================================================
# Persistent Volume for LLM Models (hostPath for local development)
# =============================================================================
# Points to /home/kwaqa/models on the host machine
# Contains:
#   - h2ogpt-4096-llama2-7b-chat/ (HuggingFace format)
#   - h2ogpt-7b-chat-q4_k_m.gguf (GGUF format)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-models-pv
  labels:
    type: local
    app: llm-server
spec:
  storageClassName: manual
  capacity:
    storage: 50Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/kwaqa/models
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-models-pvc
  namespace: jarvis
spec:
  storageClassName: manual
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      type: local
      app: llm-server

