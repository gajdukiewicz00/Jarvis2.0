# =============================================================================
# Secrets for Local Development
# =============================================================================
# NOTE: These are development secrets only. For production, use proper secret
# management (Vault, Sealed Secrets, External Secrets, etc.)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: jarvis-secrets
  namespace: jarvis
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: "jarvis"
  POSTGRES_PASSWORD: "jarvis123"
  # JWT (for security-service)
  JWT_SECRET: "jarvis-dev-secret-key-change-in-production-min-32-chars"
  # RabbitMQ
  RABBITMQ_USER: "jarvis"
  RABBITMQ_PASSWORD: "jarvis123"

