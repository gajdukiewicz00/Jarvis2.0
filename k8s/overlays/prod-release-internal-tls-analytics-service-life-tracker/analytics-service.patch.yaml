apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: jarvis
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-analytics-service-life-tracker: analytics-service-life-tracker-v1
    spec:
      containers:
        - name: analytics-service
          env:
            - name: LIFE_TRACKER_URL
              value: https://life-tracker.jarvis.svc.cluster.local:8085
            - name: JARVIS_JAVA_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-analytics-service-life-tracker
                  key: truststore-password
            - name: JAVA_TOOL_OPTIONS
              value: -Djavax.net.ssl.trustStore=/tls-life-tracker/jarvis-internal-truststore.jks -Djavax.net.ssl.trustStorePassword=$(JARVIS_JAVA_TRUSTSTORE_PASSWORD)
          volumeMounts:
            - name: internal-tls-analytics-service-life-tracker
              mountPath: /tls-life-tracker
              readOnly: true
      volumes:
        - name: internal-tls-analytics-service-life-tracker
          secret:
            secretName: jarvis-internal-tls-analytics-service-life-tracker
            items:
              - key: truststore.jks
                path: jarvis-internal-truststore.jks
              - key: ca.crt
                path: ca.crt
