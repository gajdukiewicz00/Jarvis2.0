apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: jarvis
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-api-gateway-analytics-service: api-gateway-analytics-service-v1
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8087"
        prometheus.io/scheme: https
    spec:
      containers:
        - name: analytics-service
          ports:
            - containerPort: 8087
              name: https
          env:
            - name: JARVIS_ANALYTICS_SSL_ENABLED
              value: "true"
            - name: JARVIS_ANALYTICS_KEYSTORE_PATH
              value: /tls/analytics-service-keystore.p12
            - name: JARVIS_ANALYTICS_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-api-gateway-analytics-service
                  key: keystore-password
            - name: JARVIS_ANALYTICS_KEYSTORE_TYPE
              value: PKCS12
          volumeMounts:
            - name: internal-tls-api-gateway-analytics-service
              mountPath: /tls
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
              scheme: HTTPS
      volumes:
        - name: internal-tls-api-gateway-analytics-service
          secret:
            secretName: jarvis-internal-tls-api-gateway-analytics-service
            items:
              - key: analytics-service-keystore.p12
                path: analytics-service-keystore.p12
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: jarvis
spec:
  ports:
    - port: 8087
      targetPort: 8087
      name: https
