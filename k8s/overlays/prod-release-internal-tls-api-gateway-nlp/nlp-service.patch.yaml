apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  namespace: jarvis
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice: api-gateway-nlp-v1
    spec:
      containers:
        - name: nlp-service
          ports:
            - containerPort: 8082
              name: https
          env:
            - name: JARVIS_NLP_SSL_ENABLED
              value: "true"
            - name: JARVIS_NLP_KEYSTORE_PATH
              value: /tls/nlp-service-keystore.p12
            - name: JARVIS_NLP_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-api-gateway-nlp
                  key: keystore-password
            - name: JARVIS_NLP_KEYSTORE_TYPE
              value: PKCS12
          volumeMounts:
            - name: internal-tls-api-gateway-nlp
              mountPath: /tls
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
              scheme: HTTPS
      volumes:
        - name: internal-tls-api-gateway-nlp
          secret:
            secretName: jarvis-internal-tls-api-gateway-nlp
            items:
              - key: nlp-service-keystore.p12
                path: nlp-service-keystore.p12
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
  namespace: jarvis
spec:
  ports:
    - port: 8082
      targetPort: 8082
      name: https
