apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-api-gateway-orchestrator: api-gateway-orchestrator-v1
    spec:
      containers:
        - name: api-gateway
          env:
            - name: ORCHESTRATOR_URL
              value: https://orchestrator.jarvis-prod.svc.cluster.local:8083
