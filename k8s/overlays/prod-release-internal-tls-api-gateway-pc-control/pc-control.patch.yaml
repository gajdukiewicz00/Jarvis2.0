apiVersion: apps/v1
kind: Deployment
metadata:
  name: pc-control
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-api-gateway-pc-control: api-gateway-pc-control-v1
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8084"
        prometheus.io/scheme: https
    spec:
      containers:
        - name: pc-control
          ports:
            - containerPort: 8084
              name: https
          env:
            - name: JARVIS_PC_CONTROL_SSL_ENABLED
              value: "true"
            - name: JARVIS_PC_CONTROL_KEYSTORE_PATH
              value: /tls/pc-control-keystore.p12
            - name: JARVIS_PC_CONTROL_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-api-gateway-pc-control
                  key: keystore-password
            - name: JARVIS_PC_CONTROL_KEYSTORE_TYPE
              value: PKCS12
          volumeMounts:
            - name: internal-tls-api-gateway-pc-control
              mountPath: /tls
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
              scheme: HTTPS
      volumes:
        - name: internal-tls-api-gateway-pc-control
          secret:
            secretName: jarvis-internal-tls-api-gateway-pc-control
            items:
              - key: pc-control-keystore.p12
                path: pc-control-keystore.p12
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: pc-control
  namespace: jarvis-prod
spec:
  ports:
    - port: 8084
      targetPort: 8084
      name: https
