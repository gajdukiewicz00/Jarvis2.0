apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-api-gateway-voice-gateway: api-gateway-voice-gateway-v1
    spec:
      containers:
        - name: api-gateway
          env:
            - name: VOICE_GATEWAY_URL
              value: https://voice-gateway.jarvis-prod.svc.cluster.local:8081
