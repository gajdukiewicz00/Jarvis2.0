apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: jarvis
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-api-gateway-voice-gateway: api-gateway-voice-gateway-v1
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8081"
        prometheus.io/scheme: https
    spec:
      containers:
        - name: voice-gateway
          ports:
            - containerPort: 8081
              name: https
          env:
            - name: JARVIS_VOICE_GATEWAY_SSL_ENABLED
              value: "true"
            - name: JARVIS_VOICE_GATEWAY_KEYSTORE_PATH
              value: /tls/voice-gateway-keystore.p12
            - name: JARVIS_VOICE_GATEWAY_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-api-gateway-voice-gateway
                  key: keystore-password
            - name: JARVIS_VOICE_GATEWAY_KEYSTORE_TYPE
              value: PKCS12
          volumeMounts:
            - name: internal-tls-api-gateway-voice-gateway
              mountPath: /tls
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
              scheme: HTTPS
      volumes:
        - name: internal-tls-api-gateway-voice-gateway
          secret:
            secretName: jarvis-internal-tls-api-gateway-voice-gateway
            items:
              - key: voice-gateway-keystore.p12
                path: voice-gateway-keystore.p12
              - key: ca.crt
                path: ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: voice-gateway
  namespace: jarvis
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: https
