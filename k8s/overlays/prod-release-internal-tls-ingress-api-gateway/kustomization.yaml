apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../prod-release-internal-tls-voice-gateway-api-gateway

patches:
  - path: ingress.patch.yaml
    target:
      kind: Ingress
      name: jarvis-ingress
  - path: api-gateway-ingress-allow.patch.yaml
    target:
      kind: NetworkPolicy
      name: api-gateway-ingress-allow
