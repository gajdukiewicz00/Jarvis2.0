apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: jarvis
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-orchestrator-nlp-service: orchestrator-nlp-service-v1
    spec:
      containers:
        - name: orchestrator
          env:
            - name: NLP_SERVICE_URL
              value: https://nlp-service.jarvis.svc.cluster.local:8082
            - name: JARVIS_JAVA_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-orchestrator-nlp-service
                  key: truststore-password
            - name: JAVA_TOOL_OPTIONS
              value: -Djavax.net.ssl.trustStore=/tls-nlp/jarvis-internal-truststore.jks -Djavax.net.ssl.trustStorePassword=$(JARVIS_JAVA_TRUSTSTORE_PASSWORD)
          volumeMounts:
            - name: internal-tls-orchestrator-nlp-service
              mountPath: /tls-nlp
              readOnly: true
      volumes:
        - name: internal-tls-orchestrator-nlp-service
          secret:
            secretName: jarvis-internal-tls-orchestrator-nlp-service
            items:
              - key: truststore.jks
                path: jarvis-internal-truststore.jks
              - key: ca.crt
                path: ca.crt
