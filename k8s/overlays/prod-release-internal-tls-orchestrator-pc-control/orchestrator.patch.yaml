apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-orchestrator-pc-control: orchestrator-pc-control-v1
    spec:
      containers:
        - name: orchestrator
          env:
            - name: PC_CONTROL_URL
              value: https://pc-control.jarvis-prod.svc.cluster.local:8084
            - name: JARVIS_JAVA_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-orchestrator-pc-control
                  key: truststore-password
            - name: JAVA_TOOL_OPTIONS
              value: -Djavax.net.ssl.trustStore=/tls-pc-control/jarvis-internal-truststore.jks -Djavax.net.ssl.trustStorePassword=$(JARVIS_JAVA_TRUSTSTORE_PASSWORD)
          volumeMounts:
            - name: internal-tls-orchestrator-pc-control
              mountPath: /tls-pc-control
              readOnly: true
      volumes:
        - name: internal-tls-orchestrator-pc-control
          secret:
            secretName: jarvis-internal-tls-orchestrator-pc-control
            items:
              - key: truststore.jks
                path: jarvis-internal-truststore.jks
              - key: ca.crt
                path: ca.crt
