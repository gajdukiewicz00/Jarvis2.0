apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../prod-release-internal-tls-api-gateway-nlp

patches:
  - path: api-gateway.patch.yaml
  - path: planner-service.patch.yaml
  - path: api-gateway-ingress-allow.patch.yaml
    target:
      kind: NetworkPolicy
      name: api-gateway-ingress-allow
  - path: planner-egress-internal.patch.yaml
    target:
      kind: NetworkPolicy
      name: planner-egress-internal
