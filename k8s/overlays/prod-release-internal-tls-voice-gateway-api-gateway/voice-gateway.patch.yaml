apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: jarvis-prod
spec:
  template:
    metadata:
      annotations:
        jarvis.io/internal-tls-slice-voice-gateway-api-gateway: voice-gateway-api-gateway-v1
    spec:
      containers:
        - name: voice-gateway
          env:
            - name: API_GATEWAY_URL
              value: https://api-gateway.jarvis-prod.svc.cluster.local:8443
            - name: JARVIS_JAVA_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-internal-tls-voice-gateway-api-gateway
                  key: truststore-password
            - name: JAVA_TOOL_OPTIONS
              value: -Djavax.net.ssl.trustStore=/tls-api-gateway/jarvis-internal-truststore.jks -Djavax.net.ssl.trustStorePassword=$(JARVIS_JAVA_TRUSTSTORE_PASSWORD)
          volumeMounts:
            - name: internal-tls-voice-gateway-api-gateway
              mountPath: /tls-api-gateway
              readOnly: true
      volumes:
        - name: internal-tls-voice-gateway-api-gateway
          secret:
            secretName: jarvis-internal-tls-voice-gateway-api-gateway
            items:
              - key: truststore.jks
                path: jarvis-internal-truststore.jks
              - key: ca.crt
                path: ca.crt
