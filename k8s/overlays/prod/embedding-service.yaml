# =============================================================================
# Embedding Service Deployment (CPU-only)
# =============================================================================
# Model: intfloat/multilingual-e5-small (384 dimensions)
# Provides /health and /embed endpoints for memory-service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: jarvis
  labels:
    app: embedding-service
    app.kubernetes.io/name: embedding-service
    app.kubernetes.io/component: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
        app.kubernetes.io/name: embedding-service
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: embedding-service
          image: jarvis/embedding-service:0.1.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: MODEL_NAME
              value: "intfloat/multilingual-e5-small"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5001"
            - name: CACHE_SIZE
              value: "2000"
            - name: MAX_BATCH_SIZE
              value: "32"
            - name: MAX_TEXT_LENGTH
              value: "512"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          # Model download can take time on first start
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18  # 3 minutes for model download
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: jarvis
  labels:
    app: embedding-service
spec:
  type: ClusterIP
  selector:
    app: embedding-service
  ports:
    - name: http
      port: 5001
      targetPort: 5001

