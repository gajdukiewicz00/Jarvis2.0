apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: jarvis-prod
spec:
  replicas: 2
  template:
    spec:
      serviceAccountName: jarvis-voice-gateway-sa
      automountServiceAccountToken: false
      priorityClassName: jarvis-core-high
      terminationGracePeriodSeconds: 45
      containers:
        - name: voice-gateway
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "1"
              # Raised 1Gi -> 2Gi: 1Gi OOMKilled the JVM (exit 137) under
              # Vosk/Porcupine load. Keep this in sync with the live deployment.
              memory: "2Gi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 35"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: voice-gateway
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: voice-gateway
---
