apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: jarvis-prod
spec:
  replicas: 2
  template:
    spec:
      serviceAccountName: jarvis-api-gateway-sa
      automountServiceAccountToken: false
      priorityClassName: jarvis-core-high
      terminationGracePeriodSeconds: 35
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 25"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: api-gateway
---
