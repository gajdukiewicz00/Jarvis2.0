# =============================================================================
# LLM Server Deployment
# =============================================================================
# K8S defaults to a CPU-safe llama.cpp profile until the cluster has an
# NVIDIA device plugin and allocatable gpu resources.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: jarvis
  labels:
    app: llm-server
    app.kubernetes.io/name: llm-server
    app.kubernetes.io/component: inference
spec:
  replicas: 0
  strategy:
    type: Recreate  # GPU resources can't be shared during rolling update
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
        app.kubernetes.io/name: llm-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llm-server
          image: jarvis/llm-server
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
              name: http
          env:
            # CPU-safe backend profile for clusters without a GPU plugin.
            - name: LLM_BACKEND
              value: "llamacpp"
            - name: DEVICE
              value: "cpu"
            - name: LLM_DEVICE
              value: "cpu"
            - name: ENABLE_GPU
              value: "false"
            # Model path (seed the PVC with scripts/seed-llm-model-pvc.sh)
            - name: MODEL_PATH
              value: "/models"
            - name: GGUF_MODEL_PATH
              value: "/models/qwen2.5-3b-instruct-q4_k_m.gguf"
            # llama.cpp settings
            - name: N_GPU_LAYERS
              value: "0"
            - name: N_CTX
              value: "4096"
            - name: N_BATCH
              value: "512"
            # Generation settings
            - name: MAX_NEW_TOKENS
              value: "700"
            - name: MAX_GENERATION_SECONDS
              value: "120"
            - name: TEMPERATURE
              value: "0.7"
            # Performance
            - name: ENABLE_STREAMING
              value: "true"
            - name: ENABLE_WARMUP
              value: "true"
            # Logging
            - name: LOG_LEVEL
              value: "INFO"
            - name: VERBOSE_LLAMACPP
              value: "false"
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "8Gi"
          volumeMounts:
            - name: llm-models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
          # Startup probe - model loading can take 2-5 minutes
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30  # 5 minutes max
          # Readiness - only ready when model is loaded
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Liveness - check if server is responding
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: llm-models
          persistentVolumeClaim:
            claimName: llm-models-pvc
        - name: tmp
          emptyDir: {}
        - name: app-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: jarvis
  labels:
    app: llm-server
spec:
  type: ClusterIP
  selector:
    app: llm-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
