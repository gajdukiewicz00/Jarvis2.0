# =============================================================================
# LLM Service Deployment (Spring Boot)
# =============================================================================
# Orchestrates LLM conversations with:
# - Personalized system prompts
# - Long-term memory (RAG)
# - Token budget management
# - Russian language enforcement
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: jarvis
  labels:
    app: llm-service
    app.kubernetes.io/name: llm-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
        app.kubernetes.io/name: llm-service
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # LLM is optional - no blocking init containers
      # If llm-server is not available, service will start and return DEGRADED status
      # initContainers removed to allow graceful degradation
      containers:
        - name: llm-service
          image: jarvis/llm-service:0.1.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8091
              name: http
          envFrom:
            - secretRef:
                name: jarvis-secrets
          env:
            # LLM Server connection
            - name: LLM_SERVER_URL
              value: "http://llm-server:5000"
            - name: JARVIS_LLM_ENABLED
              value: "true"
            # Timeouts (LLM inference can be slow)
            - name: LLM_CONNECT_TIMEOUT_MS
              value: "5000"
            - name: LLM_READ_TIMEOUT_MS
              value: "600000"  # 10 minutes for long generations
            # Memory service integration
            - name: MEMORY_ENABLED
              value: "true"
            - name: MEMORY_SERVICE_URL
              value: "http://memory-service:8093"
            - name: MEMORY_SERVICE_ENABLED
              value: "true"
            - name: MEMORY_TOPK
              value: "5"
            - name: MEMORY_MAX_TOKENS
              value: "600"
            # Token budgets
            - name: LLM_BUDGET_SYSTEM
              value: "500"
            - name: LLM_BUDGET_MEMORY
              value: "600"
            - name: LLM_BUDGET_HISTORY
              value: "1400"
            - name: LLM_BUDGET_TOTAL
              value: "3500"
            # User profile (optional, disabled by default)
            - name: USER_PROFILE_URL
              value: "http://user-profile:8089"
            - name: USER_PROFILE_ENABLED
              value: "false"
            # JVM settings
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseG1GC"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/llm/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/llm/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: jarvis
  labels:
    app: llm-service
spec:
  type: ClusterIP
  selector:
    app: llm-service
  ports:
    - name: http
      port: 8091
      targetPort: 8091
