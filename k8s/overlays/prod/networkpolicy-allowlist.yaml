apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ingress-allow
  namespace: jarvis
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - ingress-nginx
                  - kube-system
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: orchestrator
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-egress-core
  namespace: jarvis
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: orchestrator
      ports:
        - protocol: TCP
          port: 8083
    - to:
        - podSelector:
            matchLabels:
              app: planner-service
      ports:
        - protocol: TCP
          port: 8092
    - to:
        - podSelector:
            matchLabels:
              app: life-tracker
      ports:
        - protocol: TCP
          port: 8085
    - to:
        - podSelector:
            matchLabels:
              app: security-service
      ports:
        - protocol: TCP
          port: 8088
    - to:
        - podSelector:
            matchLabels:
              app: voice-gateway
      ports:
        - protocol: TCP
          port: 8081
    - to:
        - podSelector:
            matchLabels:
              app: nlp-service
      ports:
        - protocol: TCP
          port: 8082
    - to:
        - podSelector:
            matchLabels:
              app: pc-control
      ports:
        - protocol: TCP
          port: 8084
    - to:
        - podSelector:
            matchLabels:
              app: smart-home-service
      ports:
        - protocol: TCP
          port: 8086
    - to:
        - podSelector:
            matchLabels:
              app: analytics-service
      ports:
        - protocol: TCP
          port: 8087
    - to:
        - podSelector:
            matchLabels:
              app: llm-service
      ports:
        - protocol: TCP
          port: 8091
    - to:
        - podSelector:
            matchLabels:
              app: memory-service
      ports:
        - protocol: TCP
          port: 8093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core-backends-ingress-from-api-gateway
  namespace: jarvis
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - orchestrator
          - planner-service
          - life-tracker
          - security-service
          - voice-gateway
          - nlp-service
          - pc-control
          - smart-home-service
          - analytics-service
          - llm-service
          - memory-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
        - protocol: TCP
          port: 8087
        - protocol: TCP
          port: 8088
        - protocol: TCP
          port: 8091
        - protocol: TCP
          port: 8092
        - protocol: TCP
          port: 8093
---
