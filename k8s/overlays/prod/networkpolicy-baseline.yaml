apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jarvis-default-deny
  namespace: jarvis
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jarvis-allow-dns-egress
  namespace: jarvis
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
