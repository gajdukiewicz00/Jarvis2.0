# =============================================================================
# PostgreSQL with pgvector - StatefulSet (Optional, prod-only)
# =============================================================================
# Uses ankane/pgvector image which has pgvector pre-installed
# Init scripts create databases and memory schema
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-pgvector
  namespace: jarvis-prod
  labels:
    app: postgres-pgvector
    app.kubernetes.io/name: postgres-pgvector
    app.kubernetes.io/component: database
spec:
  serviceName: postgres-pgvector
  # postgres-pgvector is optional - scale to 0 if not needed
  # To enable: kubectl -n jarvis-prod scale statefulset postgres-pgvector --replicas=1
  replicas: 0
  selector:
    matchLabels:
      app: postgres-pgvector
  template:
    metadata:
      labels:
        app: postgres-pgvector
        app.kubernetes.io/name: postgres-pgvector
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "jarvis"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: jarvis-secrets
                  key: POSTGRES_USER
            - name: PGDATABASE
              value: "jarvis"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # 2.5 minutes for init scripts
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
        - name: postgres-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-pgvector
  namespace: jarvis-prod
  labels:
    app: postgres-pgvector
spec:
  type: ClusterIP
  selector:
    app: postgres-pgvector
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
