# =============================================================================
# Persistent Volume Claim for Voice Gateway Vosk models in production.
# The actual backing volume is provisioned by the cluster StorageClass.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vosk-models-pvc
  namespace: jarvis-prod
  labels:
    app: voice-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
