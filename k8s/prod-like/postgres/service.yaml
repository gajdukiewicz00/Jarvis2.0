# =============================================================================
# Jarvis 2.0 - PostgreSQL Services (Prod-like Profile)
# =============================================================================
# Два сервиса: один для записи (primary), один headless для репликации
# =============================================================================

# Headless service для StatefulSet networking и репликации
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres-headless
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  clusterIP: None  # Headless
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
---
# ClusterIP service для доступа к primary (только postgres-0)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
    # В prod можно добавить label для primary
---
# Read-only service для чтения с реплик
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: jarvis
  labels:
    app: postgres
    app.kubernetes.io/name: postgres-read
    app.kubernetes.io/part-of: jarvis
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres

