# Database credentials for Jarvis services
# IMPORTANT: Change these in production!
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: jarvis-data
type: Opaque
stringData:
  postgres-user: jarvis
  postgres-password: jarvis123
  postgres-db: jarvis
---
# Copy to jarvis-core namespace
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: jarvis-core
type: Opaque
stringData:
  postgres-user: jarvis
  postgres-password: jarvis123
---
# Copy to jarvis-llm namespace
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: jarvis-llm
type: Opaque
stringData:
  postgres-user: jarvis
  postgres-password: jarvis123

