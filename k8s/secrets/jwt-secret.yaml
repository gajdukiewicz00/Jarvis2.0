# JWT Secret for Jarvis services
# IMPORTANT: Change this in production!
# Generate with: openssl rand -base64 64
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: jarvis-core
type: Opaque
stringData:
  jwt-secret: "jarvis-secret-key-change-in-production-min-256-bits-long-for-HS256-algorithm"
---
# Copy to jarvis-llm namespace
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: jarvis-llm
type: Opaque
stringData:
  jwt-secret: "jarvis-secret-key-change-in-production-min-256-bits-long-for-HS256-algorithm"

