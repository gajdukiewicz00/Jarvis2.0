# =============================================================================
# Jarvis 2.0 - Full Docker Compose Stack
# =============================================================================
# Включает: PostgreSQL, RabbitMQ, Kafka, все микросервисы, nginx (HTTPS)
# Используй этот файл для локальной разработки с полной инфраструктурой
#
# Запуск:
#   docker-compose -f docker-compose-full.yml up -d
#
# HTTPS доступ: https://jarvis.local (добавь в /etc/hosts: 127.0.0.1 jarvis.local)
# =============================================================================
version: '3.8'

services:
  # ===========================================================================
  # REVERSE PROXY (HTTPS termination)
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: jarvis20_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # API GATEWAY
  # ===========================================================================
  api-gateway:
    build: ./apps/api-gateway
    container_name: jarvis20_api-gateway
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - JWT_SECRET=${JWT_SECRET:-jarvis-secret-key-change-in-production-min-256-bits-long-for-HS256-algorithm}
      # Service URLs
      - SECURITY_URL=http://security-service:8088
      - VOICE_GATEWAY_URL=http://voice-gateway:8081
      - NLP_SERVICE_URL=http://nlp-service:8082
      - ORCHESTRATOR_URL=http://orchestrator:8083
      - PC_CONTROL_URL=http://pc-control:8084
      - LIFE_TRACKER_URL=http://life-tracker:8085
      - SMART_HOME_URL=http://smart-home-service:8086
      - ANALYTICS_URL=http://analytics-service:8087
      - LLM_SERVICE_URL=http://llm-service:8091
      # RabbitMQ
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=jarvis
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - SPRING_RABBITMQ_VIRTUAL_HOST=jarvis
      # Kafka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # Feature flags
      - FEATURE_RABBITMQ_PC_CONTROL=false
      - FEATURE_RABBITMQ_SMART_HOME=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      security-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # SECURITY SERVICE
  # ===========================================================================
  security-service:
    build: ./apps/security-service
    container_name: jarvis20_security-service
    expose:
      - "8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jarvis_security
      - SPRING_DATASOURCE_USERNAME=jarvis
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-jarvis123}
      - JWT_SECRET=${JWT_SECRET:-jarvis-secret-key-change-in-production-min-256-bits-long-for-HS256-algorithm}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # LIFE TRACKER
  # ===========================================================================
  life-tracker:
    build: ./apps/life-tracker
    container_name: jarvis20_life-tracker
    expose:
      - "8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jarvis_db
      - SPRING_DATASOURCE_USERNAME=jarvis
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-jarvis123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_EXPENSES=jarvis.events.expenses
      - KAFKA_TOPIC_TIME_TRACKING=jarvis.events.time-tracking
      - KAFKA_TOPIC_CALENDAR=jarvis.events.calendar
      - FEATURE_KAFKA_EVENTS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # ANALYTICS SERVICE
  # ===========================================================================
  analytics-service:
    build: ./apps/analytics-service
    container_name: jarvis20_analytics-service
    expose:
      - "8087"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - LIFE_TRACKER_URL=http://life-tracker:8085
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FEATURE_KAFKA_ANALYTICS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      life-tracker:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # VOICE GATEWAY
  # ===========================================================================
  voice-gateway:
    build: ./apps/voice-gateway
    container_name: jarvis20_voice-gateway
    expose:
      - "8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - JARVIS_ORCHESTRATOR_URL=http://orchestrator:8083
      - JARVIS_VOSK_MODEL_PATH=/app/models/vosk-model-small-ru-0.22
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=jarvis
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - SPRING_RABBITMQ_VIRTUAL_HOST=jarvis
      - FEATURE_RABBITMQ_VOICE=false
    volumes:
      - ./models/vosk-model-small-ru-0.22:/app/models/vosk-model-small-ru-0.22:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # PC CONTROL
  # ===========================================================================
  pc-control:
    build: ./apps/pc-control
    container_name: jarvis20_pc-control
    expose:
      - "8084"
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - DISPLAY=:0
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=jarvis
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - SPRING_RABBITMQ_VIRTUAL_HOST=jarvis
      - RABBITMQ_QUEUE_PC_CONTROL=pc-control.commands
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FEATURE_RABBITMQ_PC_CONTROL=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # SMART HOME SERVICE
  # ===========================================================================
  smart-home-service:
    build: ./apps/smart-home-service
    container_name: jarvis20_smart-home-service
    expose:
      - "8086"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - MQTT_BROKER_URL=tcp://mosquitto:1883
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=jarvis
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - SPRING_RABBITMQ_VIRTUAL_HOST=jarvis
      - RABBITMQ_QUEUE_SMART_HOME=smart-home.commands
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FEATURE_RABBITMQ_SMART_HOME=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      - mosquitto
      - rabbitmq
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # ASSISTANT CORE
  # ===========================================================================
  assistant-core:
    build: ./apps/assistant-core
    container_name: jarvis20_assistant-core
    expose:
      - "8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jarvis_assistant_core
      - SPRING_DATASOURCE_USERNAME=jarvis
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-jarvis123}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=jarvis
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # NLP SERVICE
  # ===========================================================================
  nlp-service:
    build: ./apps/nlp-service
    container_name: jarvis20_nlp-service
    expose:
      - "8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # ORCHESTRATOR
  # ===========================================================================
  orchestrator:
    build: ./apps/orchestrator
    container_name: jarvis20_orchestrator
    expose:
      - "8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - JARVIS_NLP_URL=http://nlp-service:8082
      - JARVIS_PC_CONTROL_URL=http://pc-control:8084
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # USER PROFILE
  # ===========================================================================
  user-profile:
    build: ./apps/user-profile
    container_name: jarvis20_user-profile
    expose:
      - "8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jarvis_user_profile
      - SPRING_DATASOURCE_USERNAME=jarvis
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-jarvis123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # LLM SERVICE
  # ===========================================================================
  llm-service:
    build: ./apps/llm-service
    container_name: jarvis20_llm-service
    expose:
      - "8091"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - LLM_SERVER_URL=http://llm-server:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      llm-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # LLM SERVER (Python)
  # ===========================================================================
  llm-server:
    build: ./docker/llm-server
    container_name: jarvis20_llm-server
    expose:
      - "5000"
    volumes:
      - /home/kwaqa/models/h2ogpt-4096-llama2-7b-chat:/models:ro
    environment:
      - MODEL_PATH=/models
      - DEVICE=cpu
      - HOST=0.0.0.0
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 12G
    networks:
      - jarvis-net

  # ===========================================================================
  # PLANNER SERVICE
  # ===========================================================================
  planner-service:
    build: ./apps/planner-service
    container_name: jarvis20_planner-service
    expose:
      - "8092"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,k8s
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jarvis_db
      - SPRING_DATASOURCE_USERNAME=jarvis
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-jarvis123}
      - LIFE_TRACKER_URL=http://life-tracker:8085
      - ANALYTICS_SERVICE_URL=http://analytics-service:8087
      - USER_PROFILE_URL=http://user-profile:8089
      - LLM_SERVICE_URL=http://llm-service:8091
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

  # ===========================================================================
  # POSTGRESQL
  # ===========================================================================
  postgres:
    image: postgres:16
    container_name: jarvis20_postgres
    command: postgres -c config_file=/etc/postgresql/postgres.conf
    environment:
      - POSTGRES_DB=jarvis
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=${DB_PASSWORD:-jarvis123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
      - ./docker/postgres/postgres.conf:/etc/postgresql/postgres.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - jarvis-net

  # ===========================================================================
  # RABBITMQ
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: jarvis20_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=jarvis
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-rabbitmq-password}
      - RABBITMQ_DEFAULT_VHOST=jarvis
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - jarvis-net

  # ===========================================================================
  # ZOOKEEPER (для Kafka)
  # ===========================================================================
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: jarvis20_zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - ./data/zookeeper:/bitnami/zookeeper
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - jarvis-net

  # ===========================================================================
  # KAFKA
  # ===========================================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: jarvis20_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_BROKER_ID=0
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - ./data/kafka:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      zookeeper:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - jarvis-net

  # ===========================================================================
  # MOSQUITTO (MQTT broker)
  # ===========================================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: jarvis20_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    networks:
      - jarvis-net

networks:
  jarvis-net:
    driver: bridge

